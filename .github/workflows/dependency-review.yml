name: Dependency Review

on:
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: low
