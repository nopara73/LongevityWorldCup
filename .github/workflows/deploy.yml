name: Auto Deploy on Master

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - production-deploy
  push:
    branches:
      - master
    paths-ignore:
      - README.md
      - LICENSE
      - AGENTS.md
      - DESIGN.md
      - UBIQUITOUS_LANGUAGE.md
      - .cursorrules
      - .editorconfig
      - .gitattributes
      - .gitignore
      - .aiassistant/**
      - .codex/**
      - .cursor/**
      - .vscode/**
      - .github/workflows/**
      - LongevityWorldCup.sln
      - LongevityWorldCup.Tests/**
      - LongevityWorldCup.ApplicationReviewer/**
      - LongevityWorldCup.FacebookOAuthHelper/**
      - LongevityWorldCup.XOAuthHelper/**
      - LongevityWorldCup.Documentation/AgingClocks.md
      - LongevityWorldCup.Documentation/AthleteAdditionWorkflow.md
      - LongevityWorldCup.Documentation/CustomEvent.md
      - LongevityWorldCup.Documentation/FacebookApiSetup.md
      - LongevityWorldCup.Documentation/GameNights.md
      - LongevityWorldCup.Documentation/ServerDeployment.md
      - LongevityWorldCup.Documentation/ThreadsApiSetup.md
      - LongevityWorldCup.Documentation/XApiSetup.md
      - LongevityWorldCup.Documentation/MediaKit.zip
      - LongevityWorldCup.Documentation/pheno-age.pdf

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check whether this deploy is still current
        id: freshness
        run: |
          latest_sha="$(git ls-remote origin refs/heads/master | cut -f1)"
          if [ "$latest_sha" != "$GITHUB_SHA" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale deploy for $GITHUB_SHA; latest master is $latest_sha."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.freshness.outputs.deploy == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: LongevityWorldCup.Website/package-lock.json

      - name: Build frontend artifact
        if: steps.freshness.outputs.deploy == 'true'
        working-directory: LongevityWorldCup.Website
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run build
          tracked="$(git ls-files -- 'wwwroot/js')"
          if [[ -n "$tracked" ]]; then
            echo "$tracked"
            exit 1
          fi

      - name: Package frontend artifact
        if: steps.freshness.outputs.deploy == 'true'
        run: |
          tar -czf frontend-assets.tar.gz -C LongevityWorldCup.Website/wwwroot js
          sha256sum frontend-assets.tar.gz > frontend-assets.tar.gz.sha256

      - name: Stage frontend artifact
        if: steps.freshness.outputs.deploy == 'true'
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          port: 22
          source: "frontend-assets.tar.gz,frontend-assets.tar.gz.sha256"
          target: "/tmp/longevityworldcup-frontend"
          rm: true
          command_timeout: 2m

      - name: Deploy via SSH
        if: steps.freshness.outputs.deploy == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          port: 22
          command_timeout: 30m
          script: |
            set -eu
            verified_sha="${{ github.sha }}"
            frontend_stage="/tmp/longevityworldcup-frontend"
            deploy_source="$(mktemp -d)"
            publish_output="$(mktemp -d)"
            service_stopped=0
            cleanup() {
              if [ "$service_stopped" -eq 1 ]; then
                sudo systemctl start longevityworldcup.service || true
              fi
              rm -rf "$frontend_stage" "$deploy_source" "$publish_output"
            }
            trap cleanup EXIT

            test -f "$frontend_stage/frontend-assets.tar.gz"
            test -f "$frontend_stage/frontend-assets.tar.gz.sha256"
            (
              cd "$frontend_stage"
              sha256sum --check frontend-assets.tar.gz.sha256
            )

            cd ~/LongevityWorldCup
            git fetch origin master
            git reset --hard "$verified_sha"
            git clean -fd
            test "$(git rev-parse HEAD)" = "$verified_sha"

            dotnet_version="$(dotnet --version)"
            dotnet_major="${dotnet_version%%.*}"
            if [ "$dotnet_major" != "10" ]; then
              echo "Expected .NET SDK 10.x on production server, found $dotnet_version."
              exit 1
            fi

            git ls-files -z | rsync -a --from0 --files-from=- ./ "$deploy_source"/
            tar -xzf "$frontend_stage/frontend-assets.tar.gz" \
              --no-same-owner \
              --no-same-permissions \
              -C "$deploy_source/LongevityWorldCup.Website/wwwroot"
            dotnet publish "$deploy_source/LongevityWorldCup.Website/LongevityWorldCup.Website.csproj" --configuration Release --output "$publish_output" -p:BuildFrontend=false
            source_scripts="$(find "$deploy_source/LongevityWorldCup.Website/wwwroot/js" -maxdepth 1 -type f -name '*.js' -printf '%f\n' | sort)"
            published_scripts="$(find "$publish_output/wwwroot/js" -maxdepth 1 -type f -name '*.js' -printf '%f\n' | sort)"
            test -n "$source_scripts"
            if [ "$source_scripts" != "$published_scripts" ]; then
              echo "Published frontend assets do not match the verified artifact."
              exit 1
            fi

            sudo systemctl stop longevityworldcup.service
            service_stopped=1
            sudo rsync -a --checksum --no-owner --no-group \
              --exclude='/config.json' \
              --exclude='/config.json.bak*' \
              --exclude='/AppData/***' \
              --exclude='/wwwroot/athletes/***' \
              --exclude='/wwwroot/generated/***' \
              --exclude='/wwwroot/js/***' \
              "$publish_output"/ /var/www/LongevityWorldCup/publish/
            sudo rsync -a --checksum --delete --no-owner --no-group \
              "$publish_output/wwwroot/athletes"/ /var/www/LongevityWorldCup/publish/wwwroot/athletes/
            sudo rsync -a --checksum --delete --no-owner --no-group \
              "$publish_output/wwwroot/js"/ /var/www/LongevityWorldCup/publish/wwwroot/js/
            sudo mkdir -p /var/www/LongevityWorldCup/publish/wwwroot/generated
            sudo chown -R www-data:www-data /var/www/LongevityWorldCup/publish/wwwroot/generated
            sudo find /var/www/LongevityWorldCup/publish/wwwroot/generated -type d -exec chmod 755 {} \;
            sudo find /var/www/LongevityWorldCup/publish/wwwroot/generated -type f -exec chmod 644 {} \;
            sudo systemctl start longevityworldcup.service
            service_stopped=0

            health_url="https://www.longevityworldcup.com/health"
            health_body="/tmp/longevityworldcup-health.json"
            for attempt in $(seq 1 24); do
              if curl -fsS --max-time 10 "$health_url" -o "$health_body"; then
                break
              fi

              if [ "$attempt" -eq 24 ]; then
                echo "Production health check failed: $health_url"
                sudo systemctl status longevityworldcup.service --no-pager -l || true
                exit 1
              fi

              sleep 5
            done

            if ! grep -q '"status":"Healthy"' "$health_body"; then
              echo "Production health check returned unexpected content."
              cat "$health_body"
              exit 1
            fi
            rm -f "$health_body"

            for script_path in "$publish_output"/wwwroot/js/*.js; do
              curl -fsS --max-time 10 \
                "https://www.longevityworldcup.com/js/$(basename "$script_path")?v=$verified_sha" \
                -o /dev/null
            done

            if [ -n "$(git status --short)" ]; then
              echo "Server checkout was dirtied during deploy."
              git status --short
              exit 1
            fi
