name: Auto Deploy on Master

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - production-deploy
  push:
    branches:
      - master
    paths-ignore:
      - README.md
      - LICENSE
      - AGENTS.md
      - DESIGN.md
      - UBIQUITOUS_LANGUAGE.md
      - .cursorrules
      - .editorconfig
      - .gitattributes
      - .gitignore
      - .aiassistant/**
      - .codex/**
      - .cursor/**
      - .vscode/**
      - .github/workflows/**
      - LongevityWorldCup.sln
      - LongevityWorldCup.Tests/**
      - LongevityWorldCup.ApplicationReviewer/**
      - LongevityWorldCup.FacebookOAuthHelper/**
      - LongevityWorldCup.XOAuthHelper/**
      - LongevityWorldCup.Documentation/AgingClocks.md
      - LongevityWorldCup.Documentation/AthleteAdditionWorkflow.md
      - LongevityWorldCup.Documentation/CustomEvent.md
      - LongevityWorldCup.Documentation/FacebookApiSetup.md
      - LongevityWorldCup.Documentation/GameNights.md
      - LongevityWorldCup.Documentation/ServerDeployment.md
      - LongevityWorldCup.Documentation/ThreadsApiSetup.md
      - LongevityWorldCup.Documentation/XApiSetup.md
      - LongevityWorldCup.Documentation/MediaKit.zip
      - LongevityWorldCup.Documentation/pheno-age.pdf

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check whether this deploy is still current
        id: freshness
        run: |
          latest_sha="$(git ls-remote origin refs/heads/master | cut -f1)"
          if [ "$latest_sha" != "$GITHUB_SHA" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale deploy for $GITHUB_SHA; latest master is $latest_sha."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.freshness.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 30m
          script_stop: true
          script: |
            set -eu
            deploy_source="$(mktemp -d)"
            publish_output="$(mktemp -d)"
            service_stopped=0
            cleanup() {
              if [ "$service_stopped" -eq 1 ]; then
                sudo systemctl start longevityworldcup.service || true
              fi
              rm -rf "$deploy_source" "$publish_output"
            }
            trap cleanup EXIT

            cd ~/LongevityWorldCup
            git fetch origin master
            git reset --hard origin/master
            git clean -fd

            dotnet_version="$(dotnet --version)"
            case "$dotnet_version" in
              10.*) ;;
              *)
                echo "Expected .NET SDK 10.x on production server, found $dotnet_version."
                exit 1
                ;;
            esac

            git ls-files -z | rsync -a --from0 --files-from=- ./ "$deploy_source"/
            dotnet publish "$deploy_source/LongevityWorldCup.Website/LongevityWorldCup.Website.csproj" --configuration Release --output "$publish_output"

            sudo systemctl stop longevityworldcup.service
            service_stopped=1
            sudo rsync -a --checksum --no-owner --no-group \
              --exclude='/config.json' \
              --exclude='/config.json.bak*' \
              --exclude='/AppData/***' \
              --exclude='/wwwroot/athletes/***' \
              --exclude='/wwwroot/generated/***' \
              "$publish_output"/ /var/www/LongevityWorldCup/publish/
            sudo rsync -a --checksum --delete --no-owner --no-group \
              "$publish_output/wwwroot/athletes"/ /var/www/LongevityWorldCup/publish/wwwroot/athletes/
            sudo mkdir -p /var/www/LongevityWorldCup/publish/wwwroot/generated
            sudo chown -R www-data:www-data /var/www/LongevityWorldCup/publish/wwwroot/generated
            sudo find /var/www/LongevityWorldCup/publish/wwwroot/generated -type d -exec chmod 755 {} \;
            sudo find /var/www/LongevityWorldCup/publish/wwwroot/generated -type f -exec chmod 644 {} \;
            sudo systemctl start longevityworldcup.service
            service_stopped=0

            health_url="https://www.longevityworldcup.com/about"
            health_body="/tmp/longevityworldcup-health.html"
            for attempt in $(seq 1 24); do
              if curl -fsS --max-time 10 "$health_url" -o "$health_body"; then
                break
              fi

              if [ "$attempt" -eq 24 ]; then
                echo "Production health check failed: $health_url"
                sudo systemctl status longevityworldcup.service --no-pager -l || true
                exit 1
              fi

              sleep 5
            done

            if ! grep -q "About Longevity World Cup" "$health_body"; then
              echo "Production health check returned unexpected content."
              exit 1
            fi
            rm -f "$health_body"

            if [ -n "$(git status --short)" ]; then
              echo "Server checkout was dirtied during deploy."
              git status --short
              exit 1
            fi
