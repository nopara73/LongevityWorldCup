<style>
    /* Compact result feedback. */
    .gma-pop-banner {
        position: fixed;
        top: max(1rem, env(safe-area-inset-top));
        left: 50%;
        transform: translate(-50%, -0.5rem);
        padding: 0.75rem 1rem;
        background: var(--lwc-surface, #ffffff);
        color: var(--lwc-ink, #17212b);
        font-size: 1rem;
        font-weight: 700;
        border: 0;
        border-inline-start: 4px solid var(--lwc-accent, var(--primary-color));
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        z-index: 10002;
        pointer-events: none;
    }

        .gma-pop-banner.show {
            animation: gma-pop-slide-in var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease) forwards;
        }

        .gma-pop-banner.hide {
            animation: gma-pop-slide-out var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease) forwards;
        }

        .gma-pop-banner.gma-pop-banner--golden {
            background: var(--lwc-warning-soft, #fff4bf) !important;
            border-inline-start-color: var(--lwc-warning, #9a6700);
            color: var(--lwc-ink, #5f4500) !important;
            box-shadow: none;
        }

    @keyframes gma-pop-slide-in {
        from {
            transform: translate(-50%, -0.5rem);
            opacity: 0;
        }

        to {
            transform: translate(-50%, 0);
            opacity: 1;
        }
    }

    @keyframes gma-pop-slide-out {
        from {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        to {
            transform: translate(-50%, -0.5rem);
            opacity: 0;
        }
    }

    /* when guessing, hide all modal-content children except the athlete-profile */
    .modal-content.guess-mode > :not(.athlete-profile) {
        display: none;
    }

    #detailsModal .modal-content.guess-mode > #closeAthleteDetailsModal,
    #detailsModal .modal-content.guess-mode > .modal-sticky-header {
        display: none !important;
    }

    /* during guess mode, hide everything under athlete-profile except pic, name & slider */
    /* .portrait-wrapper contains #modalProfilePic; keep it visible so the picture shows */
    .modal-content.guess-mode .athlete-profile > *:not(#modalProfilePic):not(#guessAgeContainer):not(.portrait-wrapper) {
        display: none;
    }

    #detailsModal .modal-content.guess-mode {
        overflow-x: hidden;
        overflow-y: auto;
    }

    #detailsModal .modal-content.guess-mode #athlete-profile {
        --gma-portrait-gap: clamp(1.25rem, 2.5vh, 2rem);
        --gma-portrait-size: clamp(220px, min(52vw, 34vh), 360px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 0;
        height: 100%;
        min-height: 0;
        box-sizing: border-box;
        padding-block: clamp(2rem, 3vh, 3rem) clamp(0.75rem, 2vh, 1.5rem);
    }

    #detailsModal .modal-content.guess-mode #athlete-profile .portrait-wrapper {
        width: var(--gma-portrait-size);
        height: auto;
        aspect-ratio: 1 / 1;
        max-width: none;
        max-height: none;
        flex: 0 0 auto;
        margin: 0 0 var(--gma-portrait-gap);
    }

    /* The game is one task surface, not a stack of decorative cards. */
    .gma-card {
        width: min(420px, 90%);
        margin-inline: auto;
        background: var(--card-bg);
        border-radius: 12px;
        padding: 2rem 2.25rem 2.5rem;
        text-align: center;
    }

    .gma-avatar {
        margin: 0 0 1.25rem;
        display: inline-block;
        aspect-ratio: 1;
        width: 144px;
        border-radius: 50%;
        overflow: hidden;
        background: var(--card-bg);
        box-shadow: none;
    }

        .gma-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    /* apply the same headline styles to both */
    .gma-heading,
    .chrono-age-heading {
        font-size: 3rem;
        margin: 0;
        color: var(--dark-text-color);
        font-weight: 700;
    }

    /* make the guess‐container fill the modal’s width */
    #guessAgeContainer {
        width: 100%;
        box-sizing: border-box; /* include any padding in that 100% */
    }

    /* let the slider wrap fill all of that */
    .gma-slider-wrap {
        position: relative;
        width: 90%;
        max-width: none; /* override any upstream caps */
        margin: 0.5rem auto 1rem;
        padding-top: 4.25rem; /* reserve a full row for the value bubble */
        align-self: stretch; /* <-- this forces it to span the full parent width */
    }

    /* slider track */
    #gmaRange {
        width: 100%;
        height: 3rem;
        appearance: none;
        background: linear-gradient( 90deg, var(--primary-color) 0%, var(--primary-color) var(--percent, 50%), #d1d5db var(--percent, 50%), #d1d5db 100% );
        border-radius: 999px;
        outline: none;
    }

        /* WebKit thumb */
        #gmaRange::-webkit-slider-thumb {
            appearance: none;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 4px solid #fff;
            box-shadow: none;
            cursor: pointer;
        }

        /* Firefox track and thumb */
        #gmaRange::-moz-range-track {
            background: linear-gradient( 90deg, var(--primary-color) 0%, var(--primary-color) var(--percent, 50%), #d1d5db var(--percent, 50%), #d1d5db 100% );
            height: .5rem;
            border-radius: 999px;
            border: none;
        }

        #gmaRange::-moz-range-thumb {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 4px solid #fff;
            box-shadow: none;
        }

    #gmaBubble {
        position: absolute;
        top: 0;
        bottom: auto;
        left: var(--percent, 50%);
        transform: translateX(-50%);
        background: #fff;
        color: var(--primary-color);
        font-size: 2rem;
        font-weight: 700;
        padding: 0.55rem 1.1rem;
        border: 2px solid var(--primary-color);
        border-radius: 8px;
        box-shadow: none;
        pointer-events: none;
        white-space: nowrap;
        z-index: 10002;
    }

    #gmaRealBubble {
        position: absolute;
        top: 0;
        bottom: auto;
        left: var(--percent, 50%);
        transform: translateX(-50%);
        background: #fff;
        color: var(--primary-color);
        font-size: 2rem;
        font-weight: 700;
        padding: 0.55rem 1.1rem;
        border: 2px solid var(--primary-color);
        border-radius: 8px;
        box-shadow: none;
        pointer-events: none;
        white-space: nowrap;
        z-index: 10002;
    }

        #gmaRealBubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 20px;
            height: 20px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            background: #fff;
            border-left: 4px solid var(--primary-color);
            border-bottom: 4px solid var(--primary-color);
        }

    #gmaBubble::after {
        content: '';
        position: absolute;
        bottom: -10px;
        width: 20px;
        height: 20px;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        background: #fff;
        border-left: 4px solid var(--primary-color);
        border-bottom: 4px solid var(--primary-color);
    }

    /* action buttons */
    .gma-actions {
        display: flex;
        justify-content: center;
        gap: 1rem;
        transition: opacity var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease);
    }

    .gma-btn {
        padding: 1.2rem 2.4rem;
        font-size: 1.2rem;
        min-width: 140px;
        min-height: 48px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        transition: background var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease), color var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease);
    }

    .gma-btn--primary {
        background: var(--primary-color);
        color: #fff;
    }

        .gma-btn--primary:hover {
            background: var(--primary-color);
            filter: brightness(1.1);
        }

    .gma-btn--ghost {
        background: transparent;
        color: var(--primary-color);
        border: 2px solid var(--primary-color);
        padding: 0.8rem 1.6rem;
        font-size: 1rem;
        min-width: 100px;
        min-height: 44px;
    }

        .gma-btn--ghost:hover {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

    /* small screens - keep it tight */
    @media (max-width: 420px) {
        /* adjust buttons on small screens */
        .gma-actions {
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .gma-btn {
            flex: 1 1 auto;
            min-width: 0;
        }

        .gma-btn--ghost {
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
        }

        .gma-btn--primary {
            font-size: 1.1rem;
            padding: 0.6rem 1.2rem;
        }

        .gma-card {
            padding: 1.5rem 1.25rem;
        }

        .gma-avatar {
            width: 116px;
        }

        /* reduce text size on small screens */
        .gma-heading {
            font-size: 2rem;
        }

        .chrono-age-heading {
            font-size: 2rem;
        }

        #gmaBubble,
        #gmaRealBubble {
            font-size: 1.65rem;
            padding: 0.4rem 0.8rem;
        }

        .gma-slider-wrap {
            margin: 0.25rem auto 0.75rem;
            padding-top: 3.75rem;
        }

        /* Keep result feedback readable without covering the task. */
        .gma-pop-banner {
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
            gap: 0.25rem;
        }
    }

    /* fade-out and remove when done */
    .gma-card.gma-done {
        opacity: 0;
        height: 0;
        padding: 0; /* collapse the padding too */
        overflow: hidden;
        transition: opacity var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease), height var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease), padding var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease);
        pointer-events: none;
    }

    .modal-content.gma-fast .gma-card.gma-done {
        /* collapse WAY faster on repeat visits */
        transition: opacity var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease), height var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease), padding var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease) !important;
    }

    .gma-troll-note {
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr);
        align-items: center;
        gap: 0.75rem;
        width: min(100%, 32rem);
        margin: 0 auto 1rem;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--athlete-modal-cream-border, var(--lwc-border, rgba(255, 255, 255, 0.24)));
        border-inline-start: 4px solid var(--lwc-accent-bright, #19c3d1);
        border-radius: var(--lwc-radius-md, 8px);
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        text-align: left;
    }

    .gma-troll-note[hidden] {
        display: none;
    }

    .gma-troll-note img {
        display: block;
        width: 48px;
        height: 48px;
        object-fit: contain;
    }

    .gma-troll-note p {
        margin: 0;
        line-height: 1.4;
    }

    .gma-troll-note a {
        color: inherit;
        font-weight: 700;
        text-decoration-thickness: 0.1em;
        text-underline-offset: 0.14em;
    }

    .gma-heading,
    .chrono-age-heading {
        white-space: normal;
        display: block;
        max-width: 100%;
        box-sizing: border-box;
        line-height: 1.08;
        text-align: center;
    }

    @keyframes fadeOutButtons {
        from {
            opacity: 1;
        }

        to {
            opacity: 0;
        }
    }

    .gma-actions.gma-actions-hide {
        opacity: 0 !important;
        animation: none !important;
        pointer-events: none; /* ← prevent any mouse events */
    }

    /* dim the old guess bubble once the real one appears */
    #gmaBubble.gma-bubble-inactive {
        opacity: 0.4;
        transform: translateX(-50%) scale(0.8);
        transition: opacity var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease), transform var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease);
    }

    /* Smooth transitions on track, thumb & bubbles */
    #gmaRange,
    #gmaBubble,
    #gmaRealBubble {
        transition: background var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease), border-color var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease), color var(--lwc-duration-normal, 220ms) var(--lwc-ease, ease);
    }

    /* Exact guesses receive a single restrained gold state. */
    .gma-card.celebrate-exact #gmaRange {
        background: #ead58b !important;
        box-shadow: none;
    }

        /* GOLDEN THUMB for WebKit */
        .gma-card.celebrate-exact #gmaRange::-webkit-slider-thumb {
            background: #9a6700 !important;
        }

        /* GOLDEN THUMB for Firefox */
        .gma-card.celebrate-exact #gmaRange::-moz-range-thumb {
            background: #9a6700 !important;
        }

    /* GOLDEN BUBBLES */
    .gma-card.celebrate-exact #gmaBubble,
    .gma-card.celebrate-exact #gmaRealBubble {
        background: #fff4bf !important;
        border-color: #9a6700 !important;
        color: #5f4500 !important;
        box-shadow: none;
    }

    #detailsModal .gma-card {
        width: min(680px, calc(100% - 2rem));
        margin-top: 0;
        margin-bottom: 0;
        box-sizing: border-box;
        background: rgba(255,255,255,.06);
        color: var(--athlete-modal-text, rgba(255,255,255,.94));
        border: 1px solid var(--athlete-modal-cream-border, rgba(246,244,237,.52));
        box-shadow: none;
        padding: 1.4rem 2rem 1.65rem;
    }
    #detailsModal .gma-avatar {
        background: rgba(255,255,255,.08);
        box-shadow: none;
    }
    #detailsModal .gma-heading,
    #detailsModal .chrono-age-heading {
        color: var(--athlete-modal-text, rgba(255,255,255,.94));
        font-size: clamp(2rem, 4vw, 2.5rem);
        margin-bottom: 0.25rem;
        text-shadow: none;
    }
    #detailsModal #gmaStatus {
        color: var(--athlete-modal-cream, rgba(246,244,237,.92));
        margin: -.75rem 0 1rem;
    }
    #detailsModal #gmaRange {
        background: linear-gradient(90deg, rgba(246,244,237,.88) 0%, rgba(246,244,237,.88) var(--percent, 50%), rgba(255,255,255,.24) var(--percent, 50%), rgba(255,255,255,.24) 100%);
    }
    #detailsModal #gmaRange::-moz-range-track {
        background: linear-gradient(90deg, rgba(246,244,237,.88) 0%, rgba(246,244,237,.88) var(--percent, 50%), rgba(255,255,255,.24) var(--percent, 50%), rgba(255,255,255,.24) 100%);
    }
    #detailsModal #gmaRange::-webkit-slider-thumb {
        background: rgba(246,244,237,.98);
        border-color: rgba(255,255,255,.95);
        box-shadow: none;
    }
    #detailsModal #gmaRange::-moz-range-thumb {
        background: rgba(246,244,237,.98);
        border-color: rgba(255,255,255,.95);
        box-shadow: none;
    }
    #detailsModal #gmaBubble,
    #detailsModal #gmaRealBubble {
        background: rgba(10,12,12,.96);
        color: var(--athlete-modal-cream, rgba(246,244,237,.92));
        border-color: var(--athlete-modal-cream-border, rgba(246,244,237,.52));
        box-shadow: none;
    }
    #detailsModal #gmaBubble::after,
    #detailsModal #gmaRealBubble::after {
        background: rgba(10,12,12,.96);
        border-left-color: var(--athlete-modal-cream-border, rgba(246,244,237,.52));
        border-bottom-color: var(--athlete-modal-cream-border, rgba(246,244,237,.52));
    }
    #detailsModal .gma-btn {
        box-shadow: none;
    }
    #detailsModal .gma-btn:focus-visible {
        outline: none;
        box-shadow: var(--athlete-modal-focus, 0 0 0 3px rgba(0,188,212,.34));
    }
    #detailsModal .gma-btn--ghost {
        background: rgba(246,244,237,.06);
        color: var(--athlete-modal-cream, rgba(246,244,237,.92));
        border-color: var(--athlete-modal-cream-border, rgba(246,244,237,.52));
    }
    #detailsModal .gma-btn--ghost:hover,
    #detailsModal .gma-btn--ghost:focus-visible {
        color: rgba(12,16,16,.94);
        background: var(--athlete-modal-cream, rgba(246,244,237,.92));
    }
    #detailsModal .gma-btn--primary {
        background: var(--athlete-modal-cream, rgba(246,244,237,.92));
        color: rgba(12,16,16,.94);
        box-shadow: none;
    }
    #detailsModal .gma-btn--primary:hover,
    #detailsModal .gma-btn--primary:focus-visible {
        filter: brightness(1.04);
    }
    #detailsModal .gma-card.celebrate-exact {
        border-color: rgba(255,215,0,.52);
        box-shadow: none;
    }
    #detailsModal .gma-card.gma-done {
        display: none !important;
        margin: 0;
        border: 0;
        box-shadow: none;
    }
    @media (max-width: 768px) {
        #detailsModal .modal-content.guess-mode #athlete-profile {
            --gma-portrait-gap: clamp(1.5rem, 3.5vh, 2.5rem);
            --gma-portrait-size: clamp(180px, min(70vw, 36vh), 320px);
            padding-block: clamp(3.5rem, 5.5vh, 4.5rem) clamp(0.5rem, 2vh, 1.25rem);
        }
        #detailsModal .modal-content.guess-mode #athlete-profile .portrait-wrapper {
            width: var(--gma-portrait-size);
            height: auto;
        }
        #detailsModal .gma-card {
            width: 100%;
            padding: 1.75rem 1.25rem 2rem;
        }
        #detailsModal .modal-content.guess-mode .gma-heading {
            display: block;
            width: 100%;
            min-width: 100%;
            overflow: visible;
            white-space: normal;
            animation: none !important;
            opacity: 1;
        }
        #detailsModal .gma-slider-wrap {
            width: 86%;
        }
    }

    @media (max-height: 680px) {
        #detailsModal .modal-content.guess-mode #athlete-profile {
            --gma-portrait-gap: 1.35rem;
            --gma-portrait-size: clamp(140px, min(64vw, 32vh), 260px);
            padding-block: 3rem 0.5rem;
        }
        #detailsModal .modal-content.guess-mode #athlete-profile .portrait-wrapper {
            width: var(--gma-portrait-size);
            height: auto;
        }
        #detailsModal .modal-content.guess-mode .gma-card {
            margin-bottom: 0;
            padding: 1rem 1rem 1.15rem;
        }
        #detailsModal .modal-content.guess-mode .gma-heading,
        #detailsModal .modal-content.guess-mode .chrono-age-heading {
            margin-bottom: 1.25rem;
        }
        #detailsModal .modal-content.guess-mode .gma-slider-wrap {
            margin: 0.25rem auto 0.75rem;
            padding-top: 3.75rem;
        }
        #detailsModal .modal-content.guess-mode #gmaRange {
            height: 2.5rem;
        }
        #detailsModal .modal-content.guess-mode #gmaRange::-webkit-slider-thumb {
            width: 52px;

        }
        #detailsModal .modal-content.guess-mode #gmaRange::-moz-range-thumb {
            width: 52px;
            height: 52px;
        }
        #detailsModal .modal-content.guess-mode #gmaBubble,
        #detailsModal .modal-content.guess-mode #gmaRealBubble {
            font-size: 2rem;
            padding: 0.55rem 1.1rem;
        }
    }

    @media (min-width: 769px) and (max-height: 760px) {

        }

            --gma-portrait-gap: .8rem;
            --gma-portrait-size: clamp(150px, min(34vw, 28vh), 230px);
            padding-block: 2.25rem .5rem;
        }
        #detailsModal .modal-content.guess-mode .gma-card {
            width: min(620px, calc(100% - 2rem));
            padding: .95rem 1.25rem 1.15rem;
        }
        #detailsModal .modal-content.guess-mode .gma-heading,
        #detailsModal .modal-content.guess-mode .chrono-age-heading {
            font-size: 2rem;
            margin-bottom: .9rem;
        }
        #detailsModal .modal-content.guess-mode .gma-slider-wrap {
            width: 84%;
            margin: .25rem auto .75rem;
            padding-top: 3.5rem;
        }
        #detailsModal .modal-content.guess-mode #gmaRange {
            height: 2.35rem;
        }
        #detailsModal .modal-content.guess-mode #gmaRange::-webkit-slider-thumb {
            width: 50px;
            height: 50px;
        }
        #detailsModal .modal-content.guess-mode #gmaRange::-moz-range-thumb {
            width: 50px;
            height: 50px;
        }
        #detailsModal .modal-content.guess-mode #gmaBubble,
        #detailsModal .modal-content.guess-mode #gmaRealBubble {
            font-size: 1.9rem;
            padding: .48rem .95rem;
        }
        #detailsModal .modal-content.guess-mode .gma-actions {
            gap: .75rem;
        }
        #detailsModal .modal-content.guess-mode .gma-btn {
            min-height: 44px;
            padding: .75rem 1.45rem;
        }
    }

    @media (min-width: 640px) and (max-width: 932px) and (max-height: 480px) and (orientation: landscape) {
        #detailsModal .modal-content.guess-mode {
            width: calc(100vw - .75rem);
            height: calc(100dvh - .75rem);
            max-height: calc(100dvh - .75rem);
            margin: .375rem auto;
            padding: .75rem;
        }

        #detailsModal .modal-content.guess-mode #athlete-profile {
            --gma-portrait-gap: 0;
            --gma-portrait-size: clamp(86px, 25vh, 116px);
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: clamp(.65rem, 2vw, 1rem);
            min-height: 100%;
            padding: 0 0.65rem 0 3.25rem;
        }

        #detailsModal .modal-content.guess-mode #athlete-profile .portrait-wrapper {
            width: var(--gma-portrait-size);
            margin: 0;
        }

        #detailsModal .modal-content.guess-mode .gma-card {

        }

        #detailsModal .modal-content.guess-mode .gma-heading,
        #detailsModal .modal-content.guess-mode .chrono-age-heading {
            font-size: clamp(1.35rem, 6vh, 1.75rem);
            margin-bottom: .45rem;
        }

        #detailsModal .modal-content.guess-mode .gma-heading {
            display: block;
            width: 100%;
            min-width: 100%;
            overflow: visible;
            white-space: normal;
            animation: none !important;
            opacity: 1;
        }

        #detailsModal .modal-content.guess-mode .gma-slider-wrap {
            width: 82%;
            margin: .35rem auto .55rem;
            padding-top: 3rem;
        }

        #detailsModal .modal-content.guess-mode #gmaRange {
            height: 2rem;
        }

        #detailsModal .modal-content.guess-mode #gmaRange::-webkit-slider-thumb {

        #detailsModal .modal-content.guess-mode #gmaRange::-moz-range-thumb {

        #detailsModal .modal-content.guess-mode #gmaBubble,
        #detailsModal .modal-content.guess-mode #gmaRealBubble {

    @media (prefers-reduced-motion: reduce) {
        .gma-pop-banner.show,

<div id="guessAgeContainer" class="gma-card">
    <h3 class="gma-heading">Guess my age!</h3>
    <h3 class="chrono-age-heading" style="display: none;">My real age is:</h3>
    <p id="gmaStatus" class="smaller-text" role="status" hidden></p>
    <div id="gmaTrollNote" class="gma-troll-note" role="status" aria-atomic="true" hidden>
        <img src="{{ASSET_TROLLFACE}}" alt="" width="48" height="48" loading="lazy" decoding="async" />
        <p>Nice try. Pick another age, or <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" rel="noopener noreferrer">claim your rickroll</a>.</p>
    </div>

    <div class="gma-slider-wrap">
        <input type="range"
               min="1"
               max="130"
               value="33"
               id="gmaRange"
               aria-label="Guess athlete’s age — 1 to 130 years" />

        <output for="gmaRange" id="gmaBubble">33</output>
    </div>

    <div class="gma-actions">
        <button id="gmaSkipAll" class="gma-btn gma-btn--ghost" style="display: none;" title="The Guess my age game will no longer appear for any athlete">Skip all</button>
        <button class="gma-btn gma-btn--ghost">Skip</button>
        <button class="gma-btn gma-btn--primary">Submit</button>
    </div>
</div>

<script>
    /* === Guess-My-Age bindings for the new widget === */
    const gmaRange = document.getElementById('gmaRange');
    const gmaDefaultValue = gmaRange.value;

    const gmaBubble = document.getElementById('gmaBubble');
    const gmaCard = document.querySelector('.gma-card');

    const heading = gmaCard.querySelector('.gma-heading');
    const chronoHeading = gmaCard.querySelector('.chrono-age-heading');
    const gmaStatus = document.getElementById('gmaStatus');
    const gmaTrollNote = document.getElementById('gmaTrollNote');

    const modalContent = document.querySelector('.modal-content');
    const gmaActions = gmaCard.querySelector('.gma-actions');

    // whenever the modal’s class list changes, if we just opened “guess-mode”,
    // remove any lingering hide classes so buttons reappear
    const resetObserver = new MutationObserver(mutations => {
        mutations.forEach(mutation => {
            if (
                mutation.attributeName === 'class' &&
                modalContent.classList.contains('guess-mode')
            ) {
                setGuessMyAgeParam(true);
                // hide the chrono prompt again
                chronoHeading.style.display = 'none';
                // restore the original prompt
                heading.style.display = '';
                gmaStatus.hidden = true;
                gmaStatus.textContent = '';
                gmaTrollNote.hidden = true;
                gmaCard.removeAttribute('aria-busy');
                gmaActions.classList.remove('gma-actions-hide');
                gmaActions.inert = false;
                gmaCard.classList.remove('gma-done');

                gmaBubble.classList.remove('gma-bubble-inactive');

                const oldRealBubble = document.getElementById('gmaRealBubble');
                if (oldRealBubble) oldRealBubble.remove();

                gmaRange.value = gmaDefaultValue;
                gmaRange.disabled = false;
                gmaRange.style.pointerEvents = '';
                gmaSubmitBtn.disabled = false;
                syncRange();

                gmaCard.classList.remove('celebrate-exact');
            }
            if (mutation.attributeName === 'class' && !modalContent.classList.contains('guess-mode')) {
                setGuessMyAgeParam(false);
            }
        });
    });

    resetObserver.observe(modalContent, { attributes: true });

    function syncRange() {
        const val = +gmaRange.value;
        const pct = (val / gmaRange.max) * 100;
        gmaRange.style.setProperty('--percent', `${pct}%`);
        gmaBubble.textContent = val;
        const clampedPct = Math.min(Math.max(pct, 5), 95);
        gmaBubble.style.left = `${clampedPct}%`;
    }
    gmaRange.addEventListener('input', syncRange);
    syncRange();   // initialise bubble

    function restoreGuessControls(message, focusTarget) {
        gmaCard.removeAttribute('aria-busy');
        gmaStatus.hidden = !message;
        gmaStatus.textContent = message || '';
        gmaActions.classList.remove('gma-actions-hide');
        gmaActions.inert = false;
        gmaRange.disabled = false;
        gmaRange.style.pointerEvents = '';
        gmaSubmitBtn.disabled = false;
        (focusTarget || gmaRange).focus();
    }

    const gmaSubmitBtn = gmaCard.querySelector('.gma-btn--primary');
    gmaSubmitBtn.addEventListener('click', async function (event) {
        const userGuess = +gmaRange.value;
        const btn = event.currentTarget;

        if (userGuess === +gmaRange.min || userGuess === +gmaRange.max) {
            gmaTrollNote.hidden = false;
            restoreGuessControls('', gmaRange);
            return;
        }

        gmaTrollNote.hidden = true;

        gmaCard.setAttribute('aria-busy', 'true');
        gmaStatus.hidden = false;
        gmaStatus.textContent = 'Submitting your guess…';
        gmaActions.classList.add('gma-actions-hide');
        gmaActions.inert = true;
        gmaRange.disabled = true;
        gmaRange.style.pointerEvents = 'none';
        gmaSubmitBtn.disabled = true;

        try {
            const response = await fetch(
                `/api/Guess/athlete-age?athleteName=${encodeURIComponent(modalContent.dataset.athleteSlug)}&ageGuess=${userGuess}`,
                { method: 'POST' }
            );

            if (!response.ok) {
                throw new Error(`Guess submission failed with status ${response.status}`);
            }

            const result = await response.json();
            if (result.guessAccepted !== true) {
                const retryAfterSeconds = Number.parseInt(response.headers.get('Retry-After') || '', 10);
                const rejectionMessage = Number.isFinite(retryAfterSeconds) && retryAfterSeconds > 0
                    ? `That guess was not accepted. Try again in ${retryAfterSeconds} seconds.`
                    : 'That guess was not accepted. Adjust the age and try again.';
                restoreGuessControls(rejectionMessage, gmaRange);
                return;
            }

            const realAge = +result.actualAge;
            const crowdCountBeforeGuess = result.crowdCount === 1 ? 0 : result.crowdCount;
            const isFirstGuess = crowdCountBeforeGuess === 0;
            const userError = Math.abs(realAge - userGuess);
            const crowdError = result.crowdAge === 0 || isFirstGuess
                ? null
                : Math.abs(realAge - result.crowdAge);

            updateCrowdContainer(result.crowdAge, result.crowdCount);
            heading.style.display = 'none';
            chronoHeading.style.display = 'block';
            const reaction = userGuess === realAge
                ? 'Right on the nose.'
                : userGuess < realAge
                    ? 'You guessed younger — high five.'
                    : 'You guessed older — oof.';
            gmaStatus.textContent = `Actual age: ${realAge}. Your guess: ${userGuess}. ${reaction}`;

            const sliderWrap = document.querySelector('.gma-slider-wrap');
            const realBubble = document.createElement('output');
            const actualPercent = Math.min(Math.max((realAge / gmaRange.max) * 100, 5), 95);
            realBubble.id = 'gmaRealBubble';
            realBubble.className = 'gma-real-bubble';
            realBubble.setAttribute('for', 'gmaRange');
            realBubble.setAttribute('aria-label', `Actual age: ${realAge}`);
            realBubble.textContent = realAge;
            realBubble.style.left = `${actualPercent}%`;
            sliderWrap.appendChild(realBubble);

            gmaRange.value = realAge;
            gmaRange.style.setProperty('--percent', `${actualPercent}%`);
            gmaBubble.classList.add('gma-bubble-inactive');

            if (userError === 0) {
                if (window.proDiscounts && typeof window.proDiscounts.setPerfectGuessMarker === 'function') {
                    window.proDiscounts.setPerfectGuessMarker();
                }
                gmaCard.classList.add('celebrate-exact');
                popBanner(true, false);
            } else if (isFirstGuess) {
                popBanner(false, true);
            } else if (crowdError !== null && userError < crowdError) {
                popBanner(false, false);
            }

            gmaCard.removeAttribute('aria-busy');
            setTimeout(() => hideCard({
                currentTarget: btn,
                originalGuess: userGuess,
                isFirstGuess,
                isExactGuess: userError === 0
            }), 2400);
        } catch (error) {
            console.error('Error submitting guess:', error);
            restoreGuessControls('We could not submit your guess. Please try again.', gmaSubmitBtn);
        }
    });

    // bind hideCard to _all_ ghost buttons (Skip & Skip All)
    gmaCard.querySelectorAll('.gma-btn--ghost')
        .forEach(btn => btn.addEventListener('click', hideCard));
    function hideCard(e) {
        // if they clicked “Skip All”, set global flag
        const isSkipAll = e.currentTarget.id === 'gmaSkipAll';
        if (isSkipAll) {
            localStorage.setItem('gmaSkipAll', 'true');
        }

        const modalContent = document.querySelector('.modal-content');
        const athleteSlug = modalContent.dataset.athleteSlug;

        // **Use the originalGuess if passed**, otherwise fall back
        const guessValue = e.originalGuess != null
            ? e.originalGuess
            : gmaRange.value;

        let allGuesses = JSON.parse(localStorage.getItem('gmaAllGuesses') || '{}');
        const isSkip = e.currentTarget.classList.contains('gma-btn--ghost');

        allGuesses[athleteSlug] = {
            value: isSkip ? null : guessValue,
            skipped: isSkip,
            first: !isSkip && Boolean(e.isFirstGuess),
            exact: !isSkip && Boolean(e.isExactGuess)
        };
        localStorage.setItem('gmaAllGuesses', JSON.stringify(allGuesses));
        updateYourGuess();  // ← Add this line

        gmaCard.classList.add('gma-done');
        modalContent.classList.remove('guess-mode');
        modalContent.scrollTop = 0;
        modalContent.scrollLeft = 0;
    }

    function popBanner(isExact, isFirst) {
        const b = document.createElement('div');
        b.setAttribute('role', 'status');
        b.setAttribute('aria-live', 'polite');
        if (isExact) {
            b.textContent = 'Bullseye!';
        }
        else if (isFirst) {
            b.textContent = 'First accepted guess!';
        }
        else {
            b.textContent = 'You beat the crowd!';
        }
        b.classList.add('gma-pop-banner');
        if (isExact) {
            b.classList.add('gma-pop-banner--golden');
        }

        document.body.appendChild(b);
        requestAnimationFrame(() => b.classList.add('show'));

        setTimeout(() => {
            b.classList.add('hide');
            b.addEventListener('animationend', () => b.remove());
            setTimeout(() => b.remove(), 350);
        }, 2400);

    }

    function setGuessMyAgeParam(active) {
        const url = new URL(window.location.href);
        if (active) url.searchParams.set('guessmyage', '1');
        else url.searchParams.delete('guessmyage');
        history.replaceState(history.state || {}, "", url.toString());
    }
</script>
