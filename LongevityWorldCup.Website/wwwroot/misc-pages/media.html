<!DOCTYPE html>
<html lang="en">
<head>
    <title>Media kit | Longevity World Cup</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .media-kit-panel {
            max-width: 1060px;
            margin: 2.25rem auto;
            padding: 0;
            background: var(--card-bg, #fffefa);
            border: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
            border-radius: var(--radius-panel, 10px);
            box-shadow: var(--surface-shadow, 0 16px 34px rgba(28, 39, 34, 0.12));
            overflow: hidden;
        }

        .media-kit-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 1.5rem;
            align-items: end;
            padding: 1.4rem;
            background:
                linear-gradient(135deg, rgba(67, 238, 131, 0.16), rgba(67, 238, 131, 0) 46%),
                var(--ink, #131b17);
            color: var(--light-text-color, #f8f7ef);
        }

        .media-kit-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            margin: 0 0 0.55rem;
            color: var(--accent-bright, #43ee83);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .media-kit-kicker::before {
            content: "\f1ea";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
        }

        .media-kit-title {
            margin: 0;
            color: inherit;
            text-align: left;
        }

        .media-kit-title[data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .media-kit-intro {
            max-width: 42rem;
            margin: 0.55rem 0 0;
            color: rgba(248, 246, 236, 0.78);
            text-align: left;
            line-height: 1.45;
        }

        .media-kit-actions {
            margin: 0;
            text-align: right;
        }

        .media-kit-primary-download {
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
            padding: 0.78rem 1.25rem;
            border-radius: var(--radius-button, 8px);
            background: var(--cta-green-gradient, linear-gradient(180deg, #50f191, #2edb6f));
            color: #04130a;
            font-weight: 700;
            text-decoration: none;
            box-shadow: var(--cta-green-shadow, inset 0 1px 0 rgba(255,255,255,.35), 0 2px 10px rgba(46,219,111,.24));
        }

        .media-kit-primary-download::before {
            content: "\f019";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 0.95em;
            line-height: 1;
        }

        .media-kit-primary-download:hover,
        .media-kit-primary-download:focus-visible {
            background: var(--cta-green-gradient, linear-gradient(180deg, #50f191, #2edb6f));
            color: #04130a;
            filter: brightness(1.06);
        }

        .media-kit-preview {
            padding: 1.35rem 1.4rem 0;
        }

        .media-kit-loading,
        .media-kit-fallback {
            margin-top: 0.75rem;
            color: #5d6b63;
            text-align: center;
        }

        .media-kit-directory {
            display: grid;
            gap: 1.25rem;
            margin: 0;
        }

        .media-kit-group {
            display: grid;
            gap: 0.7rem;
        }

        .media-kit-group-heading {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: baseline;
            padding: 0 0.1rem 0.45rem;
            border-bottom: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
        }

        .media-kit-group-heading h2 {
            margin: 0;
            text-align: left;
            font-family: var(--display-font, Impact, Haettenschweiler, "Arial Narrow Bold", Roboto, sans-serif);
            font-size: 1.25rem;
            font-weight: 400;
            font-synthesis: none;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .media-kit-group-heading span {
            color: var(--text-muted, #46554d);
            font-size: 0.86rem;
            line-height: 1.35;
            text-align: right;
        }

        .media-kit-grid {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            gap: var(--space-sm, 0.75rem);
        }

        .media-asset-card {
            box-sizing: border-box;
            grid-column: span 4;
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 14rem;
            border: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
            border-radius: var(--radius-card, 8px);
            background:
                linear-gradient(180deg, rgba(11, 125, 69, 0.018), rgba(255,254,250,0) 42%),
                var(--card-bg, #fffefa);
            overflow: hidden;
            box-shadow: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .media-asset-card:hover,
        .media-asset-card:focus-within {
            border-color: var(--surface-border-strong, rgba(28, 39, 34, 0.18));
            box-shadow: var(--surface-shadow, 0 4px 10px rgba(28,39,34,.08));
        }

        .media-asset-card.has-image {
            grid-row: span 2;
        }

        .media-asset-card.is-story {
            grid-template-columns: minmax(0, 1fr);
            grid-template-rows: auto auto auto;
            grid-row: span 1;
            min-height: 0;
            gap: 0.6rem;
            padding: 0.88rem;
        }

        .media-asset-card.is-archive {
            background:
                linear-gradient(180deg, rgba(28,39,34,.024), rgba(255,254,250,0) 45%),
                var(--card-bg, #fffefa);
        }

        .media-asset-preview {
            display: grid;
            place-items: center;
            aspect-ratio: 16 / 9;
            min-height: 8.5rem;
            padding: var(--space-md, 1rem);
            box-sizing: border-box;
            background:
                linear-gradient(135deg, rgba(28,39,34,.028), rgba(11,125,69,.055)),
                var(--paper, #f4f3ea);
            border-bottom: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
        }

        .media-asset-preview img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 18rem;
            padding: 0;
            box-sizing: border-box;
            border-radius: calc(var(--radius-card, 8px) - 2px);
        }

        .media-asset-card.is-logo .media-asset-preview {
            aspect-ratio: 1 / 1;
            min-height: 13.5rem;
            background:
                radial-gradient(circle at 50% 42%, rgba(255, 254, 250, 0.82), transparent 39%),
                linear-gradient(135deg, rgba(28,39,34,.028), rgba(11,125,69,.055)),
                var(--paper, #f4f3ea);
        }

        .media-asset-card.is-logo .media-asset-preview img {
            max-width: 78%;
            max-height: 78%;
        }

        .media-asset-card.is-logo-dark .media-asset-preview {
            background:
                radial-gradient(circle at 50% 42%, rgba(67, 238, 131, 0.12), transparent 46%),
                linear-gradient(165deg, #0a100d 0%, #050908 65%, #030706 100%);
        }

        .media-asset-card.is-person .media-asset-preview,
        .media-asset-card.is-team .media-asset-preview,
        .media-asset-card.is-hero .media-asset-preview {
            aspect-ratio: 4 / 3;
            min-height: 12rem;
            padding: var(--space-sm, 0.75rem);
        }

        .media-asset-icon {
            display: inline-grid;
            place-items: center;
            width: 3.2rem;
            height: 3.2rem;
            border: 1px solid var(--surface-border-strong, rgba(28, 39, 34, 0.18));
            border-radius: 999px;
            background: var(--card-bg, #fffefa);
            color: #0b7d45;
            font-family: var(--display-font, Impact, Haettenschweiler, "Arial Narrow Bold", Roboto, sans-serif);
            font-size: 1.05rem;
            text-transform: uppercase;
        }

        .media-asset-card.is-story .media-asset-preview {
            grid-column: 1;
            grid-row: auto;
            aspect-ratio: auto;
            min-height: 0;
            padding: 0;
            place-items: start;
            background: transparent;
            border: 0;
        }

        .media-asset-card.is-story .media-asset-icon {
            width: auto;
            height: auto;
            min-width: 3.2rem;
            padding: 0.34rem 0.58rem;
            border-radius: 999px;
            background: var(--surface-green-tint, rgba(11,125,69,.08));
            font-family: var(--body-font, system-ui, sans-serif);
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.08em;
        }

        .media-asset-card.is-archive .media-asset-icon {
            background: rgba(28, 39, 34, 0.06);
            color: var(--text-muted, #46554d);
        }

        .media-asset-body {
            display: grid;
            gap: 0.32rem;
            align-content: start;
            padding: 0.78rem 0.85rem 0.25rem;
        }

        .media-asset-card.is-story .media-asset-body {
            grid-column: 1;
            padding: 0;
        }

        .media-asset-title {
            margin: 0;
            color: #18221c;
            font-weight: 800;
            line-height: 1.2;
        }

        .media-asset-meta {
            margin: 0;
            color: #5d6b63;
            font-size: 0.84rem;
            line-height: 1.32;
        }

        .media-asset-path {
            margin: 0;
            color: #6a746d;
            font-size: 0.74rem;
            line-height: 1.3;
            overflow-wrap: anywhere;
        }

        .media-asset-actions {
            padding: 0.58rem 0.85rem 0.85rem;
        }

        .media-asset-card.is-story .media-asset-actions {
            grid-column: 1;
            padding: 0.1rem 0 0;
        }

        .media-file-button {
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.38rem;
            min-height: 36px;
            width: auto;
            padding: 0.38rem 0.72rem;
            border: 1px solid var(--control-border-hover, rgba(11, 125, 69, 0.32));
            border-radius: var(--radius-control, 999px);
            background: rgba(255,254,250,.78);
            color: var(--primary-color);
            font-size: 0.84rem;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .media-file-button::before {
            content: "\f019";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 0.9em;
            line-height: 1;
        }

        .media-file-button:hover,
        .media-file-button:focus-visible {
            border-color: var(--primary-color);
            background: var(--surface-green-tint, rgba(11,125,69,.08));
            box-shadow: var(--focus-ring, 0 0 0 4px rgba(67,238,131,.26));
            outline: none;
            transform: translateY(-1px);
        }

        .media-kit-contact {
            margin: 0;
            padding: 1.1rem 1.4rem 1.3rem;
            color: #3c4a42;
            text-align: left;
        }

        @media (min-width: 761px) {
            .media-kit-group-logos .media-asset-card.is-logo .media-asset-preview {
                min-height: 12.5rem;
            }

            .media-kit-group-logos .media-asset-card.is-story {
                align-self: start;
            }

            .media-kit-group-legacy .media-asset-card {
                grid-column: span 6;
            }
        }

        @media (max-width: 760px) {
            .media-kit-panel {
                margin: 1.5rem 1rem;
            }

            .media-kit-hero {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1.2rem;
            }

            .media-kit-title {
                font-size: 2rem;
            }

            .media-kit-actions {
                text-align: left;
            }

            .media-kit-primary-download {
                width: 100%;
                padding-inline: 0.9rem;
                font-size: 0.92rem;
                line-height: 1.2;
                white-space: normal;
                text-align: center;
            }

            .media-kit-preview {
                padding: 1rem 1rem 0;
            }

            .media-kit-group-heading {
                display: grid;
                gap: 0.2rem;
                padding-bottom: 0.5rem;
            }

            .media-kit-group-heading span {
                text-align: left;
            }

            .media-kit-grid {
                grid-template-columns: 1fr;
            }

            .media-asset-card {
                grid-column: span 1;
                min-height: 0;
            }

            .media-asset-card.is-story {
                grid-template-columns: minmax(0, 1fr);
            }

            .media-asset-card.has-image {
                grid-row: auto;
            }

            .media-asset-preview,
            .media-asset-card.is-person .media-asset-preview,
            .media-asset-card.is-team .media-asset-preview,
            .media-asset-card.is-hero .media-asset-preview {
                aspect-ratio: 16 / 10;
                min-height: 11rem;
            }

            .media-asset-card.is-logo .media-asset-preview {
                aspect-ratio: 16 / 10;
                min-height: 11rem;
            }

            .media-asset-card.is-story .media-asset-preview {
                min-height: 0;
            }

            .media-kit-contact {
                padding: 1rem;
            }
        }

        @media (max-width: 340px) {
            .media-kit-primary-download {
                gap: 0.35rem;
                padding-inline: 0.75rem;
                font-size: 0.84rem;
                line-height: 1.2;
                white-space: normal;
                text-align: center;
            }

            .media-file-button {
                min-width: 0;
                min-height: 44px;
                font-size: 0.85rem;
            }

            .media-file-button::before {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <section class="media-kit-panel">
            <div class="media-kit-hero">
                <div class="media-kit-hero-copy">
                    <p class="media-kit-kicker">Press room</p>
                    <h1 class="media-kit-title" data-aos="fade" data-aos-duration="700" data-aos-delay="250">Media kit</h1>
                    <p class="media-kit-intro">Official Longevity World Cup assets for coverage, interviews, social announcements, and event pages.</p>
                </div>

                <p class="media-kit-actions">
                    <a href="https://cdn.jsdelivr.net/gh/nopara73/LongevityWorldCup@master/LongevityWorldCup.Documentation/MediaKit.zip"
                       target="_blank" rel="noopener noreferrer"
                       class="media-kit-primary-download">
                        Download full media kit (ZIP)
                    </a>
                </p>
            </div>

            <!-- Live asset directory extracted from ZIP (auto-load) -->
            <div id="zipPreview" class="media-kit-preview">
                <div id="loading" class="media-kit-loading">Loading…</div>
                <div id="fileList" class="media-kit-directory"></div>
                <div id="fallback" class="media-kit-fallback" style="display:none;">
                    Failed to preview. Use the ZIP link above.
                </div>
            </div>

            <p class="media-kit-contact">
                Press contact:
                <a href="mailto:hi@longevityworldcup.com">hi@longevityworldcup.com</a>
            </p>
        </section>
    </main>

    <!--FOOTER-->
    <!-- JSZip (client-side unzip) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
    <script>
        history.replaceState({ modal: 'details' }, "", `/media`);

        const ZIP_PRIMARY = "https://cdn.jsdelivr.net/gh/nopara73/LongevityWorldCup@master/LongevityWorldCup.Documentation/MediaKit.zip";
        const ZIP_FALLBACK = "https://raw.githubusercontent.com/nopara73/LongevityWorldCup/master/LongevityWorldCup.Documentation/MediaKit.zip";

        const loadingEl = document.getElementById('loading');
        const directoryEl = document.getElementById('fileList');
        const fallbackEl = document.getElementById('fallback');
        const imagePreviewUrls = [];

        const GROUPS = [
            { key: "story", title: "Story & facts", note: "Use these for quick coverage, source notes, and context." },
            { key: "logos", title: "Logos", note: "Official marks for light, dark, and transparent placements." },
            { key: "team", title: "Team", note: "Founder and team assets for profiles and interviews." },
            { key: "legacy", title: "Archive assets", note: "Older social graphics retained for reference; use current marks and team assets for official coverage." },
            { key: "other", title: "Other files", note: "Additional source files included in the media kit." }
        ];

        async function fetchZip(url) {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error("HTTP " + res.status);
            return await res.arrayBuffer();
        }

        function fileExtension(path) {
            const match = String(path || "").match(/\.([a-z0-9]+)$/i);
            return match ? match[1].toUpperCase() : "FILE";
        }

        function humanizeSegment(value) {
            return String(value || "")
                .replace(/\.[^.]+$/, "")
                .replace(/^LWC[_-]?Logo[_-]?/i, "")
                .replace(/^Hero[_-]?LWC[_-]?/i, "Hero ")
                .replace(/^Bio[_-]?/i, "")
                .replace(/[_-]+/g, " ")
                .replace(/([a-z])([A-Z])/g, "$1 $2")
                .replace(/([A-Za-z])([0-9])/g, "$1 $2")
                .replace(/([0-9])([A-Za-z])/g, "$1 $2")
                .replace(/\s+/g, " ")
                .trim()
                .replace(/\b\w/g, letter => letter.toUpperCase());
        }

        function describeFile(path) {
            const normalized = String(path || "").replace(/^MediaKit\//i, "");
            const fileName = normalized.split('/').pop() || normalized;
            const ext = fileExtension(path);
            const lower = normalized.toLowerCase();

            if (lower.includes("logos/")) {
                return {
                    group: "logos",
                    title: humanizeSegment(fileName) || "Official logo",
                    meta: `${ext} logo asset`
                };
            }

            if (lower.includes("team/")) {
                const isBio = lower.includes("bio");
                return {
                    group: "team",
                    title: isBio ? `${humanizeSegment(fileName)} bio` : humanizeSegment(fileName),
                    meta: isBio ? "Profile copy" : `${ext} team image`
                };
            }

            if (lower.includes("hero")) {
                return {
                    group: "legacy",
                    title: humanizeSegment(fileName) || "Hero image",
                    meta: `${ext} archive graphic`,
                    archiveOnly: true
                };
            }

            if (lower.includes("fact") || lower.includes("readme")) {
                return {
                    group: "story",
                    title: lower.includes("readme") ? "Media kit README" : humanizeSegment(fileName),
                    meta: ext === "PDF" ? "Printable press brief" : "Plain text source"
                };
            }

            return {
                group: "other",
                title: humanizeSegment(fileName) || fileName,
                meta: `${ext} asset`
            };
        }

        function isImagePath(path) {
            return /\.(png|jpe?g|webp|gif)$/i.test(path);
        }

        function downloadBlob(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function getAssetCardClasses(asset) {
            const path = (asset.path || '').toLowerCase();
            const classes = [asset.previewUrl ? 'has-image' : 'is-story'];

            if (path.includes('logo')) {
                classes.push('is-logo');
            }
            if (path.includes('logowhite') || path.includes('teamphoto')) {
                classes.push('is-logo-dark');
            }
            if (path.includes('adamficsor')) {
                classes.push('is-person');
            }
            if (path.includes('teamphoto')) {
                classes.push('is-team');
            }
            if (path.includes('hero_lwc')) {
                classes.push('is-archive');
            }

            return classes;
        }

        function buildAssetCard(asset) {
            const card = document.createElement('article');
            card.className = 'media-asset-card';
            card.classList.add(...getAssetCardClasses(asset));

            const preview = document.createElement('div');
            preview.className = 'media-asset-preview';
            if (asset.previewUrl) {
                const img = document.createElement('img');
                img.src = asset.previewUrl;
                img.alt = '';
                img.loading = 'lazy';
                preview.appendChild(img);
            } else {
                const icon = document.createElement('span');
                icon.className = 'media-asset-icon';
                icon.textContent = asset.ext;
                preview.appendChild(icon);
            }

            const body = document.createElement('div');
            body.className = 'media-asset-body';
            const title = document.createElement('h3');
            title.className = 'media-asset-title';
            title.textContent = asset.title;
            const meta = document.createElement('p');
            meta.className = 'media-asset-meta';
            meta.textContent = asset.meta;
            const path = document.createElement('p');
            path.className = 'media-asset-path';
            path.textContent = asset.path.replace(/^MediaKit\//i, "");
            body.appendChild(title);
            body.appendChild(meta);
            body.appendChild(path);

            const actions = document.createElement('div');
            actions.className = 'media-asset-actions';
            const btn = document.createElement('button');
            btn.textContent = `Download ${asset.ext}`;
            btn.className = 'media-file-button';
            btn.addEventListener('click', async () => {
                const blob = await asset.file.async('blob');
                downloadBlob(blob, asset.path.split('/').pop());
            });
            actions.appendChild(btn);

            card.appendChild(preview);
            card.appendChild(body);
            card.appendChild(actions);
            return card;
        }

        async function buildAssetDirectory(zip, files) {
            imagePreviewUrls.forEach(url => URL.revokeObjectURL(url));
            imagePreviewUrls.length = 0;
            directoryEl.innerHTML = "";

            const assets = [];
            for (const path of files) {
                const file = zip.file(path);
                const description = describeFile(path);
                const asset = {
                    path,
                    file,
                    ext: fileExtension(path),
                    ...description
                };

                if (isImagePath(path) && !description.archiveOnly) {
                    const blob = await file.async('blob');
                    asset.previewUrl = URL.createObjectURL(blob);
                    imagePreviewUrls.push(asset.previewUrl);
                }

                assets.push(asset);
            }

            const byGroup = assets.reduce((map, asset) => {
                if (!map.has(asset.group)) map.set(asset.group, []);
                map.get(asset.group).push(asset);
                return map;
            }, new Map());

            for (const group of GROUPS) {
                const groupAssets = byGroup.get(group.key);
                if (!groupAssets || !groupAssets.length) continue;

                const section = document.createElement('section');
                section.className = 'media-kit-group';
                section.classList.add(`media-kit-group-${group.key}`);

                const heading = document.createElement('div');
                heading.className = 'media-kit-group-heading';
                const title = document.createElement('h2');
                title.textContent = group.title;
                const note = document.createElement('span');
                note.textContent = group.note;
                heading.appendChild(title);
                heading.appendChild(note);

                const grid = document.createElement('div');
                grid.className = 'media-kit-grid';
                groupAssets.forEach(asset => grid.appendChild(buildAssetCard(asset)));

                section.appendChild(heading);
                section.appendChild(grid);
                directoryEl.appendChild(section);
            }
        }

        async function loadList() {
            try {
                let buf;
                try {
                    buf = await fetchZip(ZIP_PRIMARY);
                } catch (_) {
                    buf = await fetchZip(ZIP_FALLBACK);
                }

                const zip = await JSZip.loadAsync(buf);
                const files = [];
                zip.forEach((path, file) => { if (!file.dir) files.push(path); });
                files.sort();

                await buildAssetDirectory(zip, files);
            } catch (e) {
                console.error(e);
                fallbackEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', loadList);
    </script>
</body>
</html>
