<!DOCTYPE html>
<html lang="en">
<head>
    <title>Media kit | Longevity World Cup</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .media-kit-panel {
            max-width: 820px;
            margin: 2.25rem auto;
            padding: 1.75rem;
            background: rgba(255, 255, 255, 0.74);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .media-kit-title {
            margin-top: 0;
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .media-kit-title[data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .media-kit-intro {
            margin: 0;
            color: #2b3748;
            text-align: center;
        }

        .media-kit-actions {
            margin: 1.25rem 0 1.5rem;
            text-align: center;
        }

        .media-kit-primary-download {
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
            padding: 0.78rem 1.25rem;
            border-radius: 999px;
            background: #0a7c0a;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(10, 124, 10, 0.16);
        }

        .media-kit-primary-download::before {
            content: "\f019";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 0.95em;
            line-height: 1;
        }

        .media-kit-primary-download:hover,
        .media-kit-primary-download:focus-visible {
            background: #096f09;
            color: #fff;
        }

        .media-kit-preview {
            margin-top: 0;
        }

        .media-kit-loading,
        .media-kit-fallback {
            margin-top: 0.75rem;
            color: #506176;
            text-align: center;
        }

        .media-kit-file-list {
            display: grid;
            gap: 0.5rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .media-file-row {
            box-sizing: border-box;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.75rem;
            align-items: center;
            padding: 0.65rem 0.75rem;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            background: rgba(248, 250, 252, 0.8);
        }

        .media-file-name {
            min-width: 0;
            color: #243446;
            overflow-wrap: break-word;
            word-break: normal;
            line-height: 1.35;
        }

        .media-file-button {
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.38rem;
            min-height: 44px;
            padding: 0.42rem 0.75rem;
            border: 1px solid rgba(0, 188, 212, 0.34);
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .media-file-button::before {
            content: "\f019";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 0.9em;
            line-height: 1;
        }

        .media-file-button:hover,
        .media-file-button:focus-visible {
            border-color: var(--primary-color);
            background: rgba(0, 188, 212, 0.08);
        }

        .media-kit-contact {
            margin: 1.5rem 0 0;
            text-align: center;
        }

        @media (max-width: 600px) {
            .media-kit-panel {
                margin: 1.5rem 1rem;
                padding: 1.35rem 1rem;
                border-radius: 14px;
            }

            .media-kit-title {
                font-size: 2rem;
            }

            .media-kit-primary-download {
                width: 100%;
                padding-inline: 0.9rem;
                font-size: 0.92rem;
                line-height: 1.2;
                white-space: normal;
                text-align: center;
            }

            .media-file-row {
                grid-template-columns: 1fr;
                gap: 0.55rem;
                align-items: stretch;
            }

            .media-file-name {
                font-size: 0.88rem;
                line-height: 1.32;
                display: -webkit-box;
                overflow: hidden;
                overflow-wrap: normal;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 3;
            }

            .media-file-button {
                width: 100%;
                min-width: 0;
                min-height: 44px;
                padding: 0 0.65rem;
                border-radius: 10px;
                justify-self: stretch;
                font-size: 0.85rem;
            }

            .media-file-button::before {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 360px) {
            .media-kit-primary-download {
                gap: 0.3rem;
                padding-inline: 0.55rem;
                font-size: 0.82rem;
                line-height: 1.2;
                white-space: normal;
                text-align: center;
            }

            .media-file-row {
                grid-template-columns: 1fr;
                gap: 0.55rem;
                align-items: stretch;
            }

            .media-file-button {
                width: 100%;
                min-width: 0;
                min-height: 44px;
                font-size: 0.85rem;
                justify-self: stretch;
            }

            .media-file-button::before {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <section class="media-kit-panel">
            <h1 class="media-kit-title" data-aos="fade" data-aos-duration="700" data-aos-delay="250">Media kit</h1>
            <p class="media-kit-intro">Press-ready assets for Longevity World Cup.</p>

            <p class="media-kit-actions">
                <a href="https://cdn.jsdelivr.net/gh/nopara73/LongevityWorldCup@master/LongevityWorldCup.Documentation/MediaKit.zip"
                   target="_blank" rel="noopener noreferrer"
                   class="media-kit-primary-download">
                    Download full media kit (ZIP)
                </a>
            </p>

            <!-- Live file list extracted from ZIP (auto-load) -->
            <div id="zipPreview" class="media-kit-preview">
                <div id="loading" class="media-kit-loading">Loading…</div>
                <ul id="fileList" class="media-kit-file-list"></ul>
                <div id="fallback" class="media-kit-fallback" style="display:none;">
                    Failed to preview. Use the ZIP link above.
                </div>
            </div>

            <p class="media-kit-contact">
                Press contact:
                <a href="mailto:hi@longevityworldcup.com">hi@longevityworldcup.com</a>
            </p>
        </section>
    </main>

    <!--FOOTER-->
    <!-- JSZip (client-side unzip) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" crossorigin="anonymous"></script>
    <script>
        history.replaceState({ modal: 'details' }, "", `/media`);

        const ZIP_PRIMARY = "https://cdn.jsdelivr.net/gh/nopara73/LongevityWorldCup@master/LongevityWorldCup.Documentation/MediaKit.zip";
        const ZIP_FALLBACK = "https://raw.githubusercontent.com/nopara73/LongevityWorldCup/master/LongevityWorldCup.Documentation/MediaKit.zip";

        const loadingEl = document.getElementById('loading');
        const listEl = document.getElementById('fileList');
        const fallbackEl = document.getElementById('fallback');

        function appendFileName(target, path) {
            for (const part of path.split(/([/_-])/)) {
                if (!part) continue;

                target.appendChild(document.createTextNode(part));
                if (part === "/" || part === "_" || part === "-") {
                    target.appendChild(document.createElement("wbr"));
                }
            }
        }

        async function fetchZip(url) {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error("HTTP " + res.status);
            return await res.arrayBuffer();
        }

        async function loadList() {
            try {
                let buf;
                try {
                    buf = await fetchZip(ZIP_PRIMARY);
                } catch (_) {
                    buf = await fetchZip(ZIP_FALLBACK);
                }

                const zip = await JSZip.loadAsync(buf);
                const files = [];
                zip.forEach((path, file) => { if (!file.dir) files.push(path); });
                files.sort();

                for (const path of files) {
                    const li = document.createElement('li');
                    li.className = 'media-file-row';

                    const name = document.createElement('span');
                    name.className = 'media-file-name';
                    appendFileName(name, path);

                    const btn = document.createElement('button');
                    btn.textContent = 'Download';
                    btn.className = 'media-file-button';
                    btn.addEventListener('click', async () => {
                        const file = zip.file(path);
                        const blob = await file.async('blob');
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = path.split('/').pop();
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        URL.revokeObjectURL(url);
                    });

                    li.appendChild(name);
                    li.appendChild(btn);
                    listEl.appendChild(li);
                }
            } catch (e) {
                console.error(e);
                fallbackEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', loadList);
    </script>
</body>
</html>
