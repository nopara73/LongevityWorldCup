<!DOCTYPE html>
<html lang="en">
<head>
    <title>Longevity World Cup - Character Customization</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .character-dashboard-main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-dashboard-main [data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .character-dashboard-title {
            max-width: 100%;
            margin: 0 0 1rem;
            text-align: center;
            line-height: 1.12;
            overflow-wrap: anywhere;
        }

        .character-dashboard-visual {
            margin: 0 auto 1rem;
            text-align: center;
        }

        .character-dashboard-visual .illustration {
            width: min(100%, 340px);
            margin-bottom: 0;
            box-sizing: border-box;
        }

        .character-dashboard-actions {
            width: min(100%, 408px);
            min-width: 0;
            max-width: 408px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.85rem;
            margin-top: 0.25rem;
        }

        .character-dashboard-actions .option-button {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-width: 0;
            max-width: none;
            margin: 0;
            padding-inline: 3rem;
            box-sizing: border-box;
            column-gap: 0.55rem;
            row-gap: 0.25rem;
            line-height: 1.25;
            text-align: center;
            white-space: normal;
        }

        .character-dashboard-actions .dashboard-action-label {
            display: block;
            width: 100%;
            min-width: 0;
            text-align: center;
        }

        .character-dashboard-actions .option-button i {
            position: absolute;
            top: 50%;
            right: 1.35rem;
            flex: 0 0 auto;
            transform: translateY(-50%);
        }

        .character-dashboard-actions .back-button {
            margin-left: 0;
        }

        .character-dashboard-actions .back-button i {
            right: auto;
            left: 1.35rem;
        }

        @media (max-width: 600px) {
            .character-dashboard-main {
                padding: 1.35rem 1.35rem 2.5rem;
            }

            .character-dashboard-title {
                margin-bottom: 0.75rem;
                font-size: clamp(1.65rem, 7vw, 1.9rem);
            }

            .character-dashboard-visual {
                margin-bottom: 0.9rem;
            }

            .character-dashboard-visual .illustration {
                width: min(100%, 260px);
                max-height: 240px;
                object-fit: cover;
            }

            .character-dashboard-actions {
                gap: 0.65rem;
                margin-top: 0;
            }

            .character-dashboard-actions .option-button {
                min-height: 50px;
                padding-block: 0.65rem;
                padding-inline: 2.75rem;
            }

            .character-dashboard-actions .option-button i {
                right: 1.2rem;
            }

            .character-dashboard-actions .back-button i {
                right: auto;
                left: 1.2rem;
            }
        }

        @media (min-width: 900px) {
            .character-dashboard-main {
                width: min(100%, 980px);
                max-width: 980px;
                display: grid;
                grid-template-columns: minmax(280px, 360px) minmax(340px, 420px);
                justify-content: center;
                align-items: center;
                gap: clamp(2rem, 4vw, 4rem);
                padding: clamp(1.75rem, 4vh, 3rem) 1rem 3rem;
                box-sizing: border-box;
            }

            .character-dashboard-title {
                grid-column: 1;
                margin-bottom: 1rem;
            }

            .character-dashboard-visual {
                grid-column: 1;
                margin-bottom: 0;
            }

            .character-dashboard-visual .illustration {
                width: min(100%, 330px);
                max-height: 330px;
                object-fit: cover;
            }

            .character-dashboard-actions {
                grid-column: 2;
                grid-row: 1 / span 2;
                width: 100%;
                max-width: 420px;
                margin: 0;
                padding: 1rem;
                border: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
                border-radius: var(--radius-panel, 10px);
                background:
                    linear-gradient(180deg, rgba(11, 125, 69, 0.045), rgba(255,254,250,0) 44%),
                    var(--card-bg, #fffefa);
                box-shadow: var(--surface-shadow, 0 4px 10px rgba(28,39,34,.08));
            }
        }

        @media (min-width: 640px) and (max-width: 932px) and (max-height: 480px) and (orientation: landscape) {
            .character-dashboard-main {
                padding: 0.6rem 1rem 1.25rem;
            }

            .character-dashboard-title {
                margin-bottom: 0.45rem;
                font-size: clamp(1.55rem, 8vh, 2rem);
                line-height: 1.05;
            }

            .character-dashboard-visual {
                margin-bottom: 0.65rem;
            }

            .character-dashboard-visual .illustration {
                width: auto;
                max-width: min(100%, 240px);
                max-height: 30dvh;
                object-fit: contain;
            }

            .character-dashboard-actions {
                gap: 0.55rem;
                margin-top: 0;
            }

            .character-dashboard-actions .option-button {
                min-height: 42px;
                padding-block: 0.55rem;
            }

            .pro-discount-box {
                margin-top: 0;
                padding: 0.6rem 0.75rem;
                font-size: 0.82rem;
            }
        }

        .autocomplete-wrapper {
            position: relative;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* Make the container fill the form width */
        }

        .autocomplete-container {
            position: relative;
            padding: 2rem 2rem;
            font-size: 1.2rem;
            width: 80%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center; /* Vertically center the text */
        }

            .autocomplete-container input {
                width: 100%;
                padding: 0.75rem 1rem;
                border: 1px solid var(--control-border, #cbd2c8);
                border-radius: var(--radius-control, 999px);
                background: var(--control-bg, #fffefa);
                color: var(--dark-text-color, #1c2722);
                font-size: 1rem;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }

                .autocomplete-container input:focus {
                    outline: none;
                    border-color: var(--primary-color, #0b7d45);
                    box-shadow: var(--focus-ring, 0 0 0 4px rgba(67, 238, 131, 0.26));
                }

        .autocomplete-items {
            position: absolute;
            background: var(--card-bg, #fffefa);
            box-shadow: var(--surface-shadow-lifted, 0 6px 14px rgba(28, 39, 34, 0.12));
            border: 1px solid var(--surface-border-strong, rgba(28, 39, 34, 0.18));
            max-height: 150px; /* scroll if too tall */
            overflow-y: auto;
            z-index: 1003;
            left: 0;
            right: 0; /* ensures it spans exactly the container */
            box-sizing: border-box; /* include any padding/borders in that width */
            top: calc(100% - 2px); /* slide up by the input’s 2px bottom border so it’s flush */
            border-radius: 0 0 var(--radius-panel, 10px) var(--radius-panel, 10px);
            width: 100%;
        }

            .autocomplete-items div {
                padding: 0.75rem 1rem; /* generous touch targets */
                font-size: 0.95rem;
            }

                .autocomplete-items div:not(:last-child) {
                    border-bottom: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
                }

                .autocomplete-items div:hover,
                .autocomplete-active {
                    background-color: rgba(11, 125, 69, 0.12);
                    color: #1c2722;
                }

        .error-message {
            display: block;
            color: var(--error-text, #8f1f18);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .pro-discount-box {
            width: 100%;
            max-width: none;
            margin: -0.1rem 0 0.35rem;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(11, 125, 69, 0.22);
            border-radius: 8px;
            background: var(--success-bg, rgba(11, 125, 69, 0.1));
            color: #24332c;
            font-size: 0.88rem;
            line-height: 1.35;
            text-align: left;
            box-sizing: border-box;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
        }

        .pro-discount-box .pro-discount-breakdown {
            margin: 0;
            text-align: left;
            white-space: pre-line;
        }

        .pro-discount-box .pro-discount-breakdown .pro-discount-line {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.42rem;
            margin-bottom: 0.5rem;
        }

        .pro-discount-box .pro-discount-breakdown .pro-discount-line:last-child {
            margin-bottom: 0;
        }

        .pro-discount-box .pro-discount-breakdown .pro-discount-badge-slot {
            width: 22px;
            min-width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .pro-old-price {
            text-decoration: line-through;
            opacity: 0.75;
            margin-right: 0.2rem;
        }

        .pro-new-price {
            font-weight: 700;
        }

        .option-button .pro-old-price,
        .option-button .pro-new-price {
            font-weight: inherit;
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main class="character-dashboard-main">
        <h1 id="character-title" class="character-dashboard-title" data-aos="fade" data-aos-duration="700" data-aos-delay="250">Athlete selection</h1>
        <div class="character-dashboard-visual" data-aos="fade" data-aos-duration="700" data-aos-delay="300">
            <picture>
                <source srcset="../assets/content-images/headshot.webp" type="image/webp">
                <source srcset="../assets/content-images/headshot.jpg" type="image/jpeg">
                <img src="../assets/content-images/headshot.jpg" alt="Headshot" class="illustration" loading="lazy">
            </picture>
        </div>
        <div class="options-container character-dashboard-actions" data-aos="fade" data-aos-duration="700" data-aos-delay="350">
            <button class="option-button grey" onclick="window.location.href='/edit-profile'">
                <span class="dashboard-action-label">Edit profile</span><i class="fas fa-pen"></i>
            </button>
            <button id="characterBackButton" class="option-button back-button" onclick="window.goBackOrHome()">
                <i class="fas fa-arrow-left"></i><span class="dashboard-action-label">Back</span>
            </button>
        </div>
    </main>
    <!--FOOTER-->
    <script>
        let athlete = null;

        try {
            const selectedAthleteJson = sessionStorage.getItem('selectedAthlete');
            athlete = selectedAthleteJson ? JSON.parse(selectedAthleteJson) : null;
        } catch {
            athlete = null;
        }

        if (!athlete || typeof athlete !== 'object' || !athlete.Name) {
            sessionStorage.removeItem('selectedAthlete');
            sessionStorage.removeItem('tempAthlete');
            window.location.replace('/select-athlete');
            athlete = {};
        }

        const PENDING_PAYMENT_OFFER_KEY = 'pendingPaymentOffer';

        if (window.captureFreePassFromUrl) {
            window.captureFreePassFromUrl();
        }
        if (window.captureDiscountFromUrl) {
            window.captureDiscountFromUrl();
        }

        function getAthleteDisplayName() {
            if (athlete?.DisplayName && athlete.DisplayName.trim()) {
                return athlete.DisplayName.trim();
            }

            return athlete?.Name || '';
        }

        function setPendingPaymentOffer(offer) {
            const effectiveOffer = window.applyPaymentAdjustmentsToPaymentOffer
                ? window.applyPaymentAdjustmentsToPaymentOffer(offer)
                : window.applyFreePassToPaymentOffer
                    ? window.applyFreePassToPaymentOffer(offer)
                    : offer;
            sessionStorage.setItem(PENDING_PAYMENT_OFFER_KEY, JSON.stringify(effectiveOffer));
        }

        function clearPendingPaymentOffer() {
            sessionStorage.removeItem(PENDING_PAYMENT_OFFER_KEY);
        }

        document.addEventListener('DOMContentLoaded', function () {
            const createPriceHtmlFallback = (result) => {
                const oldText = `$${result.basePriceUsd}`;
                if (result.finalPriceUsd < result.basePriceUsd) {
                    return `<span class="pro-old-price">${oldText}</span> <span class="pro-new-price">${result.finalPriceText}</span>`;
                }
                return `<span class="pro-new-price">${oldText}</span>`;
            };
            const ensureProDiscountsLoaded = () => {
                return Promise.resolve();
            };

            const athleteDisplayName = getAthleteDisplayName();
            document.getElementById('character-title').textContent = athleteDisplayName;
            document.querySelector('picture').innerHTML = `
                                                                                                                                                                                                                                        <img src="${athlete.ProfilePic}"
                                                                                                                                                                                                                                                 alt="${athleteDisplayName} headshot"
                                                                                                                                                                                                                                                class="illustration"
                                                                                                                                                                                                                                                loading="lazy">`;

            const optionsContainer = document.querySelector('.options-container');
            const backButton = document.getElementById('characterBackButton');
            const ready = window.modulesReady || Promise.resolve();

            ready.then(() => ensureProDiscountsLoaded()).then(() => {
                if (!optionsContainer || !backButton) return;

                const urlParams = new URLSearchParams(window.location.search || '');
                const isDemoPro = urlParams.get('demopro') === '1';
                const isPro = isDemoPro || (window.isAthletePro ? window.isAthletePro(athlete) : false);
                const createButton = (label, className, href, beforeNavigate) => {
                    const button = document.createElement('button');
                    button.className = className;
                    button.innerHTML = label;
                    button.addEventListener('click', () => {
                        if (typeof beforeNavigate === 'function') beforeNavigate();
                        window.location.href = href;
                    });
                    return button;
                };
                const createGoProDiscountSummary = (result) => {
                    if (!window.proDiscounts || typeof window.proDiscounts.buildDiscountBreakdown !== 'function') {
                        return null;
                    }
                    const wrapper = document.createElement('div');
                    wrapper.className = 'pro-discount-box';

                    const breakdownLine = document.createElement('p');
                    breakdownLine.className = 'pro-discount-breakdown';
                    if (typeof window.proDiscounts.createBreakdownHtml === 'function') {
                        breakdownLine.innerHTML = window.proDiscounts.createBreakdownHtml(result);
                    } else {
                        breakdownLine.textContent = window.proDiscounts.createBreakdownText(result);
                    }

                    wrapper.appendChild(breakdownLine);
                    return wrapper;
                };

                if (isPro) {
                    const phenoButton = createButton(
                        '<span class="dashboard-action-label">Submit new Pheno&nbsp;Age</span><i class="fas fa-arrow-right" aria-hidden="true"></i>',
                        'option-button grey',
                        '/pheno-age?update=1',
                        () => clearPendingPaymentOffer()
                    );
                    const bortzButton = createButton(
                        '<span class="dashboard-action-label">Submit new Pheno&nbsp;Age&nbsp;+&nbsp;Bortz&nbsp;Age</span><i class="fas fa-arrow-right" aria-hidden="true"></i>',
                        'option-button grey',
                        '/bortz-age?update=1',
                        () => clearPendingPaymentOffer()
                    );
                    optionsContainer.insertBefore(phenoButton, backButton);
                    optionsContainer.insertBefore(bortzButton, backButton);
                } else {
                    const submitButton = createButton(
                        '<span class="dashboard-action-label">Submit new results</span><i class="fas fa-arrow-right" aria-hidden="true"></i>',
                        'option-button grey',
                        '/pheno-age?update=1',
                        () => clearPendingPaymentOffer()
                    );
                    const goProDiscountResult =
                        window.proDiscounts && typeof window.proDiscounts.buildDiscountBreakdown === 'function'
                            ? window.proDiscounts.buildDiscountBreakdown(athlete, { isOnLeaderboard: true })
                            : null;
                    const goProPriceHtml = window.hasFreePass && window.hasFreePass()
                        ? '<span class="pro-new-price">free</span>'
                        : goProDiscountResult
                            ? (typeof window.proDiscounts.createPriceHtml === 'function' ? window.proDiscounts.createPriceHtml(goProDiscountResult) : createPriceHtmlFallback(goProDiscountResult))
                            : null;
                    const goProButton = createButton(
                        goProPriceHtml
                            ? `<span class="dashboard-action-label">Apply for Pro&nbsp;${goProPriceHtml}</span><i class="fas fa-bolt"></i>`
                            : '<span class="dashboard-action-label">Apply for Pro</span><i class="fas fa-bolt"></i>',
                        'option-button green',
                        '/bortz-age?update=1',
                        () => {
                            const amountUsd =
                                goProDiscountResult && Number.isFinite(goProDiscountResult.finalPriceUsd)
                                    ? goProDiscountResult.finalPriceUsd
                                    : 100;
                            let paymentOffer = {
                                source: 'go-pro-upgrade',
                                offerType: 'pro',
                                currency: 'USD',
                                amountUsd
                            };
                            if (goProDiscountResult
                                && Array.isArray(goProDiscountResult.components)
                                && goProDiscountResult.components.some(component => component && component.kind === 'discountCode')
                                && window.addActiveDiscountMetadataToPaymentOffer) {
                                paymentOffer = window.addActiveDiscountMetadataToPaymentOffer(paymentOffer);
                            }
                            setPendingPaymentOffer(paymentOffer);
                        }
                    );
                    optionsContainer.insertBefore(submitButton, backButton);
                    optionsContainer.insertBefore(goProButton, backButton);
                    const goProDiscountSummary = goProDiscountResult ? createGoProDiscountSummary(goProDiscountResult) : null;
                    if (goProDiscountSummary) {
                        optionsContainer.insertBefore(goProDiscountSummary, backButton);
                    }
                }
            });
        });
    </script>
</body>
</html>
