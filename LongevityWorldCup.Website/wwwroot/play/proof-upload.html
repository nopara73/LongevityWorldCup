<!DOCTYPE html>
<html lang="en">
<head>
    <title>Longevity World Cup - Proof Upload</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .proof-upload-main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2.5rem 1rem 3.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .proof-upload-main [data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .proof-upload-title {
            margin: 0 0 1.25rem;
            text-align: center;
        }

        .proof-upload-visual {
            margin: 0 auto 1.45rem;
            text-align: center;
        }

        .proof-upload-visual .illustration {
            width: min(100%, 408px);
            max-width: 408px;
            border: 1px solid rgba(15, 23, 42, 0.24);
            margin-bottom: 0;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
            box-sizing: border-box;
        }

        .proof-upload-copy {
            width: min(100%, 408px);
            max-width: 408px;
            margin: 0 auto;
            padding: 0.9rem 1.05rem 0.35rem;
            border: 1px solid rgba(15, 23, 42, 0.14);
            border-bottom: 0;
            border-radius: 8px 8px 0 0;
            background: rgba(248, 250, 252, 0.92);
            box-sizing: border-box;
            color: #334155;
            line-height: 1.45;
            text-align: center;
        }

        .proof-upload-copy.smaller-text {
            width: min(100%, 408px);
            max-width: 408px;
            margin: 0 auto 1.35rem;
            padding: 0.35rem 1.05rem 0.9rem;
            border: 1px solid rgba(15, 23, 42, 0.14);
            border-top: 0;
            border-radius: 0 0 8px 8px;
            background: rgba(248, 250, 252, 0.92);
            box-sizing: border-box;
            color: #475569;
            font-size: 0.9rem;
            line-height: 1.45;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .proof-upload-copy:empty,
        .proof-upload-copy.smaller-text:empty {
            display: none;
        }

        .options-container.proof-upload-primary-action,
        .options-container.proof-upload-final-actions {
            width: min(100%, 408px);
            min-width: 0;
            max-width: 408px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.85rem;
            margin: 0 auto;
        }

        .proof-upload-primary-action .option-button,
        .proof-upload-final-actions .option-button {
            width: 100%;
            min-width: 0;
            max-width: none;
            margin: 0;
            box-sizing: border-box;
        }

        .proof-upload-final-actions .back-button {
            background: #fff;
            border: 1px solid rgba(96, 125, 139, 0.16);
            color: #526d7a;
            font-weight: 600;
            margin-left: 0;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
        }

        .proof-upload-primary-action .option-button {
            font-weight: 700;
            box-shadow: 0 6px 12px rgba(15, 23, 42, 0.14);
        }

        .proof-upload-primary-action .camera-capture-action {
            display: none;
        }

        .proof-upload-primary-action .upload-choice-divider {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            min-height: 1.25rem;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1;
            text-transform: uppercase;
        }

        .proof-upload-primary-action .upload-choice-divider::before,
        .proof-upload-primary-action .upload-choice-divider::after {
            content: "";
            height: 1px;
            flex: 1 1 auto;
            background: rgba(100, 116, 139, 0.22);
        }

        .proof-upload-primary-action .option-button i {
            margin-right: 0.45rem;
        }

        .proof-upload-primary-action .option-button.green {
            box-shadow: 0 6px 12px rgba(46, 125, 50, 0.18);
        }

        .proof-upload-final-actions .option-button:disabled {
            background: #eef2f7 !important;
            border: 1px solid rgba(100, 116, 139, 0.14);
            color: #64748b;
            box-shadow: none !important;
            cursor: not-allowed;
            opacity: 1;
            transform: none;
        }

        .proof-upload-final-actions .option-button:disabled:hover {
            background: #eef2f7 !important;
            border-color: rgba(100, 116, 139, 0.14);
            color: #64748b;
            box-shadow: none !important;
            transform: none;
        }

        #proofImageContainer {
            width: min(100%, 408px);
            max-width: 408px;
            margin: 1rem auto 0;
            padding: 0;
            border: 0;
            min-inline-size: 0;
            text-align: center;
        }

            #proofImageContainer:empty,
            #proofImageContainer:not(:has(img)) {
                display: none !important;
            }

            #proofImageContainer p {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 42px;
                margin: 0 0 0.75rem;
                padding: 0.6rem 0.85rem;
                border: 1px solid rgba(22, 163, 74, 0.22);
                border-radius: 8px;
                background: rgba(240, 253, 244, 0.94);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 1px 2px rgba(15, 23, 42, 0.04);
                box-sizing: border-box;
                color: #166534;
                font-weight: 700;
                line-height: 1.25;
            }

            #proofImageContainer div {
                position: relative;
                display: block !important;
                margin: 0 !important;
                padding: 0.45rem;
                border: 1px solid rgba(15, 23, 42, 0.14);
                border-radius: 8px;
                background: #fff;
                box-shadow: 0 6px 16px rgba(15, 23, 42, 0.1);
                overflow: hidden;
            }

            #proofImageContainer div + div {
                margin-top: 0.85rem !important;
            }

            #proofImageContainer img {
                display: block !important;
                width: 100%;
                height: clamp(160px, 46vw, 240px);
                max-width: 100% !important;
                border: 0 !important;
                border-radius: 6px;
                background: #f8fafc;
                object-fit: contain;
            }

            #proofImageContainer button {
                position: absolute;
                top: 0.75rem !important;
                right: 0.75rem !important;
                min-height: 44px;
                min-width: 44px;
                padding: 0.45rem 0.75rem !important;
                background-color: #b91c1c !important;
                color: var(--light-text-color);
                border: none;
                border-radius: 999px !important;
                box-shadow: 0 3px 8px rgba(127, 29, 29, 0.28);
                box-sizing: border-box;
                cursor: pointer;
                font-size: 0.8rem;
                font-weight: 700;
            }

        #biomarker-checklist {
            width: min(100%, 408px);
            max-width: 408px;
            margin: 1.25rem auto 1.35rem;
            padding: 0.9rem 1.05rem;
            border: 1px solid rgba(15, 23, 42, 0.14);
            border-radius: 8px;
            background: rgba(248, 250, 252, 0.92);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), 0 1px 2px rgba(15, 23, 42, 0.04);
            box-sizing: border-box;
            color: #222;
        }

        #biomarker-checklist h4 {
            margin: 0 0 0.35rem !important;
            color: #111827;
        }

        #biomarker-checklist p {
            margin: 0 !important;
            color: #334155;
            line-height: 1.35;
        }

        @media (max-width: 600px) {
            .proof-upload-main {
                padding: 1.5rem 1.35rem 4.25rem;
            }

            .proof-upload-title {
                margin-bottom: 1rem;
                font-size: 2rem;
            }

            .proof-upload-visual {
                margin-bottom: 1rem;
            }

            .proof-upload-visual .illustration {
                width: min(100%, 312px);
            }

            .proof-upload-copy {
                max-width: 100%;
                padding-right: 0.95rem;
                padding-left: 0.95rem;
            }

            .proof-upload-copy.smaller-text {
                margin-bottom: 1.25rem;
            }

            #biomarker-checklist {
                margin: 1.05rem auto 1.1rem;
            }
        }

        @media (max-width: 360px) {
            .proof-upload-main {
                padding-top: 1.5rem;
                padding-bottom: 5.25rem;
            }

            .proof-upload-visual {
                margin-bottom: 1rem;
            }

            .proof-upload-visual .illustration {
                width: min(100%, 260px);
            }

            .proof-upload-copy {
                line-height: 1.4;
            }

            .proof-upload-copy.smaller-text {
                margin-bottom: 1.1rem;
            }

            .options-container.proof-upload-primary-action,
            .options-container.proof-upload-final-actions {
                gap: 0.7rem;
            }

            .proof-upload-primary-action .option-button,
            .proof-upload-final-actions .option-button {
                min-height: 56px;
            }

            #biomarker-checklist {
                margin: 1rem auto 1.1rem;
                padding: 0.8rem 0.95rem;
            }
        }

        @media (min-width: 640px) and (max-width: 932px) and (max-height: 480px) and (orientation: landscape) {
            .proof-upload-main {
                padding: 0.6rem 1rem 1.25rem;
            }

            .proof-upload-title {
                margin-bottom: 0.45rem;
                font-size: clamp(1.55rem, 8vh, 2rem);
                line-height: 1.05;
            }

            .proof-upload-visual {
                margin-bottom: 0.55rem;
            }

            .proof-upload-visual .illustration {
                width: auto;
                max-width: min(100%, 240px);
                max-height: 26dvh;
                object-fit: contain;
            }

            .proof-upload-copy {
                padding: 0.55rem 0.75rem 0.2rem;
                font-size: 0.9rem;
                line-height: 1.28;
            }

            .proof-upload-copy.smaller-text {
                margin-bottom: 0.65rem;
                padding: 0.2rem 0.75rem 0.55rem;
                font-size: 0.82rem;
                line-height: 1.28;
            }

            .options-container.proof-upload-primary-action,
            .options-container.proof-upload-final-actions {
                gap: 0.55rem;
            }

            .proof-upload-primary-action .option-button,
            .proof-upload-final-actions .option-button {
                min-height: 42px;
                padding-block: 0.55rem;
            }

            #biomarker-checklist {
                margin: 0.75rem auto;
                padding: 0.65rem 0.8rem;
            }
        }

        @media (pointer: coarse) {
            .proof-upload-primary-action .camera-capture-action {
                display: inline-flex;
            }

            .proof-upload-primary-action .upload-choice-divider {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main class="proof-upload-main">
        <h1 id="character-title" class="proof-upload-title" data-aos="fade" data-aos-duration="700" data-aos-delay="250">Athlete selection</h1>
        <div class="proof-upload-visual" data-aos="fade" data-aos-duration="700" data-aos-delay="300">
            <picture>
                <source srcset="../assets/content-images/proof.webp" type="image/webp">
                <source srcset="../assets/content-images/proof.jpg" type="image/jpeg">
                <img src="../assets/content-images/proof.jpg" alt="Illustration of uploading lab proof documents" class="illustration" loading="lazy">
            </picture>
        </div>
        <p id="mainProofInstructions" class="proof-upload-copy" data-aos="fade" data-aos-duration="700" data-aos-delay="350"></p>
        <p id="subProofInstructions" class="proof-upload-copy smaller-text" data-aos="fade" data-aos-duration="700" data-aos-delay="400"></p>

        <div class="options-container proof-upload-primary-action" data-aos="fade" data-aos-duration="700" data-aos-delay="450">
            <input type="file" id="proofPicInput" accept="image/jpeg,image/png,image/webp,application/pdf,.jpg,.jpeg,.png,.webp,.pdf" style="display: none;" multiple>
            <input type="file" id="proofCameraInput" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" capture="environment" style="display: none;">
            <button type="button" id="takeProofPhotoButton" class="option-button grey green camera-capture-action">
                <i class="fa fa-camera"></i>
                Take proof photo
            </button>
            <span class="upload-choice-divider" aria-hidden="true">or</span>
            <button type="button" id="uploadProofButton" class="option-button grey green">
                <i class="fa fa-file-upload"></i>
                Upload proofs
            </button>
        </div>

        <fieldset id="proofImageContainer"></fieldset>

        <div id="biomarker-checklist"></div>

        <div class="options-container proof-upload-final-actions" data-aos="fade" data-aos-duration="700" data-aos-delay="450">
            <button id="submitButton" type="submit" class="option-button green"></button>
            <button class="option-button back-button" onclick="window.goBackOrHome()">
                <i class="fas fa-arrow-left"></i>&nbsp;Back
            </button>
        </div>
    </main>
    <!--FOOTER-->
    <script>
        let athlete = null;

        try {
            const selectedAthleteJson = getSessionItem('selectedAthlete');
            athlete = selectedAthleteJson ? JSON.parse(selectedAthleteJson) : null;
        } catch {
            athlete = null;
        }

        if (!isValidSelectedAthlete(athlete)) {
            removeSessionItem('selectedAthlete');
            removeSessionItem('tempAthlete');
            window.location.replace('/select-athlete');
            athlete = {};
        }

        let proofPics = [];
        let isResultUploadSubmitting = false;
        const PENDING_PAYMENT_OFFER_KEY = 'pendingPaymentOffer';
        const PENDING_PAYMENT_INVOICE_KEY = 'pendingPaymentInvoice';
        const PENDING_PAYMENT_INVOICE_STORAGE_KEY = 'pendingPaymentInvoicePersistent';

        function setBrowserStorageItem(storageName, key, value) {
            try {
                window[storageName].setItem(key, value);
            } catch (_) {
            }
        }

        function removeBrowserStorageItem(storageName, key) {
            try {
                window[storageName].removeItem(key);
            } catch (_) {
            }
        }

        function getBrowserStorageItem(storageName, key) {
            try {
                return window[storageName].getItem(key);
            } catch (_) {
                return null;
            }
        }

        function setSessionItem(key, value) { setBrowserStorageItem('sessionStorage', key, value); }
        function getSessionItem(key) { return getBrowserStorageItem('sessionStorage', key); }
        function setLocalItem(key, value) { setBrowserStorageItem('localStorage', key, value); }
        function getLocalItem(key) { return getBrowserStorageItem('localStorage', key); }
        function removeSessionItem(key) { removeBrowserStorageItem('sessionStorage', key); }
        function removeLocalItem(key) { removeBrowserStorageItem('localStorage', key); }

        function isValidSelectedAthlete(value) {
            return value
                && typeof value === 'object'
                && !Array.isArray(value)
                && typeof value.Name === 'string'
                && value.Name.trim();
        }

        function normalizeContactEmail(value) {
            if (typeof value !== 'string') return null;
            let contactEmail = (value || '').trim();
            if (!contactEmail) return null;
            const bracketedEmail = /<([^<>]+)>/.exec(contactEmail);
            if (bracketedEmail) {
                contactEmail = bracketedEmail[1].trim();
            }
            if (/^mailto:/i.test(contactEmail)) {
                contactEmail = contactEmail.replace(/^mailto:/i, '').split('?')[0].trim();
            }

            const emailInput = document.createElement('input');
            emailInput.type = 'email';
            emailInput.value = contactEmail;
            return emailInput.checkValidity() ? contactEmail : null;
        }

        function readStoredContactEmail() {
            const sessionContactEmail = normalizeContactEmail(getSessionItem('contactEmail'));
            if (sessionContactEmail) return sessionContactEmail;

            const localContactEmail = normalizeContactEmail(getLocalItem('contactEmail'));
            if (localContactEmail) {
                removeSessionItem('contactEmail');
                return localContactEmail;
            }

            removeSessionItem('contactEmail');
            removeLocalItem('contactEmail');
            return null;
        }

        function getAthleteContactEmailStorageKey(athleteName) {
            const name = typeof athleteName === 'string' ? athleteName.trim() : '';
            return name ? 'contactEmailFor:' + name : null;
        }

        function readStoredAthleteContactEmail(athleteName) {
            const key = getAthleteContactEmailStorageKey(athleteName);
            return key ? normalizeContactEmail(getLocalItem(key)) : null;
        }

        function rememberAthleteContactEmail(athleteName, email) {
            const key = getAthleteContactEmailStorageKey(athleteName);
            const contactEmail = normalizeContactEmail(email);
            if (key && contactEmail) {
                setLocalItem(key, contactEmail);
            }
        }

        function readResultUploadContactEmail() {
            return normalizeContactEmail(athlete && athlete.AccountEmail)
                || normalizeContactEmail(athlete && athlete.MediaContact)
                || readStoredAthleteContactEmail(athlete && athlete.Name)
                || readStoredContactEmail();
        }

        function clearStoredBiomarkerHandoff() {
            removeSessionItem('biomarkerData');
            removeSessionItem('chronoPhenoDifference');
            removeSessionItem('chronoBortzDifference');
        }

        function clearPendingPaymentOffer() {
            removeSessionItem(PENDING_PAYMENT_OFFER_KEY);
        }

        function hasStoredBiomarkerDates(biomarkerData) {
            return biomarkerData
                && Array.isArray(biomarkerData.Biomarkers)
                && biomarkerData.Biomarkers.every(entry => hasStoredBiomarkerDate(entry && entry.Date));
        }

        function hasStoredBiomarkerValues(biomarkerData) {
            return biomarkerData
                && Array.isArray(biomarkerData.Biomarkers)
                && biomarkerData.Biomarkers.every(entry => entry
                    && Object.keys(entry).some(key => key !== 'Date' && hasStoredBiomarkerValue(entry[key])));
        }

        function hasStoredBiomarkerValue(value) {
            if (value === null || value === undefined) return false;
            if (typeof value === 'boolean') return false;
            if (typeof value !== 'number' && typeof value !== 'string') return false;
            if (typeof value === 'string' && !value.trim()) return false;
            return Number.isFinite(Number(value));
        }

        function readStoredAgeDifference(key) {
            const value = getSessionItem(key);
            if (value === null || value === undefined) return null;

            const text = String(value).trim();
            if (text && Number.isFinite(Number(text))) {
                return text;
            }

            removeSessionItem(key);
            return null;
        }

        function hasStoredBiomarkerDate(value) {
            if (typeof value !== 'string') return false;
            const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value.trim());
            if (!match) return false;

            const year = Number(match[1]);
            const month = Number(match[2]);
            const day = Number(match[3]);
            const parsedDate = new Date(Date.UTC(year, month - 1, day));
            if (parsedDate.getUTCFullYear() !== year || parsedDate.getUTCMonth() !== month - 1 || parsedDate.getUTCDate() !== day) return false;

            const todayUtc = new Date();
            todayUtc.setUTCHours(0, 0, 0, 0);
            return parsedDate <= todayUtc;
        }

        function readPendingPaymentOffer() {
            const rawOffer = getSessionItem(PENDING_PAYMENT_OFFER_KEY);
            if (!rawOffer) return null;

            try {
                const paymentOffer = JSON.parse(rawOffer);
                if (isUsablePaymentOffer(paymentOffer)) {
                    return paymentOffer;
                }
            } catch (_) {
            }

            clearPendingPaymentOffer();
            return null;
        }

        function isUsablePaymentOffer(paymentOffer) {
            return paymentOffer
                && typeof paymentOffer === 'object'
                && !Array.isArray(paymentOffer)
                && typeof paymentOffer.source === 'string'
                && paymentOffer.source.trim()
                && typeof paymentOffer.offerType === 'string'
                && paymentOffer.offerType.trim()
                && typeof paymentOffer.currency === 'string'
                && paymentOffer.currency.trim()
                && typeof paymentOffer.amountUsd === 'number'
                && Number.isFinite(paymentOffer.amountUsd)
                && paymentOffer.amountUsd >= 0;
        }

        function readAdjustedPendingPaymentOffer() {
            const paymentOffer = readPendingPaymentOffer();
            if (!paymentOffer) return null;

            try {
                const adjustedPaymentOffer = window.applyPaymentAdjustmentsToPaymentOffer
                    ? window.applyPaymentAdjustmentsToPaymentOffer(paymentOffer)
                    : window.applyFreePassToPaymentOffer
                        ? window.applyFreePassToPaymentOffer(paymentOffer)
                        : paymentOffer;
                if (!adjustedPaymentOffer) return null;
                if (isUsablePaymentOffer(adjustedPaymentOffer)) return adjustedPaymentOffer;
            } catch (_) {
            }

            customAlert('Payment details could not be prepared. Please try again.');
            return undefined;
        }

        function normalizeCheckoutLink(value) {
            if (typeof value !== 'string') return null;
            const trimmed = value.trim();
            if (!trimmed) return null;
            try {
                const checkoutUrl = new URL(trimmed, window.location.origin);
                return checkoutUrl.protocol === 'http:' || checkoutUrl.protocol === 'https:'
                    ? checkoutUrl.href
                    : null;
            } catch (_) {
                return null;
            }
        }

        function getCheckoutLink(submitResult) {
            return submitResult && submitResult.paymentRequired
                ? normalizeCheckoutLink(submitResult.checkoutLink)
                : null;
        }

        function getInvoiceId(submitResult) {
            return submitResult
                && typeof submitResult.invoiceId === 'string'
                && submitResult.invoiceId.trim()
                ? submitResult.invoiceId.trim()
                : null;
        }

        if (window.captureFreePassFromUrl) {
            window.captureFreePassFromUrl();
        }
        if (window.captureDiscountFromUrl) {
            window.captureDiscountFromUrl();
        }

        function getAthleteDisplayName() {
            if (typeof athlete?.DisplayName === 'string' && athlete.DisplayName.trim()) {
                return athlete.DisplayName.trim();
            }

            return typeof athlete?.Name === 'string' ? athlete.Name : '';
        }

        setSubmitButtonLabel();

        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => {
                const viewTarget = document.querySelector('h1');
                viewTarget.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);

            document.getElementById('character-title').textContent = getAthleteDisplayName();

            const mainProofInstructions = document.getElementById('mainProofInstructions');
            if (mainProofInstructions) {
                mainProofInstructions.innerHTML = window.getMainProofInstructionsInnerHTML();
            }

            const subProofInstructions = document.getElementById('subProofInstructions');
            if (subProofInstructions) {
                subProofInstructions.innerHTML = window.getSubProofInstructionsInnerHTML();
            }

            var submitButton = document.getElementById('submitButton');
            const uploadProofButton = document.getElementById('uploadProofButton');
            const takeProofPhotoButton = document.getElementById('takeProofPhotoButton');
            const proofPicInput = document.getElementById('proofPicInput');
            const proofCameraInput = document.getElementById('proofCameraInput');
            const proofImageContainer = document.getElementById('proofImageContainer');
            const biomarkerChecklistContainer = document.getElementById('biomarker-checklist');

            // Proof Tracker: biomarkers present in sessionStorage, ordered by bortz-age UI
            const checklistItems = window.getProofChecklistLabelsFromSession && window.getProofChecklistLabelsFromSession() || [];
            window.setupProofUploadHTML(submitButton, uploadProofButton, proofPicInput, proofImageContainer, proofPics, biomarkerChecklistContainer, checklistItems, {
                cameraButton: takeProofPhotoButton,
                cameraInput: proofCameraInput
            });

            submitButton.addEventListener('click', async function () {
                if (isResultUploadSubmitting || submitButton.disabled) return;

                if (!isValidSelectedAthlete(athlete)) {
                    customAlert('No athlete selected. Please return and choose your athlete.')
                        .then(() => window.location.href = '/select-athlete');
                    return;
                }

                let biomarkerData = null;
                try {
                    biomarkerData = JSON.parse(getSessionItem('biomarkerData'));
                } catch (_) {
                    biomarkerData = null;
                }
                if (!biomarkerData || !Array.isArray(biomarkerData.Biomarkers) || !biomarkerData.Biomarkers.length || !hasStoredBiomarkerDates(biomarkerData) || !hasStoredBiomarkerValues(biomarkerData)) {
                    clearStoredBiomarkerHandoff();
                    customAlert('Biomarker data is missing. Please fill out the biomarker form first.')
                        .then(() => window.location.href = '/dashboard');
                    return;
                }

                const paymentOffer = readAdjustedPendingPaymentOffer();
                if (paymentOffer === undefined) return;

                const submissionId = window.createApplicationSubmissionId();
                const submissionKind = 'result-upload';
                const applicantData = {
                    name: athlete.Name,
                    accountEmail: readResultUploadContactEmail(),
                    chronoPhenoDifference: readStoredAgeDifference('chronoPhenoDifference'),
                    chronoBortzDifference: readStoredAgeDifference('chronoBortzDifference'),
                    submissionId: submissionId,
                    biomarkers: biomarkerData.Biomarkers,
                    proofPics: proofPics,
                    paymentOffer: paymentOffer,
                    freePass: window.getFreePassValue ? window.getFreePassValue() : null,
                    discount: window.getDiscountValue ? window.getDiscountValue() : null
                };

                const submitButton = document.getElementById('submitButton');
                const uploadProofButton = document.getElementById('uploadProofButton');
                const takeProofPhotoButton = document.getElementById('takeProofPhotoButton');
                isResultUploadSubmitting = true;
                submitButton.disabled = true;
                uploadProofButton.disabled = true;
                if (takeProofPhotoButton) takeProofPhotoButton.disabled = true;
                submitButton.textContent = 'Submitting...';
                showLoading();

                void window.trySendApplicationSubmissionReport(applicantData, submissionId, 'started', submissionKind);

                fetchWithTimeout('/api/application/application', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(applicantData)
                }, window.APPLICATION_SUBMISSION_TIMEOUT_MS || 180000)
                    .then(response => {
                        hideLoading();
                        if (response.ok) {
                            response.json().catch(() => ({})).then(submitResult => {
                                const checkoutLink = getCheckoutLink(submitResult);
                                const invoiceId = getInvoiceId(submitResult);
                                const nextStepMessage =
                                    checkoutLink
                                        ? 'You\'ll be redirected to the payment page'
                                        : 'Your results were received';
                                customAlert(nextStepMessage).then(() => {
                                    const reviewContactEmail = normalizeContactEmail(applicantData.accountEmail);
                                    if (reviewContactEmail) {
                                        rememberAthleteContactEmail(athlete && athlete.Name, reviewContactEmail);
                                        setSessionItem('contactEmail', reviewContactEmail);
                                        setLocalItem('contactEmail', reviewContactEmail);
                                    }
                                    proofPics = [];
                                    removeSessionItem(PENDING_PAYMENT_OFFER_KEY);
                                    if (checkoutLink) {
                                        if (invoiceId) {
                                            const pendingInvoiceInfo = JSON.stringify({
                                                invoiceId: invoiceId,
                                                applicantName: athlete.Name || null,
                                                accountEmail: reviewContactEmail || null,
                                                submissionType: 'result',
                                                reviewSource: 'proof-upload'
                                            });
                                            setSessionItem(PENDING_PAYMENT_INVOICE_KEY, pendingInvoiceInfo);
                                            setLocalItem(PENDING_PAYMENT_INVOICE_STORAGE_KEY, pendingInvoiceInfo);
                                        }
                                        window.location.href = checkoutLink;
                                        return;
                                    }

                                    removeSessionItem(PENDING_PAYMENT_INVOICE_KEY);
                                    removeLocalItem(PENDING_PAYMENT_INVOICE_STORAGE_KEY);
                                    setSessionItem("came-from", "proof-upload");
                                    window.location.href = '/review?from=proof-upload';
                                });
                            });
                        } else {
                            const fallbackError = Number.isFinite(response.status) ? `HTTP ${response.status}` : 'Request failed';
                            window.readApplicationErrorMessage(response).catch(() => fallbackError).then(badResponse => {
                                void window.trySendApplicationSubmissionReport(applicantData, submissionId, 'failed', submissionKind, {
                                    type: `HTTP ${response.status}`,
                                    message: badResponse
                                });
                                customAlert(`Failed to submit results. Please try again later.\n\n${badResponse}`).then(() => {
                                    isResultUploadSubmitting = false;
                                    submitButton.disabled = false;
                                    uploadProofButton.disabled = false;
                                    if (takeProofPhotoButton) takeProofPhotoButton.disabled = false;
                                    setSubmitButtonLabel();
                                });
                            });
                        }
                    })
                    .catch(error => {
                        hideLoading();
                        const displayError = error && error.message ? error.message : String(error);
                        const alertMessage = 'Results could not be submitted. Please check your connection and try again.';
                        void window.trySendApplicationSubmissionReport(applicantData, submissionId, 'failed', submissionKind, {
                            type: error && error.name || 'Error',
                            message: displayError
                        });
                        customAlert(alertMessage).then(() => {
                            isResultUploadSubmitting = false;
                            submitButton.disabled = false;
                            uploadProofButton.disabled = false;
                            if (takeProofPhotoButton) takeProofPhotoButton.disabled = false;
                            setSubmitButtonLabel();
                        });
                    });
            });
        });

        function setSubmitButtonLabel() {
            const submitButton = document.getElementById('submitButton');
            submitButton.innerHTML = 'Submit new results&nbsp;<i class="fa fa-rocket"></i>';
            submitButton.setAttribute('type', 'submit');
        }
    </script>
</body>
</html>
