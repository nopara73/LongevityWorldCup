<!DOCTYPE html>
<html lang="en">
<head>
    <title>Longevity World Cup - Character Selection</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .character-selection-main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2.5rem 1rem 3.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-selection-main [data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .character-selection-title {
            margin: 0 0 1.25rem;
            text-align: center;
        }

        .character-selection-visual {
            width: 100%;
            margin: 0 auto 1.4rem;
            text-align: center;
        }

        .character-selection-visual .illustration {
            width: min(100%, 408px);
            margin-bottom: 0;
            box-sizing: border-box;
        }

        .autocomplete-wrapper {
            position: relative;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* Make the container fill the form width */
            margin-bottom: 1.4rem;
            transition: margin-bottom 0.2s ease;
        }

        @supports selector(:has(*)) {
            .autocomplete-wrapper:has(.autocomplete-items) {
                margin-bottom: calc(1.4rem + min(12rem, 36vh));
            }
        }

        .autocomplete-container {
            position: relative;
            padding: 0;
            font-size: 1.2rem;
            width: min(100%, 408px);
            max-width: 408px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: stretch;
        }

            .autocomplete-container input {
                width: 100%;
                min-height: 44px;
                padding: 0.65rem 1rem;
                border: 1px solid #cbd5e1;
                border-radius: 999px;
                font-size: 1rem;
                line-height: 1.3;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
                box-sizing: border-box;
            }

                .autocomplete-container input:focus {
                    outline: none;
                    border-color: var(--primary-color, #00bcd4);
                    box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.14);
                }

        .autocomplete-items {
            position: absolute;
            top: calc(100% + 0.45rem);
            left: 0;
            right: 0;
            padding: 0.25rem;
            border: 1px solid rgba(15, 23, 42, 0.14);
            border-radius: 8px;
            background: #fff;
            width: 100%;
            max-height: min(12rem, 36vh);
            overflow-y: auto;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.16);
            box-sizing: border-box;
            z-index: 9999;
            scrollbar-width: thin;
            scrollbar-color: rgba(96, 125, 139, 0.45) transparent;
        }

            .autocomplete-items div {
                display: flex;
                align-items: center;
                min-height: 44px;
                padding: 0.6rem 0.7rem;
                border-radius: 6px;
                box-sizing: border-box;
                color: #2d3748;
                cursor: pointer;
                font-size: 1rem;
                line-height: 1.25;
            }

                .autocomplete-items div + div {
                    margin-top: 0.15rem;
                }

                .autocomplete-items div:hover,
                .autocomplete-active {
                    background-color: rgba(0, 188, 212, 0.12);
                    color: #243446;
                }

                .autocomplete-items div strong {
                    padding: 0 0.12rem;
                    border-radius: 4px;
                    background: rgba(0, 188, 212, 0.16);
                    color: #0f5965;
                }

        .error-message {
            display: none;
        }

        .error-message:not(:empty) {
            display: block;
            margin-top: 0.55rem;
            padding: 0.55rem 0.7rem;
            border: 1px solid rgba(220, 38, 38, 0.24);
            border-radius: 8px;
            background: rgba(254, 242, 242, 0.94);
            color: #b91c1c;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.35;
            box-sizing: border-box;
        }

        .character-selection-actions {
            width: min(100%, 408px);
            min-width: 0;
            max-width: 408px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.85rem;
        }

        .character-selection-actions .option-button {
            width: 100%;
            min-width: 0;
            max-width: none;
            margin: 0;
            box-sizing: border-box;
        }

        .character-selection-actions .back-button {
            margin-left: 0;
        }

        @media (max-width: 600px) {
            .character-selection-main {
                padding: 2rem 1.35rem 2.75rem;
            }

            .character-selection-title {
                margin-bottom: 1rem;
                font-size: 2rem;
            }

            .character-selection-visual {
                margin-bottom: 1.25rem;
            }

            .autocomplete-wrapper {
                margin-bottom: 1.25rem;
            }

            @supports selector(:has(*)) {
                .autocomplete-wrapper:has(.autocomplete-items) {
                    margin-bottom: calc(1.25rem + min(11.5rem, 34vh));
                }
            }
        }

        @media (max-width: 320px) {
            .autocomplete-container input {
                padding-inline: 0.78rem;
            }

            .autocomplete-container input::placeholder {
                font-size: 0.92rem;
            }
        }

        @media (max-width: 260px) {
            .autocomplete-container input {
                padding-inline: 0.64rem;
            }

            .autocomplete-container input::placeholder {
                font-size: 0.8rem;
            }
        }

        @media (min-width: 640px) and (max-width: 932px) and (max-height: 480px) and (orientation: landscape) {
            .character-selection-main {
                padding: 0.6rem 1rem 1.25rem;
            }

            .character-selection-title {
                margin-bottom: 0.45rem;
                font-size: clamp(1.55rem, 8vh, 2rem);
                line-height: 1.05;
            }

            .character-selection-visual {
                margin-bottom: 0.65rem;
            }

            .character-selection-visual .illustration {
                width: auto;
                max-width: min(100%, 240px);
                max-height: 30dvh;
                object-fit: contain;
            }

            .athlete-picture-frame {
                width: min(100%, 240px);
            }

            .athlete-picture-frame .illustration {
                width: 100%;
                max-width: none;
                max-height: none;
            }

            .autocomplete-wrapper {
                margin-bottom: 0.65rem;
            }

            @supports selector(:has(*)) {
                .autocomplete-wrapper:has(.autocomplete-items) {
                    margin-bottom: 0.65rem;
                }
            }

            .autocomplete-items {
                top: auto;
                bottom: calc(100% + 0.45rem);
                max-height: min(8.5rem, 42vh);
            }

            .character-selection-actions {
                gap: 0.55rem;
            }
        }

</style>
</head>
<body>
    <!--HEADER-->
    <main class="character-selection-main">
        <h1 id="character-title" class="character-selection-title" data-aos="fade" data-aos-duration="700" data-aos-delay="250">Athlete selection</h1>
        <div class="character-selection-visual" data-aos="fade" data-aos-duration="700" data-aos-delay="300">
            <div id="characterSelectionPicture" class="athlete-picture-frame">
                <picture>
                    <source srcset="../assets/content-images/headshot.webp" type="image/webp">
                    <source srcset="../assets/content-images/headshot.jpg" type="image/jpeg">
                    <img src="../assets/content-images/headshot.jpg" alt="Headshot" class="illustration athlete-picture-placeholder" loading="lazy" decoding="async">
                </picture>
            </div>
        </div>
        <div class="autocomplete-wrapper" data-aos="fade" data-aos-duration="700" data-aos-delay="350">
            <div class="autocomplete-container">
                <input type="text"
                       id="athlete"
                       name="athlete"
                       required
                       aria-required="true"
                       aria-describedby="athleteError"
                       autocomplete="off"
                       autocapitalize="none"
                       spellcheck="false"
                       placeholder="Start typing your athlete name…">
                <span id="athleteError" class="error-message" aria-live="polite"></span>
            </div>
        </div>
        <div class="options-container character-selection-actions" data-aos="fade" data-aos-duration="700" data-aos-delay="400">
            <button disabled id="confirmBtn" class="option-button green">
                Select&nbsp;<i class="fas fa-arrow-right"></i>
            </button>
            <button type="button" class="option-button back-button" onclick="window.location.replace('/play')">
                <i class="fas fa-arrow-left"></i>&nbsp;Back
            </button>
        </div>
    </main>
    <!--FOOTER-->
    <script>
        (function () {
            const storageErrorMessage = 'Browser storage is unavailable. Enable storage and try again.';

            function getFlowReady() {
                return Promise.resolve(window.modulesReady || undefined)
                    .catch(() => {})
                    .then(() => {
                        if (!window.playAthleteFlow) throw new Error('Athlete flow module did not load.');
                        return window.playAthleteFlow;
                    });
            }

            document.addEventListener('DOMContentLoaded', function () {
                getFlowReady().then(flow => {
                    setTimeout(() => {
                        const viewTarget = document.querySelector('h1');
                        viewTarget.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 500);

                    const confirmBtn = document.getElementById('confirmBtn');
                    const athleteSelection = flow.createAthleteSelectionController({
                        input: document.getElementById('athlete'),
                        errorElement: document.getElementById('athleteError'),
                        confirmButton: confirmBtn,
                        titleElement: document.getElementById('character-title'),
                        frameElement: document.getElementById('characterSelectionPicture'),
                        autocompleteRootSelector: '.autocomplete-container',
                        focusConfirmAfterSelection: false
                    }).start();

                    flow.focusWithoutScrolling(document.getElementById('athlete'));

                    confirmBtn.addEventListener('click', () => {
                        const currentAthlete = athleteSelection.getCurrentAthlete();
                        if (!currentAthlete || !currentAthlete.Name) return;

                        if (!flow.persistSelectedAthlete(currentAthlete)) {
                            customAlert(storageErrorMessage);
                            return;
                        }

                        window.location.href = '/dashboard';
                    });
                }).catch(error => {
                    console.error('Unable to initialize athlete selection:', error);
                });
            });
        })();
    </script>
</body>
</html>
