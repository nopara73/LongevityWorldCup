<!DOCTYPE html>
<html lang="en">
<head>
    <title>Longevity World Cup - Menu</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .play-menu-hero {
            text-align: center;
            padding: clamp(1.4rem, 3vh, 2.25rem) 1rem 0;
        }

        .play-menu-hero[data-aos]:not(.aos-animate),
        .play-menu-actions[data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        /* The entry poster speaks the same scoreboard language as the homepage
           hero: dark lit surface, phoenix watermark, display-voice headline. */
        .play-poster {
            position: relative;
            width: min(92vw, 408px);
            min-height: clamp(330px, 52vh, 470px);
            margin: 0 auto;
            padding: 2rem 1.7rem 1.8rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            text-align: left;
            overflow: hidden;
            border-radius: 16px;
            background:
                radial-gradient(120% 90% at 80% -10%, rgba(67, 238, 131, 0.14), transparent 55%),
                linear-gradient(165deg, #0a100d 0%, #050908 60%, #030706 100%);
            box-shadow: 0 18px 40px rgba(5, 9, 8, 0.35);
        }

        .play-poster-mark {
            position: absolute;
            z-index: 0;
            width: 130%;
            aspect-ratio: 1;
            right: -42%;
            top: -16%;
            background: url("{{ASSET_LOGO}}") center / contain no-repeat;
            filter: invert(1) grayscale(1) brightness(0.66);
            opacity: 0.26;
            transform: rotate(10deg);
            pointer-events: none;
        }

        .play-poster-kicker {
            position: relative;
            z-index: 1;
            margin-bottom: 0.6rem;
            color: #43ee83;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .play-poster-line {
            position: relative;
            z-index: 1;
            font-family: var(--display-font);
            font-weight: 400;
            font-synthesis: none;
            text-transform: uppercase;
            color: #f8f7ef;
            font-size: clamp(3.3rem, 11vw, 4.5rem);
            line-height: 0.9;
        }

        .play-poster-line em {
            font-style: normal;
            color: #43ee83;
        }

        .play-menu-actions {
            width: min(100%, 408px);
            min-width: 0;
            max-width: 408px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.85rem;
            margin: 1.35rem auto 0;
        }

        .play-menu-actions-kicker {
            display: none;
        }

        .play-menu-brief {
            width: min(100%, 408px);
            margin: 0.95rem auto 0;
            color: #46554d;
            line-height: 1.45;
            font-size: 0.95rem;
            text-align: left;
        }

        .play-menu-brief strong {
            color: #1c2722;
        }

        .play-menu-proof-links {
            width: min(100%, 408px);
            margin: 0.85rem auto 0;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
        }

        .play-menu-actions .play-menu-proof-links {
            width: 100%;
            margin: 0;
        }

        .play-menu-proof-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0.45rem 0.85rem;
            border: 1px solid rgba(28, 39, 34, 0.14);
            border-radius: var(--radius-card, 8px);
            background: rgba(255, 254, 250, 0.72);
            color: #1c2722;
            font-size: var(--text-small, 0.875rem);
            font-weight: 700;
            line-height: var(--leading-ui, 1.35);
            text-decoration: none;
        }

        .play-menu-proof-links a:hover,
        .play-menu-proof-links a:focus-visible {
            border-color: rgba(11, 125, 69, 0.32);
            background: rgba(11, 125, 69, 0.08);
            color: var(--primary-color);
            outline: none;
            box-shadow: var(--control-focus-ring, 0 0 0 3px rgba(11, 125, 69, 0.16));
        }

        .play-menu-actions .option-button {
            width: 100%;
            min-width: 0;
            max-width: none;
            margin: 0;
            box-sizing: border-box;
        }

        @media (max-width: 600px) {
            .play-menu-hero {
                padding: 0.85rem 1.35rem 0;
            }

            .play-poster {
                width: min(100%, 330px);
                min-height: clamp(245px, 36vh, 330px);
                padding: 1.35rem 1.25rem 1.25rem;
                border-radius: var(--radius-panel, 10px);
            }

            .play-poster-kicker {
                margin-bottom: 0.45rem;
                font-size: 0.72rem;
            }

            .play-poster-line {
                font-size: clamp(2.8rem, 14vw, 3.5rem);
            }

            .play-menu-actions {
                width: min(100%, 330px);
                gap: 0.65rem;
                margin-top: 0.85rem;
            }

            .play-menu-brief {
                margin-top: 0.75rem;
                font-size: 0.9rem;
                line-height: 1.4;
            }

            .play-menu-proof-links {
                width: min(100%, 330px);
                gap: 0.45rem;
            }

            .play-menu-actions .option-button {
                padding-inline: 1.25rem;
                white-space: nowrap;
            }

            .play-menu-proof-links a {
                padding-inline: 0.65rem;
            }
        }

        @media (min-width: 900px) {
            body:has(.play-menu-hero) main {
                width: min(100%, 1080px);
                min-height: calc(100svh - 214px);
                display: grid;
                grid-template-columns: minmax(340px, 420px) minmax(300px, 360px);
                justify-content: center;
                align-items: start;
                gap: clamp(1.5rem, 4vw, 3rem);
                margin-top: 0;
                padding: clamp(1.35rem, 3vh, 2rem) 1rem;
                box-sizing: border-box;
            }

            .play-menu-hero {
                padding: 0;
            }

            .play-poster {
                width: 100%;
                min-height: clamp(340px, 42vh, 470px);
                padding: 1.55rem 1.45rem;
            }

            .play-poster-line {
                font-size: clamp(3.4rem, 6vw, 4.25rem);
            }

            .play-menu-brief {
                margin-top: 0.85rem;
                font-size: 0.93rem;
            }

            .play-menu-proof-links {
                margin-top: 0.75rem;
            }

            .play-menu-actions {
                width: 100%;
                max-width: 360px;
                margin: 0;
                padding: 1rem;
                border: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
                border-radius: var(--radius-panel, 10px);
                background:
                    linear-gradient(180deg, rgba(11, 125, 69, 0.045), rgba(255,254,250,0) 44%),
                    var(--card-bg, #fffefa);
                box-shadow: var(--surface-shadow, 0 4px 10px rgba(28,39,34,.08));
            }

            .play-menu-actions-kicker {
                display: block;
                order: -1;
                margin: 0 0 0.1rem;
                color: var(--primary-color, #0b7d45);
                font-family: var(--font-body, Roboto, sans-serif);
                font-size: 0.72rem;
                font-weight: 900;
                letter-spacing: 0.1em;
                line-height: 1;
                text-transform: uppercase;
            }
        }

        @media (min-width: 900px) and (max-height: 930px) {
            body:has(.play-menu-hero) main {
                width: min(100%, 980px);
                grid-template-columns: minmax(320px, 390px) minmax(280px, 340px);
            }

            .play-poster {
                min-height: 340px;
            }

            .play-menu-actions {
                max-width: 340px;
            }
        }

        @media (min-width: 900px) and (min-height: 931px) {
            body:has(.play-menu-hero) main {
                min-height: 0;
                align-items: start;
                padding-top: clamp(3rem, 7vh, 5rem);
                padding-bottom: clamp(3rem, 7vh, 5rem);
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <h1 class="visually-hidden">Competition entry</h1>
        <div class="play-menu-hero" data-aos="fade" data-aos-duration="700" data-aos-delay="300">
            <div class="play-poster">
                <div class="play-poster-mark" aria-hidden="true"></div>
                <span class="play-poster-kicker">Official entry</span>
                <span class="play-poster-line">Submit.<br><em>Rank.</em><br>Compete.</span>
            </div>
            <p class="play-menu-brief">
                <strong>New competitors</strong> submit results and proof. Returning athletes manage records.
            </p>
        </div>

        <div class="options-container play-menu-actions" data-aos="fade" data-aos-duration="700" data-aos-delay="400">
            <span class="play-menu-actions-kicker">Athlete access</span>
            <button id="newGameBtn" class="option-button green" onclick="window.location.href='/join'">
                Apply to compete
            </button>
            <button id="continueGameBtn" class="option-button grey" onclick="window.location.href='/select-athlete'">
                Manage athlete record
            </button>
            <div class="play-menu-proof-links" aria-label="Proof and rules">
                <a href="/leaderboard">Inspect standings</a>
                <a href="/ruleset">Read official rules</a>
            </div>
        </div>
    </main>
    <!--FOOTER-->
</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // now mark the menu based on whether they've applied:
        const hasApp = localStorage.getItem('hasApplication') === 'true';
        const container = document.querySelector('.options-container');
        const newBtn = document.getElementById('newGameBtn');
        const contBtn = document.getElementById('continueGameBtn');

        if (hasApp) {
            contBtn.classList.remove('grey');
            contBtn.classList.add('green');
            container.insertBefore(contBtn, container.firstChild);
        } else {
            newBtn.classList.remove('grey');
            newBtn.classList.add('green');
            container.insertBefore(newBtn, container.firstChild);
        }
    });
</script>
