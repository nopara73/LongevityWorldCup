<!DOCTYPE html>
<html lang="en">
<head>
    <title>Longevity World Cup - Menu</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .play-menu-hero {
            text-align: center;
            padding: clamp(1.4rem, 3vh, 2.25rem) 1rem 0;
        }

        .play-menu-hero[data-aos]:not(.aos-animate),
        .play-menu-actions[data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .img-crop {
            width: min(92vw, 408px);
            height: clamp(360px, 60vh, 720px);
            overflow: hidden;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
            background: transparent;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
        }

            .img-crop .illustration {
                box-sizing: border-box;
                width: 100%; /* same width behavior */
                max-width: none;
                height: auto;
                display: block;
                margin: 0;
                position: relative;
                top: 50%;
                transform: translateY(-50%); /* equal crop top/bottom */
                border: 0;
                border-radius: 6px;
                box-shadow: none;
            }

        .play-menu-actions {
            width: min(100%, 408px);
            min-width: 0;
            max-width: 408px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.85rem;
            margin: 1.35rem auto 0;
        }

        .play-menu-actions .option-button {
            width: 100%;
            min-width: 0;
            max-width: none;
            margin: 0;
            box-sizing: border-box;
        }

        @media (max-width: 600px) {
            .play-menu-hero {
                padding: 1rem 1.35rem 0;
            }

            .img-crop {
                width: min(100%, 330px);
                height: clamp(300px, 44vh, 410px);
            }

            .play-menu-actions {
                width: min(100%, 330px);
                margin-top: 1.15rem;
            }

            .play-menu-actions .option-button {
                padding-inline: 1.25rem;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <h1 class="visually-hidden">Game menu</h1>
        <div class="play-menu-hero" data-aos="fade" data-aos-duration="700" data-aos-delay="300">
            <div class="img-crop">
                <img src="../assets/content-images/JustTrackIt.jpg"
                     alt="Illustration encouraging athletes to track their progress"
                     class="illustration"
                     loading="eager"
                     fetchpriority="high"
                     decoding="async">
            </div>
        </div>

        <div class="options-container play-menu-actions" data-aos="fade" data-aos-duration="700" data-aos-delay="400">
            <button id="newGameBtn" class="option-button grey" onclick="window.location.href='/join'">
                I'm a new athlete
            </button>
            <button id="continueGameBtn" class="option-button grey" onclick="window.location.href='/select-athlete'">
                I'm already an athlete
            </button>
        </div>
    </main>
    <!--FOOTER-->
</body>
</html>

<script>
    function getBrowserStorageItem(storageName, key) {
        try {
            return window[storageName].getItem(key);
        } catch (_) {
            return null;
        }
    }

    function getLocalItem(key) { return getBrowserStorageItem('localStorage', key); }

    function hasSubmittedApplication() {
        return getLocalItem('hasApplication') === 'true';
    }

    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(() => {
            const viewTarget = document.querySelector('h1');
            viewTarget.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 500);

        // now mark the menu based on whether they've applied:
        const hasApp = hasSubmittedApplication();
        const container = document.querySelector('.options-container');
        const newBtn = document.getElementById('newGameBtn');
        const contBtn = document.getElementById('continueGameBtn');

        if (hasApp) {
            contBtn.classList.remove('grey');
            contBtn.classList.add('green');
            container.insertBefore(contBtn, container.firstChild);
        } else {
            newBtn.classList.remove('grey');
            newBtn.classList.add('green');
            container.insertBefore(newBtn, container.firstChild);
        }
    });
</script>
