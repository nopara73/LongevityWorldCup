<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Social Post Manager</title>
    <style>
        @font-face {
            font-family: "Poppins";
            src: url("/assets/fonts/Poppins-Regular.ttf") format("truetype");
            font-weight: 400;
        }

        @font-face {
            font-family: "Poppins";
            src: url("/assets/fonts/Poppins-Bold.ttf") format("truetype");
            font-weight: 700;
        }

        :root {
            --text: #f5f5f5;
            --muted: rgba(255,255,255,0.68);
            --pink: #ff4081;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.1);
            --chip: rgba(255,255,255,0.08);
            --ok: #67d393;
            --warn: #ffcf5d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            font-family: "Poppins", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(255,255,255,0.08), transparent 22%),
                linear-gradient(135deg, #090909, #000000 60%);
        }

        .page {
            max-width: 1380px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(340px, 430px) minmax(600px, 1fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 16px;
            display: grid;
            gap: 12px;
            align-content: start;
        }

        h1, h2 {
            margin: 0;
            font-weight: 700;
        }

        h1 { font-size: 22px; }
        h2 { font-size: 16px; }

        label {
            display: grid;
            gap: 6px;
            font-size: 13px;
        }

        input[type="text"], textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            background: rgba(0,0,0,0.32);
            color: var(--text);
            font: inherit;
            padding: 11px 13px;
            outline: none;
        }

        textarea {
            min-height: 170px;
            resize: vertical;
            line-height: 1.5;
        }

        .format-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .tool-btn {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            padding: 7px 10px;
            cursor: pointer;
        }

        .tool-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .mention-suggestions {
            position: static;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            background: rgba(9,9,9,0.96);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            max-height: 220px;
            overflow-y: auto;
            padding: 6px;
            margin-top: 6px;
            width: 100%;
        }

        .mention-suggestions[hidden] {
            display: none;
        }

        .mention-option {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: var(--text);
            padding: 8px 10px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            text-align: left;
            cursor: pointer;
        }

        .mention-option:hover,
        .mention-option.is-active {
            background: rgba(255,255,255,0.1);
        }

        .mention-option-slug {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            text-align: left;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mention-option-name {
            font-size: 11px;
            color: var(--muted);
            text-align: right;
            white-space: nowrap;
        }

        .checks {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .check {
            display: inline-grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 14px;
            background: var(--chip);
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 12px;
        }

        .badge {
            padding: 4px 7px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
        }

        .payload-box {
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.26);
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .payload-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .validation-hint {
            font-size: 12px;
            color: #ffb7c9;
            line-height: 1.4;
        }

        button {
            border: 0;
            border-radius: 10px;
            background: var(--pink);
            color: white;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 12px;
            cursor: pointer;
        }

        button.secondary {
            background: rgba(255,255,255,0.1);
        }

        .token {
            width: 100%;
            min-height: 110px;
            resize: vertical;
        }

        .preview-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
        }

        .preview-warning {
            width: fit-content;
            max-width: min(560px, calc(100vw - 180px));
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 184, 0, 0.35);
            background: rgba(255, 122, 0, 0.12);
            color: #ffd89a;
            font-size: 12px;
            line-height: 1.45;
        }

        .preview-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            width: fit-content;
            max-width: 100%;
            justify-self: start;
        }

        .preview-title {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
            width: 100%;
        }

        .preview-title h2 {
            min-width: 0;
        }

        .preview-copy-btn {
            padding: 6px 10px;
            border-radius: 9px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.88);
            font-size: 11px;
            line-height: 1.2;
        }

        .preview-copy-btn:hover {
            background: rgba(255,255,255,0.14);
        }

        .preview-copy-btn.is-copied {
            background: rgba(103, 211, 147, 0.22);
            color: #dff7e7;
        }

        .preview-platforms {
            color: rgba(255,255,255,0.74);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 11px;
            line-height: 1.2;
            letter-spacing: 0.01em;
        }

        .preview-surface {
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.22);
            padding: 14px;
            width: fit-content;
            max-width: 100%;
        }

        .preview-surface.fit-content {
            width: fit-content;
            max-width: 100%;
        }

        .formatted strong { font-weight: 700; }
        .formatted .strong { color: #ff4081; font-weight: 700; }
        .formatted a { color: #0645ad; text-decoration: underline; }
        .x-text a { color: #1d9bf0; text-decoration: none; }
        .x-text a:hover { text-decoration: underline; }
        .slack-text a { color: #1264a3; text-decoration: none; }
        .slack-text a:hover { text-decoration: underline; }

        .webpage-surface {
            width: fit-content;
            max-width: min(560px, calc(100vw - 180px));
            font-family: Arial, Helvetica, sans-serif;
        }

        .webpage-event {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.06);
            background: #eef7fa;
        }

        .webpage-event-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            min-height: 44px;
            color: #3f3f3f;
            background: rgba(240,244,248,.5);
        }

        .webpage-event-title {
            min-width: 0;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.45;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .webpage-expander {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 12px;
            line-height: 1;
            flex: 0 0 18px;
        }

        .webpage-expander::before {
            content: "⌃";
            transform: rotate(0deg);
            display: block;
        }

        .webpage-event-details {
            padding: 0 14px;
            background: rgba(0,188,212,.08);
            border-top: 1px solid rgba(0,0,0,0.03);
        }

        .event-content {
            color: #5a5a5a;
            font-size: 13px;
            line-height: 1.45;
            padding: 10px 0;
        }

        .badge.text {
            color: #0a2918;
            background: var(--ok);
        }

        .badge.image {
            color: #3b2600;
            background: var(--warn);
        }

        .post-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .post-title {
            font-size: 14px;
            font-weight: 700;
        }

        .x-post {
            display: inline-flex;
            gap: 10px;
            align-items: flex-start;
            width: fit-content;
            max-width: 100%;
        }

        .x-avatar {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            color: white;
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        }

        .platform-avatar {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
        }

        .platform-avatar-x {
            background: #000000;
        }

        .platform-avatar-threads {
            background: #101010;
        }

        .platform-avatar-facebook {
            background: #1877f2;
        }

        .platform-avatar-slack {
            background: #4a154b;
        }

        .platform-avatar svg {
            width: 60%;
            height: 60%;
            display: block;
        }

        .x-main {
            min-width: 0;
            flex: 0 1 auto;
            display: grid;
            gap: 8px;
            width: fit-content;
            max-width: min(560px, calc(100vw - 180px));
        }

        .x-head {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            font-size: 13px;
            line-height: 1.3;
        }

        .x-name { font-weight: 700; color: #e7e9ea; }
        .x-handle, .x-meta { color: #71767b; }

        .x-text {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            font-size: 15px;
            color: #e7e9ea;
            width: fit-content;
            max-width: min(560px, calc(100vw - 180px));
        }

        .x-actions {
            display: flex;
            justify-content: space-between;
            max-width: 360px;
            color: #71767b;
            font-size: 12px;
        }

        .og-card {
            margin-top: 10px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            width: min(560px, calc(100vw - 180px));
        }

        .og-card-media {
            height: 140px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            display: flex;
            align-items: end;
            justify-content: flex-start;
            overflow: hidden;
        }

        .og-card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .og-card-media-fallback {
            width: 100%;
            height: 100%;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background:
                repeating-linear-gradient(
                    135deg,
                    rgba(255,255,255,0.05),
                    rgba(255,255,255,0.05) 12px,
                    rgba(255,255,255,0.02) 12px,
                    rgba(255,255,255,0.02) 24px
                );
        }

        .og-card-media-fallback-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(255, 176, 0, 0.18);
            border: 1px solid rgba(255, 176, 0, 0.35);
            color: #ffd37a;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: none;
        }

        .og-card-media-fallback-domain {
            opacity: 0.9;
        }

        .og-card-body {
            padding: 10px 12px;
            display: grid;
            gap: 5px;
        }

        .og-card-domain {
            font-size: 11px;
            color: #71767b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .og-card-title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
            color: #e7e9ea;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .og-card-desc {
            font-size: 12px;
            line-height: 1.35;
            color: #9aa0a6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .og-card-url {
            font-size: 11px;
            color: #71767b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .x-media {
            border-radius: 16px;
            overflow: hidden;
            background: #0f1419;
            border: 1px solid #2f3336;
            align-self: start;
            width: min(560px, calc(100vw - 180px));
        }

        .image-stage-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 1200 / 675;
            overflow: hidden;
        }

        .image-stage {
            position: absolute;
            left: 0;
            top: 0;
            width: 1200px;
            height: 675px;
            background: #050505 url("/assets/custom_event.png") center / cover no-repeat;
            transform-origin: top left;
        }

        .image-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 0 21.5px rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(18px);
            display: grid;
            place-items: center;
            padding: 40px 38px;
            overflow: hidden;
        }

        .image-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.02) 48%, rgba(0,0,0,0.06)),
                radial-gradient(circle at 20% 25%, rgba(255,255,255,0.12), transparent 34%);
            pointer-events: none;
        }

        .image-text {
            position: relative;
            width: 100%;
            text-align: center;
            font-size: 28px;
            line-height: 1.36;
            letter-spacing: 0.02em;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .slack-shell {
            width: min(720px, calc(100vw - 180px));
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            background: #1b1d21;
            color: #f8f8f8;
            padding: 16px 18px;
            box-shadow: 0 14px 32px rgba(0,0,0,0.22);
        }

        .slack-message {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: start;
        }

        .slack-avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            color: #fff;
            flex: 0 0 34px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
        }

        .slack-body {
            min-width: 0;
            display: grid;
            gap: 4px;
            padding-top: 1px;
        }

        .slack-author-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            flex-wrap: wrap;
            line-height: 1.1;
        }

        .slack-author {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
        }

        .slack-app-badge {
            display: inline-flex;
            align-items: center;
            height: 18px;
            padding: 0 5px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.72);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .slack-timestamp {
            font-size: 12px;
            font-weight: 500;
            color: #a8adb4;
        }

        .slack-text {
            font-size: 15px;
            line-height: 1.4;
            color: #d1d2d3;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .slack-text strong {
            font-weight: 700;
            color: #ffffff;
        }

        .slack-text em {
            font-style: italic;
        }

        @media (max-width: 1080px) {
            .page { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="panel">
            <h1>Social Post Manager</h1>

            <div class="format-toolbar">
                <button id="insertBoldBtn" class="tool-btn" type="button">Bold</button>
                <button id="insertStrongBtn" class="tool-btn" type="button">Strong</button>
                <button id="insertLinkBtn" class="tool-btn" type="button">Link</button>
                <button id="insertMentionBtn" class="tool-btn" type="button">Mention</button>
            </div>

            <label>
                <span>Title</span>
                <div class="editor-wrap">
                    <input id="titleInput" type="text" value="New community update is live" />
                </div>
            </label>

            <label>
                <span>Content</span>
                <div class="editor-wrap">
                    <textarea id="contentInput">We have added an expandable CustomEvent row in Highlights. This update highlights one [bold](important) change, includes a [strong](major announcement), gives a shoutout to [mention](nopara73), and links to [Longevity World Cup](https://longevityworldcup.com/) for the latest details.</textarea>
                </div>
            </label>

            <div id="mentionSuggestions" class="mention-suggestions" hidden></div>

            <div>
                <div style="margin-bottom:6px;font-size:13px;">Send to</div>
                <div class="checks">
                    <label class="check"><input id="sendWebpage" type="checkbox" checked /><span>Webpage</span></label>
                    <label class="check"><input id="sendSlack" type="checkbox" checked /><span>Slack</span></label>
                    <label class="check"><input id="sendX" type="checkbox" checked /><span>X</span></label>
                    <label class="check"><input id="sendThreads" type="checkbox" /><span>Threads</span></label>
                    <label class="check"><input id="sendFacebook" type="checkbox" /><span>Facebook</span></label>
                </div>
            </div>

            <div class="payload-box">
                <h2>Server Command</h2>
                <textarea id="commandOutput" class="token" readonly></textarea>
                <div class="payload-actions">
                    <button id="copyCommandBtn" type="button">Copy Command</button>
                    <div id="copyState" style="font-size:12px;color:var(--muted);"></div>
                </div>
                <div id="commandValidationHint" class="validation-hint" hidden>Title is required before the command can be generated or copied.</div>
            </div>
        </div>

        <div class="preview-stack">
            <div class="preview-warning">
                These previews are not pixel-perfect. They are only approximate guidance for webpage and social output.
            </div>

            <div id="webpagePreviewBlock" class="panel preview-block">
                <div class="preview-title">
                    <h2>Webpage Preview</h2>
                    <button type="button" class="preview-copy-btn" data-copy-source="webpage">Copy Text</button>
                </div>
                <div id="webpagePreviewSurface" class="webpage-surface">
                    <div class="webpage-event">
                        <div class="webpage-event-row">
                            <div id="eventTitlePreview" class="webpage-event-title formatted"></div>
                            <div class="webpage-expander" aria-hidden="true"></div>
                        </div>
                        <div class="webpage-event-details">
                            <div id="eventContentPreview" class="event-content formatted"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="socialPreviewList" class="preview-stack"></div>
        </div>
    </div>

    <script src="{{ASSET_CUSTOM_EVENT_MARKUP_JS}}"></script>
    <script>
        const LIMITS = { x: 280, threads: 500 };
        const SEND_TO_STORAGE_KEY = "customEventDesigner.sendTo";
        const titleInput = document.getElementById("titleInput");
        const contentInput = document.getElementById("contentInput");
        const sendWebpage = document.getElementById("sendWebpage");
        const sendSlack = document.getElementById("sendSlack");
        const sendX = document.getElementById("sendX");
        const sendThreads = document.getElementById("sendThreads");
        const sendFacebook = document.getElementById("sendFacebook");
        const webpagePreviewBlock = document.getElementById("webpagePreviewBlock");
        const webpagePreviewSurface = document.getElementById("webpagePreviewSurface");
        const commandOutput = document.getElementById("commandOutput");
        const commandValidationHint = document.getElementById("commandValidationHint");
        const copyCommandBtn = document.getElementById("copyCommandBtn");
        const copyState = document.getElementById("copyState");
        const insertBoldBtn = document.getElementById("insertBoldBtn");
        const insertStrongBtn = document.getElementById("insertStrongBtn");
        const insertLinkBtn = document.getElementById("insertLinkBtn");
        const insertMentionBtn = document.getElementById("insertMentionBtn");
        const mentionSuggestions = document.getElementById("mentionSuggestions");
        const socialPreviewList = document.getElementById("socialPreviewList");
        let activeEditor = contentInput;
        let athleteMentionIndex = new Map();
        let athleteMentionItems = [];
        let activeMentionContext = null;
        let activeMentionIndex = 0;
        let previewCopyPayloads = new Map();
        let ogPreviewCache = new Map();
        let ogPreviewPending = new Set();

        const PLATFORM_CONFIGS = [
            { key: "slack", label: "Slack", checkbox: sendSlack, fixedMode: "slack" },

                    return `@${normalizedSegment}`;
                }

                if (platformKey === "threads" && host.endsWith("threads.com")) {
                    return `@${normalizedSegment}`;
                }
            } catch {
            }

            return "";
        }

        function resolveMentionSlug(slug, platformKey) {
            const key = String(slug || "").trim().toLowerCase();
            if (!key) {
                return "";
            }

            const athlete = athleteMentionIndex.get(key);
            if (!athlete) {
                return humanizeSlug(key) || key;
            }

            const mention = extractMentionHandle(athlete.mediaContact, platformKey);
            if (mention) {
                return mention;
            }

            return athlete.name || humanizeSlug(key) || key;
        }

        function resolveMentionDisplayName(slug) {
            const key = String(slug || "").trim().toLowerCase();
            if (!key) {
                return "";
            }

            const athlete = athleteMentionIndex.get(key);
            return athlete?.name || humanizeSlug(key) || key;
        }

        function fnv1a(text) {
            let hash = 0x811c9dc5;
            for (let i = 0; i < text.length; i++) {
                hash ^= text.charCodeAt(i);
                hash = Math.imul(hash, 0x01000193);
            }
            return (hash >>> 0).toString(16).padStart(8, "0");
        }

        function buildPreviewEventUrl(title, content) {
            const id = fnv1a(`${title}\n\n${content}`);
            return `https://longevityworldcup.com/events?event=preview-${id}`;
        }

        function buildTextPost(titleText, bodyText, eventUrl) {
            const parts = [];
            if (titleText) parts.push(titleText);
            if (bodyText) parts.push(bodyText);
            if (eventUrl) parts.push(eventUrl);
            return parts.join("\n\n").trim();
        }

        function buildWebpageRawMessage(titleRaw, contentRaw) {
            return contentRaw ? `${titleRaw}\n\n${contentRaw}` : titleRaw;
        }

        function buildImageCaption(titleText, eventUrl, maxLength) {
            const normalizedTitle = collapseWhitespace(titleText);
            if (!eventUrl) return normalizedTitle;
            const reserved = eventUrl.length + 2;
            const maxTitleLength = Math.max(0, maxLength - reserved);
            let finalTitle = normalizedTitle;
            if (finalTitle.length > maxTitleLength) {
                finalTitle = maxTitleLength <= 1 ? "" : `${finalTitle.slice(0, maxTitleLength - 1).trimEnd()}…`;
            }
            return finalTitle ? `${finalTitle}\n\n${eventUrl}` : eventUrl;
        }

        function buildPlan(titleRaw, contentRaw, maxLength, platformKey, includeEventUrl) {
            const rawText = contentRaw ? `${titleRaw}\n\n${contentRaw}` : titleRaw;
            const mentionResolver = slug => resolveMentionSlug(slug, platformKey);
            const titleText = collapseWhitespace(plainTextWithLabels(titleRaw, mentionResolver));
            const bodyText = plainTextWithLabels(contentRaw, mentionResolver);
            const singleHyperlink = getSingleHyperlink(rawText);
            const eventUrl = singleHyperlink || (includeEventUrl ? buildPreviewEventUrl(titleRaw, contentRaw) : "");
            const hasHyperlinks = containsHyperlink(rawText);
            const textWithoutUrl = buildTextPost(titleText, bodyText, null);

            if ((!hasHyperlinks || !eventUrl) && textWithoutUrl && textWithoutUrl.length <= maxLength) {
                return { mode: "text", postText: textWithoutUrl };
            }

            const textWithUrl = buildTextPost(titleText, bodyText, eventUrl);
            if (textWithUrl && textWithUrl.length <= maxLength) {
                return { mode: "text", postText: textWithUrl };
            }

            return {
                mode: "image",
                postText: buildImageCaption(titleText, hasHyperlinks ? eventUrl : "", maxLength)
            };
        }

        function buildPlatformRawText(platformKey, plan, titleRaw, contentRaw, includeEventUrl) {
            if (platformKey === "webpage") {
                return buildWebpageRawMessage(titleRaw, contentRaw);
            }

            if (platformKey === "slack") {
                return buildSlackRawMessage(titleRaw, contentRaw);
            }

            if (plan && typeof plan.postText === "string") {
                return plan.postText;
            }

            if (platformKey === "x" || platformKey === "threads" || platformKey === "facebook") {
                const fallbackLimit = platformKey === "x" ? LIMITS.x : (platformKey === "threads" ? LIMITS.threads : 63206);
                const fallbackPlan = buildPlan(titleRaw, contentRaw, fallbackLimit, platformKey, includeEventUrl);
                return fallbackPlan.postText || "";
            }

            return "";
        }

        function base64UrlEncodeUtf8(value) {
            const utf8 = new TextEncoder().encode(value);
            let binary = "";
            for (const byte of utf8) binary += String.fromCharCode(byte);
            return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
        }

        function buildServerCommand(payload) {
            return `sudo bash -lc 'cd /var/www/.longevityworldcup && bash /home/user/LongevityWorldCup/LongevityWorldCup.Website/Scripts/custom_event.sh "LongevityWorldCup.db" --payload "${payload}"'`;
        }

        function loadSendToSettings() {
            try {
                const raw = localStorage.getItem(SEND_TO_STORAGE_KEY);
                if (!raw) return;

                const data = JSON.parse(raw);
                if (typeof data.sendWebpage === "boolean") sendWebpage.checked = data.sendWebpage;
                if (typeof data.sendSlack === "boolean") sendSlack.checked = data.sendSlack;
                if (typeof data.sendX === "boolean") sendX.checked = data.sendX;
                if (typeof data.sendThreads === "boolean") sendThreads.checked = data.sendThreads;
                if (typeof data.sendFacebook === "boolean") sendFacebook.checked = data.sendFacebook;
            } catch {
            }
        }

        function saveSendToSettings() {
            try {
                localStorage.setItem(SEND_TO_STORAGE_KEY, JSON.stringify({
                    sendWebpage: sendWebpage.checked,
                    sendSlack: sendSlack.checked,
                    sendX: sendX.checked,
                    sendThreads: sendThreads.checked,
                    sendFacebook: sendFacebook.checked
                }));
            } catch {
            }
        }

        function setActiveEditor(target) {
            if (target === titleInput || target === contentInput) {
                activeEditor = target;
                updateMentionSuggestions(target);
            }
        }

        function insertSnippet(prefix, fallbackText, suffix, selectionStartOffset, selectionEndOffset) {
            const target = activeEditor ?? contentInput;
            const start = target.selectionStart ?? target.value.length;
            const end = target.selectionEnd ?? start;
            const selectedText = target.value.slice(start, end);
            const innerText = selectedText || fallbackText;
            const inserted = `${prefix}${innerText}${suffix}`;

            target.value = `${target.value.slice(0, start)}${inserted}${target.value.slice(end)}`;
            target.focus();

            const nextSelectionStart = start + selectionStartOffset(prefix, innerText);
            const nextSelectionEnd = start + selectionEndOffset(prefix, innerText);
            target.setSelectionRange(nextSelectionStart, nextSelectionEnd);
            update();
        }

        function insertBold() {
            insertSnippet("[bold](", "text", ")", (prefix) => prefix.length, (prefix, innerText) => prefix.length + innerText.length);
        }

        function insertStrong() {
            insertSnippet("[strong](", "text", ")", (prefix) => prefix.length, (prefix, innerText) => prefix.length + innerText.length);
        }

        function insertLink() {
            const target = activeEditor ?? contentInput;
            const start = target.selectionStart ?? target.value.length;
            const end = target.selectionEnd ?? start;
            const selectedText = target.value.slice(start, end) || "label";
            const inserted = `[${selectedText}](https://example.com/)`;

            target.value = `${target.value.slice(0, start)}${inserted}${target.value.slice(end)}`;
            target.focus();

            const urlStart = start + selectedText.length + 3;
            const urlEnd = urlStart + "https://example.com/".length;
            target.setSelectionRange(urlStart, urlEnd);
            update();
        }

        function insertMention() {
            insertSnippet("[mention](", "athlete_slug", ")", (prefix) => prefix.length, (prefix, innerText) => prefix.length + innerText.length);
        }

        function getSelectedPlatformPlans(titleRaw, contentRaw, includeEventUrl) {
            return PLATFORM_CONFIGS
                .filter(platform => platform.checkbox.checked)
                .map(platform => {
                    const plan = platform.fixedMode
                        ? {
                            mode: platform.fixedMode,
                            postText: buildTextPost(collapseWhitespace(plainTextWithLabels(titleRaw, slug => resolveMentionSlug(slug, platform.key))), plainTextWithLabels(contentRaw, slug => resolveMentionSlug(slug, platform.key)), null),
                            titleRaw: titleRaw,
                            contentRaw: contentRaw
                        }
                        : buildPlan(titleRaw, contentRaw, platform.limit, platform.key, includeEventUrl);
                    return { key: platform.key, label: platform.label, limit: platform.limit, ...plan };
                });
        }

        function getImagePreviewLayout(contentRaw, platformKey) {
            const resolvedContent = contentRaw || titleInput.value.trim();
            const textHtml = window.CustomEventMarkup.renderImageMarkupWithBreaks(resolvedContent, {
                mentionResolver: slug => resolveMentionSlug(slug, platformKey)
            });
            const length = plainTextWithLabels(resolvedContent, slug => resolveMentionSlug(slug, platformKey)).length;
            const settings = {};
            if (length > 420) {
                settings.cardWidth = 1060;
                settings.cardHeight = 520;
                settings.padding = "40px 38px";
                settings.fontSize = "18px";
                settings.lineHeight = "1.42";
            } else if (length > 280) {
                settings.cardWidth = 1000;
                settings.cardHeight = 455;
                settings.padding = "40px 30px";
                settings.fontSize = "22px";
                settings.lineHeight = "1.42";
            } else {
                settings.cardWidth = 920;
                settings.cardHeight = 360;
                settings.padding = "40px 20px";
                settings.fontSize = "30px";
                settings.lineHeight = "1.36";
            }

            settings.textHtml = textHtml;
            return settings;
        }

        function renderTextPreviewCard(platformKey, postText, clickableMentions, rawCopyText, ogPreviewUrl) {
            const meta = PLATFORM_PREVIEW_META[platformKey] || PLATFORM_PREVIEW_META.x;
            const copyKey = registerPreviewCopyText(rawCopyText);
            const ogCardHtml = renderOgCard(ogPreviewUrl);
            const visibleText = platformKey === "x"
                ? getXPreviewVisibleText(postText)
                : postText;
            return `
                <div class="panel preview-block">
                    <div class="preview-title" style="margin-bottom:8px;">
                        <h2>${escapeHtml(meta.label)} Preview</h2>
                        <button type="button" class="preview-copy-btn" data-copy-key="${escapeHtml(copyKey)}">Copy Text</button>
                    </div>
                    <div class="preview-surface fit-content" style="border:0;background:transparent;padding:0;">
                        <div class="x-post">
                            ${renderPlatformAvatar(platformKey)}
                            <div class="x-main">
                                <div class="x-head">
                                    <span class="x-name">${escapeHtml(meta.name)}</span>
                                    <span class="x-handle">${escapeHtml(meta.handle)}</span>
                                    <span class="x-meta">now</span>
                                </div>
                                <div class="x-text">${formatPlainPostTextToHtml(visibleText, clickableMentions)}</div>
                                ${ogCardHtml}
                                <div class="x-actions"><span>Reply</span><span>Repost</span><span>Like</span><span>View</span></div>
                            </div>
                        </div>
                    </div>    
                </div>`;
        }

        function renderSlackPreviewCard(titleRaw, contentRaw, ogPreviewUrl) {
            const meta = PLATFORM_PREVIEW_META.slack;
            const copyKey = registerPreviewCopyText(buildSlackRawMessage(titleRaw, contentRaw));
            const ogCardHtml = renderOgCard(ogPreviewUrl);
            return `
                <div class="panel preview-block">
                    <div class="preview-title" style="margin-bottom:8px;">
                        <h2>${escapeHtml(meta.label)} Preview</h2>
                        <button type="button" class="preview-copy-btn" data-copy-key="${escapeHtml(copyKey)}">Copy Text</button>
                    </div>
                    <div class="preview-surface fit-content" style="border:0;background:transparent;padding:0;">
                        <div class="slack-shell">
                            <div class="slack-message">
                                ${renderPlatformAvatar("slack", "slack-avatar")}
                                <div class="slack-body">
                                    <div class="slack-author-row">
                                        <span class="slack-author">${escapeHtml(meta.name)}</span>
                                        <span class="slack-app-badge">APP</span>
                                        <span class="slack-timestamp">now</span>
                                    </div>
                                    <div class="slack-text">${renderSlackPreviewMessage(titleRaw, contentRaw)}</div>
                                    ${ogCardHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderImagePreviewCard(platformKey, postText, contentRaw, clickableMentions, rawCopyText) {
            const meta = PLATFORM_PREVIEW_META[platformKey] || PLATFORM_PREVIEW_META.x;
            const layout = getImagePreviewLayout(contentRaw, platformKey);
            const frameWidth = 560;
            const scale = frameWidth / 1200;
            const frameHeight = 675 * scale;
            const copyKey = registerPreviewCopyText(rawCopyText);

            return `
                <div class="panel preview-block">
                    <div class="preview-title" style="margin-bottom:8px;">
                        <h2>${escapeHtml(meta.label)} Preview</h2>
                        <button type="button" class="preview-copy-btn" data-copy-key="${escapeHtml(copyKey)}">Copy Text</button>
                    </div>
                    <div class="preview-surface fit-content" style="border:0;background:transparent;padding:0;">
                        <div class="x-post">
                            ${renderPlatformAvatar(platformKey)}
                            <div class="x-main">
                                <div class="x-head">
                                    <span class="x-name">${escapeHtml(meta.name)}</span>
                                    <span class="x-handle">${escapeHtml(meta.handle)}</span>
                                    <span class="x-meta">now</span>
                                </div>
                                <div class="x-text">${formatPlainPostTextToHtml(postText, clickableMentions)}</div>
                                <div class="x-media">
                                    <div class="image-stage-frame" style="height:${frameHeight}px;">
                                        <div class="image-stage" style="transform:scale(${scale});">
                                            <div class="image-card" style="width:${layout.cardWidth}px;height:${layout.cardHeight}px;padding:${layout.padding};">
                                                <div class="image-text formatted" style="font-size:${layout.fontSize};line-height:${layout.lineHeight};">${layout.textHtml}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="x-actions"><span>Reply</span><span>Repost</span><span>Like</span><span>View</span></div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderPlatformPreviewCard(plan, contentRaw, fallbackTextPost, fallbackImagePost, clickableMentions, rawCopyText, ogPreviewUrl) {
            if (plan.mode === "slack") {
                return renderSlackPreviewCard(plan.titleRaw || "", plan.contentRaw || "", ogPreviewUrl);
            }

            if (plan.mode === "image") {
                return renderImagePreviewCard(plan.key, plan.postText || fallbackImagePost, contentRaw, clickableMentions, rawCopyText);
            }

            return renderTextPreviewCard(plan.key, plan.postText || fallbackTextPost, clickableMentions, rawCopyText, ogPreviewUrl);
        }

        function update() {
            saveSendToSettings();

            const titleRaw = titleInput.value.trim();
            const contentRaw = contentInput.value.trim();
            const combinedRaw = contentRaw ? `${titleRaw}\n\n${contentRaw}` : titleRaw;
            const hasTitle = !!titleRaw;
            const payload = {
                title: titleRaw,
                content: contentRaw,
                sendToWebpage: sendWebpage.checked,
                sendToSlack: sendSlack.checked,
                sendToX: sendX.checked,
                sendToThreads: sendThreads.checked,
                sendToFacebook: sendFacebook.checked
            };
            previewCopyPayloads = new Map();
            previewCopyPayloads.set("webpage", buildPlatformRawText("webpage", null, titleRaw, contentRaw, sendWebpage.checked));

            webpagePreviewBlock.style.display = sendWebpage.checked ? "" : "none";
            webpagePreviewSurface.hidden = !sendWebpage.checked;
            commandValidationHint.hidden = hasTitle;
            copyCommandBtn.disabled = !hasTitle;

            document.getElementById("eventTitlePreview").innerHTML = renderWebpageMarkup(normalizeNewlines(titleRaw).replace(/\n+/g, " ").trim());
            document.getElementById("eventContentPreview").innerHTML = contentRaw ? renderWebpageMarkupWithBreaks(contentRaw) : "";

            const selectedPlans = getSelectedPlatformPlans(titleRaw, contentRaw, sendWebpage.checked);
            selectedPlans.forEach(plan => {
                const ogPreviewUrl = getOgPreviewUrl(plan.key, plan);
                if (ogPreviewUrl) {
                    ensureOgPreview(ogPreviewUrl);
                }
            });

            const titleText = collapseWhitespace(plainTextWithLabels(titleRaw, slug => resolveMentionSlug(slug, "x")));
            const bodyText = plainTextWithLabels(contentRaw, slug => resolveMentionSlug(slug, "x"));
            const singleHyperlink = getSingleHyperlink(combinedRaw);
            const eventUrl = singleHyperlink || (sendWebpage.checked && containsHyperlink(combinedRaw)
                ? buildPreviewEventUrl(titleRaw, contentRaw)
                : null);

            socialPreviewList.innerHTML = selectedPlans.map(plan =>
                renderPlatformPreviewCard(
                    plan,
                    contentRaw,
                    buildTextPost(titleText, bodyText, eventUrl),
                    buildImageCaption(titleText, eventUrl ?? "", plan.limit ?? LIMITS.x),
                    collectClickableMentions(combinedRaw, plan.key),
                    buildPlatformRawText(plan.key, plan, titleRaw, contentRaw, sendWebpage.checked),
                    getOgPreviewUrl(plan.key, plan)
                )
            ).join("");

            if (hasTitle) {
                const payloadJsonText = JSON.stringify(payload);
                const payloadToken = base64UrlEncodeUtf8(payloadJsonText);
                commandOutput.value = buildServerCommand(payloadToken);
            } else {
                commandOutput.value = "";
            }
        }

        async function copyText(value, message) {
            await navigator.clipboard.writeText(value);
            copyState.textContent = message;
            setTimeout(() => {
                if (copyState.textContent === message) copyState.textContent = "";
            }, 2000);
        }

        async function copyPreviewText(button, value) {
            await navigator.clipboard.writeText(value);
            const original = button.dataset.copyLabel || button.textContent || "Copy Text";
            button.dataset.copyLabel = original;
            button.textContent = "Copied";
            button.classList.add("is-copied");
            setTimeout(() => {
                button.textContent = original;
                button.classList.remove("is-copied");
            }, 1400);
        }

        [titleInput, contentInput].forEach(el => {
            el.addEventListener("focus", () => setActiveEditor(el));
            el.addEventListener("click", () => setActiveEditor(el));
            el.addEventListener("keyup", () => setActiveEditor(el));
            el.addEventListener("select", () => setActiveEditor(el));
            el.addEventListener("keydown", event => {
                if (mentionSuggestions.hidden || !activeMentionContext || activeMentionContext.target !== el) {
                    return;
                }

                const matches = getMentionMatches(activeMentionContext.query);
                if (matches.length === 0) {
                    closeMentionSuggestions();
                    return;
                }

                if (event.key === "ArrowDown") {
                    event.preventDefault();
                    activeMentionIndex = (activeMentionIndex + 1) % matches.length;
                    renderMentionSuggestions(matches);
                    return;
                }

                if (event.key === "ArrowUp") {
                    event.preventDefault();
                    activeMentionIndex = (activeMentionIndex - 1 + matches.length) % matches.length;
                    renderMentionSuggestions(matches);
                    return;
                }

                if (event.key === "Enter" || event.key === "Tab") {
                    event.preventDefault();
                    applyMentionSuggestion(matches[activeMentionIndex]);
                    return;
                }

                if (event.key === "Escape") {
                    event.preventDefault();
                    closeMentionSuggestions();
                }
            });
            el.addEventListener("blur", () => {
                setTimeout(() => {
                    if (document.activeElement && mentionSuggestions.contains(document.activeElement)) {
                        return;
                    }
                    closeMentionSuggestions();
                }, 0);
            });
        });

        document.addEventListener("click", event => {
            if (event.target === titleInput || event.target === contentInput || mentionSuggestions.contains(event.target)) {
                return;
            }
            closeMentionSuggestions();
        });

        document.addEventListener("click", event => {
            const button = event.target instanceof Element ? event.target.closest("[data-copy-key], [data-copy-source]") : null;
            if (!button) {
                return;
            }

            const copyKey = button.getAttribute("data-copy-key") || button.getAttribute("data-copy-source");
            if (!copyKey || !previewCopyPayloads.has(copyKey)) {
                return;
            }

            copyPreviewText(button, previewCopyPayloads.get(copyKey) || "");
        });

        [titleInput, contentInput, sendWebpage, sendSlack, sendX, sendThreads, sendFacebook].forEach(el => {
            el.addEventListener("input", event => {
                if (event.target === titleInput || event.target === contentInput) {
                    updateMentionSuggestions(event.target);
                }
                update();
            });
            el.addEventListener("change", update);
        });

        insertBoldBtn.addEventListener("click", insertBold);
        insertStrongBtn.addEventListener("click", insertStrong);
        insertLinkBtn.addEventListener("click", insertLink);
        insertMentionBtn.addEventListener("click", insertMention);
        copyCommandBtn.addEventListener("click", async () => {
            if (!commandOutput.value) {
                return;
            }
            await copyText(commandOutput.value, "Command copied.");
        });
        window.addEventListener("resize", update);

        fetch("/api/data/athletes", { headers: { accept: "application/json" } })
            .then(response => response.ok ? response.json() : Promise.reject(response.status))
            .then(athletes => {
                athleteMentionIndex = buildAthleteMentionIndex(athletes);
            })
            .catch(() => {
                athleteMentionIndex = new Map();
            })
            .finally(() => {
                window.CustomEventMarkup.setMentionResolver(resolveMentionDisplayName);
                loadSendToSettings();
                update();
            });
    </script>
</body>
</html>
