<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Longevity World Cup is temporarily unavailable</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1c2722;
      --muted: #46554d;
      --paper: #f4f3ea;
      --panel: #fffefa;
      --line: rgba(28, 39, 34, 0.14);
      --accent: #0b7d45;
      --danger: #b3261e;
      --shadow: 0 4px 10px rgba(28, 39, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: Roboto, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    a {
      color: inherit;
    }

    .error-card {
      width: min(100%, 820px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-bar {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.9rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(248, 247, 239, 0.14);
      color: #f8f7ef;
      background:
        radial-gradient(80% 120% at 50% 0%, rgba(67, 238, 131, 0.14), transparent 62%),
        linear-gradient(180deg, #050908, #030706);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      min-width: 0;
      font-weight: 900;
    }

    .mark {
      width: 2.15rem;
      height: 2.15rem;
      border: 1px solid rgba(248, 247, 239, 0.18);
      border-radius: 8px;
      background: rgba(248, 247, 239, 0.08);
      flex: 0 0 auto;
      overflow: hidden;
    }

    .mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      padding: 0.16rem;
      filter: invert(1) grayscale(1) brightness(1.35);
    }

    .code {
      padding: 0.28rem 0.55rem;
      border: 1px solid rgba(179, 38, 30, 0.26);
      border-radius: 999px;
      color: var(--danger);
      background: rgba(179, 38, 30, 0.08);
      font-size: 0.84rem;
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
    }

    .card-body {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      gap: clamp(1.25rem, 4vw, 2rem);
      align-items: center;
      padding: clamp(1.25rem, 4vw, 2rem);
    }

    .visual {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .visual img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: center 24%;
    }

    h1 {
      margin: 0;
      font-family: "Anton", Impact, Haettenschweiler, "Arial Narrow Bold", Roboto, sans-serif;
      font-weight: 400;
      font-synthesis: none;
      text-transform: uppercase;
      font-size: clamp(2.45rem, 7vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .joke {
      margin: 1rem 0 0;
      color: var(--ink);
      font-size: clamp(1.12rem, 2.2vw, 1.35rem);
      line-height: 1.42;
      font-weight: 800;
    }

    .note {
      margin: 0.5rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.35rem;
    }

    .retry-button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    .retry-button {
      color: #06100b;
      background: var(--cta-green-gradient, linear-gradient(180deg, #50f191, #2edb6f));
      box-shadow: 0 4px 10px rgba(11, 125, 69, 0.18);
    }

    .retry-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11, 125, 69, 0.24);
    }

    .retry-button:focus-visible {
      outline: 3px solid rgba(11, 125, 69, 0.38);
      outline-offset: 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      .retry-button {
        transition: none;
      }
    }

    @media (max-width: 700px) {
      body {
        place-items: start center;
        padding-top: 1.25rem;
      }

      .card-body {
        grid-template-columns: 1fr;
      }

      .card-body section {
        order: 1;
      }

      .visual {
        order: 2;
        width: min(100%, 280px);
        justify-self: center;
      }
    }

    @media (max-width: 480px) {
      .card-bar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: clamp(2.35rem, 14vw, 3.5rem);
      }

      .actions,
      .retry-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="error-card" aria-labelledby="page-title">
    <div class="card-bar">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <img src="/assets/favicon-128x128.png" alt="">
        </span>
        <span>Longevity World Cup</span>
      </div>
      <div class="code">502 Bad Gateway</div>
    </div>

    <div class="card-body">
      <figure class="visual">
        <img src="/error/herold.png" alt="Herold waiting through a temporary outage">
      </figure>

      <section>
        <h1 id="page-title">We'll be right back</h1>
        <p class="joke">Temporary outage. Standings will return shortly.</p>
        <p class="note">A fresh version is deploying. Please try again in a moment.</p>
        <div class="actions">
          <button type="button" class="retry-button" onclick="window.location.reload()">Try again</button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
