<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Longevity World Cup is temporarily unavailable</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #25282d;
      --muted: #5d6672;
      --paper: #f7f4ed;
      --line: #2e2b27;
      --cyan: #00a9c2;
      --pink: #e8407d;
      --green: #168c5a;
      --shadow: 0 18px 40px rgba(37, 40, 45, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: Roboto, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(46, 43, 39, 0.045) 1px, transparent 1px) 0 0 / 36px 36px,
        var(--paper);
    }

    a {
      color: inherit;
    }

    .error-card {
      width: min(100%, 820px);
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      box-shadow: 10px 10px 0 var(--line), var(--shadow);
      overflow: hidden;
    }

    .card-bar {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.9rem;
      padding: 0.75rem 1rem;
      border-bottom: 3px solid var(--line);
      background: #fff;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      min-width: 0;
      font-weight: 900;
    }

    .mark {
      width: 2.15rem;
      height: 2.15rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--line);
      flex: 0 0 auto;
      overflow: hidden;
    }

    .mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      padding: 0.16rem;
    }

    .code {
      padding: 0.28rem 0.55rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--pink);
      background: #fff;
      font-size: 0.84rem;
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
    }

    .card-body {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      gap: clamp(1.25rem, 4vw, 2rem);
      align-items: center;
      padding: clamp(1.25rem, 4vw, 2rem);
    }

    .visual {
      margin: 0;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 5px 5px 0 var(--line);
      overflow: hidden;
    }

    .visual img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: center 24%;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.45rem, 7vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .joke {
      margin: 1rem 0 0;
      color: #353b44;
      font-size: clamp(1.12rem, 2.2vw, 1.35rem);
      line-height: 1.42;
      font-weight: 800;
    }

    .note {
      margin: 0.5rem 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.35rem;
    }

    button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 1rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      box-shadow: 4px 4px 0 var(--line);
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button {
      color: #fff;
      background: var(--green);
    }

    button:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--line);
    }

    button:focus-visible {
      outline: 3px solid rgba(0, 169, 194, 0.38);
      outline-offset: 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      button {
        transition: none;
      }
    }

    @media (max-width: 700px) {
      body {
        place-items: start center;
        padding-top: 1.25rem;
      }

      .card-body {
        grid-template-columns: 1fr;
      }

      .visual {
        width: min(100%, 280px);
        justify-self: center;
      }
    }

    @media (max-width: 480px) {
      .card-bar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: clamp(2.35rem, 14vw, 3.5rem);
      }

      .actions,
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="error-card" aria-labelledby="page-title">
    <div class="card-bar">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <img src="/assets/favicon-128x128.png" alt="">
        </span>
        <span>Longevity World Cup</span>
      </div>
      <div class="code">503 Service Unavailable</div>
    </div>

    <div class="card-body">
      <figure class="visual">
        <img src="/error/herold.png" alt="Herold waiting through a temporary outage">
      </figure>

      <section>
        <h1 id="page-title">We'll be right back</h1>
        <p class="joke">The server is not dead. Just optimizing.</p>
        <p class="note">A fresh version is deploying. Please try again in a moment.</p>
        <div class="actions">
          <button type="button" onclick="window.location.reload()">Try again</button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
