<!DOCTYPE html>
<html lang="en">
<head>
    <title>404 Not Found - Longevity World Cup</title>
    <!--HEAD-->
    <style>
        /* Hide the join-game button in the header */
        .join-game {
            display: none !important;
        }

        .not-found-main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2.5rem 1rem 3.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .not-found-main [data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .not-found-title {
            margin: 0 0 1.35rem;
            text-align: center;
        }

        .not-found-visual {
            margin: 0 auto 1.45rem;
            text-align: center;
        }

        .not-found-visual .illustration {
            width: min(100%, 360px);
            margin-bottom: 0;
            box-sizing: border-box;
        }

        .not-found-copy {
            max-width: 42ch;
            margin: 0 auto 1.5rem;
            color: #3f3f3f;
            line-height: 1.45;
            text-align: center;
        }

        .not-found-actions {
            width: min(100%, 408px);
            min-width: 0;
            max-width: 408px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            margin: 0 auto;
        }

        .not-found-actions .option-button {
            width: 100%;
            min-width: 0;
            max-width: none;
            margin: 0;
            box-sizing: border-box;
        }

        .not-found-actions .back-button {
            margin-left: 0;
        }

        @media (max-width: 600px) {
            .not-found-main {
                padding: 2rem 1.35rem 2.75rem;
            }

            .not-found-title {
                margin-bottom: 1rem;
                font-size: 2rem;
            }

            .not-found-visual {
                margin-bottom: 1.25rem;
            }

            .not-found-visual .illustration {
                width: min(100%, 300px);
            }
        }

        @media (min-width: 560px) and (max-width: 760px) and (max-height: 480px) {
            .not-found-main {
                max-width: 620px;
                padding: 1rem;
                display: grid;
                grid-template-columns: minmax(130px, 150px) minmax(0, 1fr);
                gap: 0.55rem 1.25rem;
                align-items: center;
            }

            .not-found-title {
                grid-column: 2;
                margin: 0;
                text-align: left;
                font-size: clamp(2rem, 6vw, 2.6rem);
                line-height: 1;
            }

            .not-found-visual {
                grid-column: 1;
                grid-row: 1 / span 3;
                margin: 0;
            }

            .not-found-visual .illustration {
                width: min(100%, 150px);
            }

            .not-found-copy {
                grid-column: 2;
                margin: 0;
                text-align: left;
                line-height: 1.3;
            }

            .not-found-actions {
                grid-column: 2;
                width: min(100%, 220px);
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main class="not-found-main">

        <h1 id="appReviewTitle" class="not-found-title" data-aos="fade" data-aos-duration="700" data-aos-delay="200">404 not found</h1>
        <div class="not-found-visual" data-aos="fade" data-aos-duration="700" data-aos-delay="250">
            <picture>
                <img src="../error/herold.png" alt="Illustration for page not found" class="illustration" loading="lazy">
            </picture>
        </div>
        <p class="not-found-copy" data-aos="fade" data-aos-duration="700" data-aos-delay="300">
            This page didn’t qualify for the Longevity World Cup
        </p>
        <div class="options-container not-found-actions" data-aos="fade" data-aos-duration="700" data-aos-delay="400">
            <button class="option-button back-button" onclick="window.location.href = '/'">
                <i class="fas fa-home"></i>&nbsp;Home
            </button>
        </div>
    </main>
    <!--FOOTER-->
</body>
</html>
