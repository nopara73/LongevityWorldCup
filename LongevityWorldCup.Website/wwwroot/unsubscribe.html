<!DOCTYPE html>
<html lang="en">
<head>
    <title>Unsubscribe - Longevity World Cup</title>
    <!--HEAD-->
    <style>
        .join-game {
            display: none;
        }

        .unsubscribe-panel {
            max-width: 620px;
            margin: 2.5rem auto;
            padding: 1.75rem;
            background: rgba(255, 255, 255, 0.72);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .unsubscribe-panel h1 {
            margin-top: 0;
            margin-bottom: 0.9rem;
        }

        .unsubscribe-panel h1[data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .unsubscribe-copy {
            max-width: 34rem;
            margin: 0 auto;
            color: #243446;
            line-height: 1.45;
        }

        .unsubscribe-form {
            display: grid;
            gap: 0.65rem;
            max-width: 420px;
            margin: 1.35rem auto 0;
            text-align: left;
        }

        .unsubscribe-form label {
            font-weight: 700;
            color: #243446;
        }

        .unsubscribe-form input {
            width: 100%;
            box-sizing: border-box;
            min-height: 44px;
            padding: 0.75rem 0.85rem;
            border: 1px solid rgba(80, 97, 118, 0.28);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            color: #243446;
            font: inherit;
        }

        .unsubscribe-form input:focus {
            border-color: var(--primary-color);
            outline: 3px solid rgba(0, 188, 212, 0.18);
            outline-offset: 1px;
        }

        .unsubscribe-button {
            width: 100%;
            justify-self: stretch;
            min-height: 42px;
            margin-top: 0.25rem;
            padding: 0.75rem 1.15rem;
            border: none;
            border-radius: 8px;
            background: #0a7c0a;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(10, 124, 10, 0.16);
        }

        .unsubscribe-button:hover,
        .unsubscribe-button:focus-visible {
            background: #096f09;
        }

        .unsubscribe-message {
            min-height: 1.35rem;
            margin: 1rem 0 0;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 600px) {
            .unsubscribe-panel {
                margin: 1.5rem 1rem;
                padding: 1.35rem 1rem;
                border-radius: 14px;
            }

            .unsubscribe-panel h1 {
                font-size: 2rem;
            }

            .unsubscribe-button {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <section class="unsubscribe-panel">
            <h1 data-aos="fade" data-aos-duration="700" data-aos-delay="250">Unsubscribe</h1>
            <p class="unsubscribe-copy">Remove your email from the Longevity World Cup yearly newsletter.</p>

            <form id="unsubscribe-form" class="unsubscribe-form" novalidate>
                <label for="email">Email address</label>
                <input id="email"
                       name="email"
                       type="email"
                       autocomplete="email"
                       placeholder="you@example.com"
                       required />

                <button id="unsubscribe-button"
                        type="submit"
                        class="unsubscribe-button">
                    Unsubscribe
                </button>
            </form>

            <p id="message" class="unsubscribe-message" aria-live="polite"></p>
        </section>
    </main>

    <!--FOOTER-->
    <script>
        history.replaceState({ modal: "details" }, "", "/unsubscribe");

        (function () {
            const form = document.getElementById("unsubscribe-form");
            const emailInput = document.getElementById("email");
            const button = document.getElementById("unsubscribe-button");
            const message = document.getElementById("message");

            function setMessage(text, isError) {
                message.textContent = text;
                message.style.color = isError ? "#cc0000" : "#0a7c0a";
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();
                setMessage("", false);

                const email = (emailInput.value || "").trim();
                if (!email) {
                    setMessage("Please enter your email address.", true);
                    return;
                }

                button.disabled = true;
                button.textContent = "Unsubscribing...";

                try {
                    const response = await fetch("/api/home/unsubscribe", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: email })
                    });

                    if (!response.ok) {
                        const serverMessage = await response.text();
                        setMessage(serverMessage || "Unable to unsubscribe right now.", true);
                        return;
                    }

                    setMessage("You have been unsubscribed.", false);
                    form.reset();
                } catch (_) {
                    setMessage("Network error. Please try again.", true);
                } finally {
                    button.disabled = false;
                    button.textContent = "Unsubscribe";
                }
            });
        })();
    </script>
</body>
</html>
