<!DOCTYPE html>
<html lang="en">
<head>
    <title>Unsubscribe - Longevity World Cup</title>
    <!--HEAD-->
    <style>
        .join-game {
            display: none !important;
        }

        .unsubscribe-panel {
            max-width: 620px;
            margin: 2.25rem auto;
            padding: 2rem;
            background: var(--lwc-surface, #ffffff);
            border: 1px solid var(--lwc-border, #d7e0e6);
            border-radius: var(--lwc-radius-md, 8px);
            box-shadow: var(--lwc-shadow-sm, 0 1px 2px rgba(15, 23, 42, 0.08));
            text-align: center;
        }

        .unsubscribe-panel h1 {
            margin-top: 0;
            margin-bottom: 0.8rem;
            font-size: 2.5rem;
            line-height: 1.12;
            overflow-wrap: normal;
        }

        .unsubscribe-copy {
            max-width: 34rem;
            margin: 0 auto;
            color: var(--lwc-muted, #52606d);
            line-height: 1.45;
        }

        .unsubscribe-form {
            display: grid;
            gap: 0.75rem;
            max-width: 420px;
            margin: 1.5rem auto 0;
            text-align: left;
        }

        .unsubscribe-form label {
            font-weight: 700;
            color: var(--lwc-ink, #17212b);
        }

        .unsubscribe-form input {
            width: 100%;
            box-sizing: border-box;
            min-height: 46px;
            padding: 0.75rem 0.85rem;
            border: 1px solid var(--lwc-border-strong, #71808d);
            border-radius: var(--lwc-radius-sm, 4px);
            background: var(--lwc-surface, #ffffff);
            color: var(--lwc-ink, #17212b);
            font: inherit;
        }

        .unsubscribe-form input:focus {
            border-color: var(--primary-color);
            outline: 3px solid rgba(0, 188, 212, 0.18);
            outline-offset: 1px;
        }

        .unsubscribe-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            justify-self: stretch;
            min-height: 46px;
            margin-top: 0.25rem;
            padding: 0.75rem 1.15rem;
            border: none;
            border-radius: var(--lwc-radius-sm, 4px);
            background: var(--lwc-accent, #087685);
            color: var(--lwc-on-accent, #ffffff);
            font-weight: 700;
            cursor: pointer;
            box-shadow: none;
            transition: background-color var(--lwc-duration-fast, 140ms) var(--lwc-ease, ease);
        }

        .unsubscribe-button:hover,
        .unsubscribe-button:focus-visible {
            background: var(--lwc-accent-hover, #065d68);
            box-shadow: none;
            transform: none;
        }

        .unsubscribe-button:focus-visible {
            outline: 3px solid var(--lwc-accent, #087685);
            outline-offset: 2px;
        }

        .unsubscribe-message {
            min-height: 1.35rem;
            margin: 1rem 0 0;
            font-weight: 700;
            text-align: center;
        }

        .unsubscribe-message.is-error {
            color: var(--lwc-danger, #b4233b);
        }

        .unsubscribe-message.is-success {
            color: var(--lwc-success, #1f7a38);
        }

        @media (max-width: 600px) {
            .unsubscribe-panel {
                margin: 1.5rem 1rem;
                padding: 1.35rem 1rem;
                border-radius: var(--lwc-radius-md, 8px);
            }

            .unsubscribe-panel h1 {
                font-size: clamp(1.8rem, 9vw, 2rem);
            }

            .unsubscribe-button {
                min-height: 46px;
            }
        }

        @media (min-width: 560px) and (max-width: 932px) and (max-height: 480px) {
            .unsubscribe-panel {
                max-width: 620px;
                margin: 0.8rem auto 1.5rem;
                padding: 1rem 1.25rem;
            }

            .unsubscribe-panel h1 {
                margin-bottom: 0.45rem;
                font-size: clamp(2rem, 6vw, 2.55rem);
            }

            .unsubscribe-copy {
                line-height: 1.3;
            }

            .unsubscribe-form {
                max-width: none;
                margin-top: 1rem;
                grid-template-columns: minmax(0, 1fr) minmax(9rem, 12rem);
                align-items: end;
            }

            .unsubscribe-form label {
                grid-column: 1 / -1;
            }

            .unsubscribe-form input,
            .unsubscribe-button {
                min-height: 44px;
            }

            .unsubscribe-button {
                margin-top: 0;
            }
        }

        @media (max-width: 300px) {
            .unsubscribe-panel {
                margin: 1.25rem 0.45rem;
                padding: 1.2rem 0.75rem;
            }

            .unsubscribe-panel h1 {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <section class="unsubscribe-panel">
            <h1>Unsubscribe</h1>
            <p class="unsubscribe-copy">Remove your email from the Longevity World Cup yearly newsletter.</p>

            <form id="unsubscribe-form" class="unsubscribe-form" novalidate>
                <label for="email">Email address</label>
                <input id="email"
                       name="email"
                       type="email"
                       autocomplete="email"
                       placeholder="you@example.com"
                       required />

                <button id="unsubscribe-button"
                        type="submit"
                        class="unsubscribe-button">
                    Unsubscribe
                </button>
            </form>

            <p id="message" class="unsubscribe-message" aria-live="polite"></p>
        </section>
    </main>

    <!--FOOTER-->
    <script>
        history.replaceState({ modal: "details" }, "", "/unsubscribe");

        (function () {
            const form = document.getElementById("unsubscribe-form");
            const emailInput = document.getElementById("email");
            const button = document.getElementById("unsubscribe-button");
            const message = document.getElementById("message");

            function setMessage(text, isError) {
                message.textContent = text;
                message.classList.toggle("is-error", Boolean(text) && isError);
                message.classList.toggle("is-success", Boolean(text) && !isError);
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();
                setMessage("", false);

                const email = (emailInput.value || "").trim();
                if (!email) {
                    setMessage("Please enter your email address.", true);
                    return;
                }

                button.disabled = true;
                button.textContent = "Unsubscribing...";

                try {
                    const response = await fetch("/api/home/unsubscribe", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: email })
                    });

                    if (!response.ok) {
                        const serverMessage = await response.text();
                        setMessage(serverMessage || "Unable to unsubscribe right now.", true);
                        return;
                    }

                    setMessage("You have been unsubscribed.", false);
                    form.reset();
                } catch (_) {
                    setMessage("Network error. Please try again.", true);
                } finally {
                    button.disabled = false;
                    button.textContent = "Unsubscribe";
                }
            });
        })();
    </script>
</body>
</html>
