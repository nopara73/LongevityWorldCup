<!DOCTYPE html>
<html lang="en">
<head>
    <title>Unsubscribe - Longevity World Cup</title>
    <!--HEAD-->
    <style>
        .join-game {
            display: none !important;
        }

        .unsubscribe-panel {
            max-width: 620px;
            margin: 2.25rem auto;
            padding: 2rem;
            background: var(--card-bg, #fffefa);
            border: 1px solid var(--surface-border, rgba(28, 39, 34, 0.12));
            border-radius: var(--radius-panel, 10px);
            box-shadow: var(--surface-shadow, 0 4px 10px rgba(28, 39, 34, 0.08));
            text-align: center;
        }

        .unsubscribe-panel h1 {
            margin-top: 0;
            margin-bottom: 0.8rem;
            font-size: 2.5rem;
            line-height: 1.12;
            overflow-wrap: anywhere;
        }

        .unsubscribe-panel h1[data-aos]:not(.aos-animate) {
            opacity: 1;
            transform: none;
        }

        .unsubscribe-copy {
            max-width: 34rem;
            margin: 0 auto;
            color: #24332c;
            line-height: 1.45;
        }

        .unsubscribe-form {
            display: grid;
            gap: 0.75rem;
            max-width: 420px;
            margin: 1.5rem auto 0;
            text-align: left;
        }

        .unsubscribe-form label {
            font-weight: 700;
            color: #24332c;
        }

        .unsubscribe-form input {
            width: 100%;
            box-sizing: border-box;
            min-height: 46px;
            padding: 0.75rem 0.85rem;
            border: 1px solid rgba(70, 85, 77, 0.28);
            border-radius: var(--radius-control, 999px);
            background: rgba(255, 255, 255, 0.92);
            color: #24332c;
            font: inherit;
        }

        .unsubscribe-form input:focus {
            border-color: var(--primary-color);
            outline: 3px solid rgba(11, 125, 69, 0.18);
            outline-offset: 1px;
        }

        .unsubscribe-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            justify-self: stretch;
            min-height: 46px;
            margin-top: 0.25rem;
            padding: 0.75rem 1.15rem;
            border: none;
            border-radius: var(--radius-control, 999px);
            background: var(--cta-green-gradient, linear-gradient(180deg, #50f191, #2edb6f));
            color: #06100b;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--surface-shadow, 0 4px 10px rgba(28, 39, 34, 0.08));
            transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .unsubscribe-button:hover,
        .unsubscribe-button:focus-visible {
            box-shadow: var(--surface-shadow-lifted, 0 6px 14px rgba(28, 39, 34, 0.12));
            transform: translateY(-1px);
        }

        .unsubscribe-button:focus-visible {
            outline: 3px solid rgba(67, 238, 131, 0.45);
            outline-offset: 2px;
        }

        .unsubscribe-message {
            min-height: 1.35rem;
            margin: 1rem 0 0;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 600px) {
            .unsubscribe-panel {
                margin: 1.5rem 1rem;
                padding: 1.35rem 1rem;
                border-radius: var(--radius-panel, 10px);
            }

            .unsubscribe-panel h1 {
                font-size: 2rem;
            }

            .unsubscribe-button {
                min-height: 46px;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <section class="unsubscribe-panel">
            <h1 data-aos="fade" data-aos-duration="700" data-aos-delay="250">Unsubscribe</h1>
            <p class="unsubscribe-copy">Remove your email from the Longevity World Cup season bulletin.</p>

            <form id="unsubscribe-form" class="unsubscribe-form" novalidate>
                <label for="email">Email address</label>
                <input id="email"
                       name="email"
                       type="email"
                       autocomplete="email"
                       placeholder="Email address"
                       required />

                <button id="unsubscribe-button"
                        type="submit"
                        class="unsubscribe-button">
                    Unsubscribe
                </button>
            </form>

            <p id="message" class="unsubscribe-message" aria-live="polite"></p>
        </section>
    </main>

    <!--FOOTER-->
    <script>
        history.replaceState({ modal: "details" }, "", "/unsubscribe");

        (function () {
            const form = document.getElementById("unsubscribe-form");
            const emailInput = document.getElementById("email");
            const button = document.getElementById("unsubscribe-button");
            const message = document.getElementById("message");

            function setMessage(text, isError) {
                message.textContent = text;
                message.style.color = isError ? "#b3261e" : "#0b7d45";
            }

            form.addEventListener("submit", async function (event) {
                event.preventDefault();
                setMessage("", false);

                const email = (emailInput.value || "").trim();
                if (!email) {
                    setMessage("Please enter your email address.", true);
                    return;
                }

                button.disabled = true;
                button.textContent = "Unsubscribing...";

                try {
                    const response = await fetch("/api/home/unsubscribe", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: email })
                    });

                    if (!response.ok) {
                        const serverMessage = await response.text();
                        setMessage(serverMessage || "Unable to unsubscribe right now.", true);
                        return;
                    }

                    setMessage("You have been unsubscribed.", false);
                    form.reset();
                } catch (_) {
                    setMessage("Network error. Please try again.", true);
                } finally {
                    button.disabled = false;
                    button.textContent = "Unsubscribe";
                }
            });
        })();
    </script>
</body>
</html>
