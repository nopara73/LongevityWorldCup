<!DOCTYPE html>
<html lang="en">
<head>
    <title>World Standings | Longevity World Cup</title>
    <link rel="alternate" type="text/markdown" title="Machine-readable leaderboard facts" href="/ai/leaderboard.md" />
    <!--HEAD-->
    <style>
        /* The page auto-scrolls to the title. Matching margin and scroll-margin
           makes the scroll land exactly at the header band's bottom edge, so the
           band never gets sliced mid-CTA and the title keeps clear air under the
           fixed sticky bar. */
        #leaderboardTitle {
            margin-top: 1.45rem;
            scroll-margin-top: 4.75rem;
        }

        @media (min-width: 901px) {
            body:has(#leaderboardTitle) header {
                padding: 0.42rem 0 0.55rem;
            }

            body:has(#leaderboardTitle) .header-link > .main-logo-image {
                width: 34px;
                margin-bottom: 0.22rem;
            }

            body:has(#leaderboardTitle) .bannertext {
                font-size: 1.4rem;
                letter-spacing: 0.015em;
            }

            body:has(#leaderboardTitle) .tagline,
            body:has(#leaderboardTitle) .scrolled-button {
                display: none;
            }

            body:has(#leaderboardTitle) .join-game:not(.scrolled-button) {
                position: absolute;
                top: 50%;
                right: 1.5rem;
                z-index: 2;
                display: inline-flex;
                min-height: 42px;
                margin: 0;
                padding: 0.54rem 1.05rem;
                font-size: 0.95rem;
                transform: translateY(-50%);
            }

            body:has(#leaderboardTitle) .join-game:not(.scrolled-button) > strong,
            body:has(#leaderboardTitle) .join-game:not(.scrolled-button) .join-game-middle,
            body:has(#leaderboardTitle) .join-game:not(.scrolled-button) .join-game-end {
                display: none;
            }

            body:has(#leaderboardTitle) .join-game:not(.scrolled-button)::after {
                content: "APPLY";
                font-weight: 900;
                letter-spacing: 0.02em;
            }

            body:has(#leaderboardTitle) .join-game:not(.scrolled-button):hover,
            body:has(#leaderboardTitle) .join-game:not(.scrolled-button):focus-visible {
                transform: translateY(calc(-50% - 1px));
            }

            body:has(#leaderboardTitle) main {
                margin-top: 0.9rem;
            }

            body:has(#leaderboardTitle) main {
                max-width: min(1500px, calc(100vw - 3rem));
            }

            #leaderboardTitle {
                margin-top: 0.9rem;
                margin-bottom: 0.75rem;
                scroll-margin-top: 3.2rem;
            }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            #leaderboardTitle {
                margin-top: 2.1rem;
                font-size: clamp(3rem, 7vw, 3.45rem);
                scroll-margin-top: 4.65rem;
            }
        }

        /* On phones the floating PLAY pill shares the title row; reserve headroom
           with padding instead, and let the scroll land right at the title. */
        @media (max-width: 640px) {
            #leaderboardTitle {
                margin-top: 1rem;
                padding-top: calc(32px + 0.4rem);
                scroll-margin-top: 0.25rem;
            }
        }
    </style>
</head>
<body>
    <!--HEADER-->
    <main>
        <h1 id="leaderboardTitle">Official world standings</h1>
        <!--LEADERBOARD-CONTENT-->
        <div class="options-container" data-aos="fade" data-aos-duration="700" data-aos-delay="700">
            <button class="option-button back-button" onclick="window.goBackOrHome()">
                <i class="fas fa-arrow-left"></i>&nbsp;Back
            </button>
        </div>
    </main>
    <!--FOOTER-->
</body>
</html>

<script>
    history.replaceState({}, '', '/leaderboard' + (window.location.search || '') + (window.location.hash || ''));

    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(() => {
            const leaderboardTitle = document.getElementById('leaderboardTitle');
            leaderboardTitle.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 500);
        LoadLeaderboard(false, Infinity);
    });
</script>
