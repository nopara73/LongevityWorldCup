<!DOCTYPE html>
<html lang="en">
<head>
    <title>Longevity World Cup - Event Board</title>
    <!--HEAD-->
    <style>
        .join-game {
            display: none !important;
        }

        .event-board-page .events-board thead {
            display: none;
        }

        .event-board-page .events-board table {
            padding-bottom: 0;
        }

        @media (min-width: 720px) {
            .event-board-page .events-board {
                flex-grow: 0;
                width: min(100% - 2rem, 1080px);
            }
        }

        @media (min-width: 601px) and (max-width: 820px) {
            .event-board-page .events-board table {
                width: 100%;
                table-layout: fixed;
            }

            .event-board-page .events-board tbody td {
                padding-left: 12px;
                padding-right: 12px;
            }

            .event-board-page .events-board td.col-avatar {
                width: 34px;
                padding-right: 7px;
            }

            .event-board-page .events-board td.event-message {
                padding-left: 0;
            }

            .event-board-page .events-board td.event-message .event-message-cell {
                white-space: normal;
                overflow-x: hidden;
                flex-wrap: wrap;
                column-gap: 0.2rem;
                row-gap: 0.16rem;
                padding-top: 0.3rem;
                padding-bottom: 0.3rem;
            }

            .event-board-page .events-board td.event-message .event-message-cell * {
                white-space: normal;
            }

            .event-board-page .events-board td.event-message .event-message-cell .name-and-rank,
            .event-board-page .events-board td.event-message .event-message-cell .rank-badge,
            .event-board-page .events-board td.event-message .event-message-cell .badge-class,
            .event-board-page .events-board td.event-message .event-message-cell .badge-chip,
            .event-board-page .events-board td.event-message .event-message-cell .more-link {
                white-space: nowrap;
            }

            .event-board-page .events-board td.col-date {
                width: 82px;
                padding-left: 8px;
                font-size: 0.76rem;
            }
        }
    </style>
</head>
<body>
<!--HEADER-->
<main class="event-board-page">
    <h1 id="eventBoardTitle">Highlights</h1>
    <!--EVENT-BOARD-CONTENT-->
    <div class="options-container" data-aos="fade" data-aos-duration="700" data-aos-delay="700">
        <button class="option-button back-button" onclick="window.goBackOrHome()">
            <i class="fas fa-arrow-left"></i>&nbsp;Back
        </button>
    </div>
</main>
<!--FOOTER-->

<script>
    history.replaceState({}, '', '/events' + (window.location.search || '') + (window.location.hash || ''));

    function initEventBoard() {
        const titleEl = document.getElementById('eventBoardTitle');
        if (titleEl && titleEl.scrollIntoView) {
            setTimeout(() => {
                titleEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }
        if (typeof window.loadEventsTable === 'function') {
            window.loadEventsTable(Infinity, false);
        } else {
            console.error('loadEventsTable is not defined');
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initEventBoard);
    } else {
        initEventBoard();
    }
</script>
</body>
</html>
